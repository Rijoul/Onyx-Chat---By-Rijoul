        try {
            if (isRegistering) await auth.createUserWithEmailAndPassword(email, password);
            else await auth.signInWithEmailAndPassword(email, password);
        } catch(err) {
            const msgs = { 'auth/invalid-email':'Adresse email invalide.', 'auth/user-not-found':'Aucun compte trouvé.', 'auth/wrong-password':'Mot de passe incorrect.', 'auth/email-already-in-use':'Email déjà utilisé.', 'auth/weak-password':'Mot de passe trop court (6 min).', 'auth/invalid-credential':'Email ou mot de passe incorrect.' };
            setAuthError(msgs[err.code] || err.message);
            setLoading(false);
        }
    };
    const inputStyle = {width:'100%',background:'rgba(2,6,23,.7)',border:'1px solid #1e293b',borderRadius:'14px',padding:'13px 16px 13px 44px',color:'white',fontSize:'13px',outline:'none',transition:'all .25s',fontFamily:'DM Sans,sans-serif',boxSizing:'border-box'};
    return (
        <div style={{height:'100dvh',background:'#020617',display:'flex',alignItems:'center',justifyContent:'center',padding:'16px',paddingTop:'calc(16px + env(safe-area-inset-top))',paddingBottom:'calc(16px + env(safe-area-inset-bottom))',overflowY:'auto',position:'relative'}}>
            <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
                <div className="auth-orb-1" style={{position:'absolute',top:'10%',left:'5%',width:'320px',height:'320px',borderRadius:'50%',background:'radial-gradient(circle,rgba(37,99,235,.18) 0%,transparent 70%)',filter:'blur(40px)'}}/>
                <div className="auth-orb-2" style={{position:'absolute',bottom:'10%',right:'5%',width:'280px',height:'280px',borderRadius:'50%',background:'radial-gradient(circle,rgba(99,102,241,.15) 0%,transparent 70%)',filter:'blur(40px)'}}/>
            </div>
            <div className="auth-card" style={{width:'100%',maxWidth:'400px',position:'relative',zIndex:1}}>
                <div style={{textAlign:'center',marginBottom:'32px'}}>
                    <div className="auth-logo auth-logo-glow" style={{display:'inline-flex',marginBottom:'20px'}}>
                        <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                            <defs><linearGradient id="authGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#1e3a8a"/><stop offset="100%" stopColor="#3b82f6"/></linearGradient></defs>
                            <rect width="80" height="80" rx="22" fill="url(#authGrad)" stroke="rgba(96,165,250,.3)" strokeWidth="1"/>
                            <text x="40" y="57" textAnchor="middle" fontFamily="Georgia,'Times New Roman',serif" fontWeight="900" fontSize="52" fill="white" letterSpacing="-2">O</text>
                        </svg>
                    </div>
                    <h1 className="auth-title shimmer-text" style={{fontSize:'28px',fontWeight:800,letterSpacing:'.15em',marginBottom:'6px'}}>ONYX CHAT</h1>
                    <p style={{color:'#b8924a',fontSize:'10px',fontWeight:700,letterSpacing:'.2em',textTransform:'uppercase'}}>By Rijoul</p>
                </div>
                <div className="anim-border" style={{background:'rgba(15,23,42,.8)',border:'1px solid rgba(37,99,235,.2)',borderRadius:'28px',padding:'28px',backdropFilter:'blur(20px)'}}>
                    <div style={{display:'flex',background:'rgba(2,6,23,.6)',borderRadius:'14px',padding:'4px',marginBottom:'24px',border:'1px solid #1e293b'}}>
                        {['Connexion','Inscription'].map((label,i)=>(
                            <button key={i} onClick={()=>{setIsRegistering(i===1);setAuthError('');setAgeChecked(false);setTermsChecked(false);}} style={{flex:1,padding:'8px',borderRadius:'10px',fontSize:'11px',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',transition:'all .25s',background:isRegistering===(i===1)?'#2563eb':'transparent',color:isRegistering===(i===1)?'white':'#94a3b8',border:'none',cursor:'pointer',fontFamily:'Syne,sans-serif'}}>{label}</button>
                        ))}
                    </div>
                    <form onSubmit={handleAuth} style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                        {authError && <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:'12px',padding:'10px 14px',color:'#f87171',fontSize:'11px',fontWeight:600}}>{authError}</div>}
                        <div style={{position:'relative'}}>
                            <input type="email" required placeholder="Adresse email" className="input-glow" style={inputStyle} value={email} onChange={e=>setEmail(e.target.value)}/>
                            <div style={{position:'absolute',left:'14px',top:'50%',transform:'translateY(-50%)',color:'#475569'}}><Icon name="mail" size={16}/></div>
                        </div>
                        <div style={{position:'relative'}}>
                            <input type="password" required placeholder="Mot de passe" className="input-glow" style={inputStyle} value={password} onChange={e=>setPassword(e.target.value)}/>
                            <div style={{position:'absolute',left:'14px',top:'50%',transform:'translateY(-50%)',color:'#475569'}}><Icon name="lock" size={16}/></div>
                        </div>
                        {isRegistering && (
                            <div style={{display:'flex',flexDirection:'column',gap:'10px',padding:'12px',background:'rgba(2,6,23,.5)',borderRadius:'12px',border:'1px solid #1e293b'}}>
                                <button type="button" onClick={()=>setAgeChecked(c=>!c)} style={{display:'flex',alignItems:'flex-start',gap:'10px',background:'none',border:'none',cursor:'pointer',padding:0,textAlign:'left'}}>
                                    <div className={`rgpd-check ${ageChecked?'checked':''}`} style={{marginTop:'2px'}}>{ageChecked && <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>}</div>
                                    <p style={{fontSize:'10px',color:'#94a3b8',lineHeight:1.55}}>Je certifie avoir au moins <strong style={{color:'white'}}>15 ans</strong> (RGPD art. 8 · Loi I&L art. 45)</p>
                                </button>
                                <button type="button" onClick={()=>setTermsChecked(c=>!c)} style={{display:'flex',alignItems:'flex-start',gap:'10px',background:'none',border:'none',cursor:'pointer',padding:0,textAlign:'left'}}>
                                    <div className={`rgpd-check ${termsChecked?'checked':''}`} style={{marginTop:'2px'}}>{termsChecked && <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>}</div>
                                    <p style={{fontSize:'10px',color:'#94a3b8',lineHeight:1.55}}>J'accepte les <button type="button" onClick={e=>{e.stopPropagation();onShowTerms();}} style={{color:'#60a5fa',background:'none',border:'none',cursor:'pointer',fontSize:'10px',fontWeight:700,padding:0,textDecoration:'underline'}}>CGU</button> et la <button type="button" onClick={e=>{e.stopPropagation();onShowPrivacy();}} style={{color:'#60a5fa',background:'none',border:'none',cursor:'pointer',fontSize:'10px',fontWeight:700,padding:0,textDecoration:'underline'}}>politique de confidentialité</button></p>
                                </button>
                            </div>
                        )}
                        <button type="submit" disabled={loading||(isRegistering&&(!ageChecked||!termsChecked))} className="auth-btn"
                            style={{marginTop:'8px',width:'100%',background:(loading||(isRegistering&&(!ageChecked||!termsChecked)))?'#1e293b':'linear-gradient(135deg,#2563eb,#1d4ed8)',border:'1px solid rgba(96,165,250,.3)',borderRadius:'14px',padding:'14px',color:'white',fontWeight:800,fontSize:'12px',letterSpacing:'.12em',textTransform:'uppercase',cursor:(loading||(isRegistering&&(!ageChecked||!termsChecked)))?'not-allowed':'pointer',fontFamily:'Syne,sans-serif',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
                            {loading?(<><div style={{width:'16px',height:'16px',border:'2px solid rgba(255,255,255,.3)',borderTopColor:'white',borderRadius:'50%',animation:'spin .7s linear infinite'}}/> Chargement...</>):(isRegistering?'✦ Créer mon compte':'✦ Se connecter')}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    );
};

// ═══════════════════════════════════════════════════════════════════════════════
// ── COMPOSANT POINT DE PRÉSENCE ──
// ═══════════════════════════════════════════════════════════════════════════════

const PresenceDot = ({ isOnline, size = 11, borderColor = '#020617' }) => (
    <div style={{
        width: `${size}px`,
        height: `${size}px`,
        borderRadius: '50%',
        border: `2px solid ${borderColor}`,
        background: isOnline ? '#4ade80' : '#374151',
        transition: 'background 0.4s ease',
        flexShrink: 0,
        ...(isOnline ? { animation: 'onlinePulse 2.5s ease-in-out infinite' } : {})
    }}/>
);

// ═══════════════════════════════════════════════════════════════════════════════
// ── APP PRINCIPALE ──
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
    const [consentState, setConsentState] = useState(() => loadConsent());
    const [showConsentBanner, setShowConsentBanner] = useState(false);
    const [showCustomizer, setShowCustomizer] = useState(false);
    const [showPrivacyPage, setShowPrivacyPage] = useState(false);
    const [showTermsPage, setShowTermsPage] = useState(false);
    const [showRightsModal, setShowRightsModal] = useState(false);
    const [showAgeGate, setShowAgeGate] = useState(false);
    const [ageConfirmed, setAgeConfirmed] = useState(() => { try { return loadConsent()?.ageConfirmed === true; } catch { return false; } });

    const [user, setUser] = useState(null);
    const [profile, setProfile] = useState({ displayName:'', photoURL:'' });
    const [loading, setLoading] = useState(true);
    const [friends, setFriends] = useState([]);
    const [friendProfiles, setFriendProfiles] = useState({});
    const [incomingRequests, setIncomingRequests] = useState([]);
    const [activeChat, setActiveChat] = useState(null);
    const [messages, setMessages] = useState([]);
    const [inputText, setInputText] = useState('');
    const [view, setView] = useState('list');
    const [showSettings, setShowSettings] = useState(false);
    const [friendIdInput, setFriendIdInput] = useState('');
    const [isTypingMap, setIsTypingMap] = useState({});
    const [openMenuId, setOpenMenuId] = useState(null);
    const [deleteModal, setDeleteModal] = useState({ open: false, type: null, target: null });

    const [onlineStatus, setOnlineStatus] = useState({});
    const [totalOnline, setTotalOnline] = useState(0);

    const [notifEnabled, setNotifEnabled] = useState(() => localStorage.getItem('onyx_notif_enabled') !== 'false');
    const [showNotifModal, setShowNotifModal] = useState(false);

    const activeChatRef = useRef(null);
    const messagesEndRef = useRef(null);
    const textareaRef = useRef(null);
    const fileInputRef = useRef(null);
    const chatFileRef = useRef(null);
    const presRtdbRef = useRef(null);
    const allPresListenerRef = useRef(null);
    const connListenerRef = useRef(null);

    // ── RGPD handlers ──
    const handleAgeConfirm = () => { setAgeConfirmed(true); setShowAgeGate(false); if (!consentState) setShowConsentBanner(true); };
    const handleAgeDeny = () => setShowAgeGate(false);
    const handleConsentAccept = () => { const c = saveConsent({presence:true,notifications:true,analytics:false,ageConfirmed:true,accepted:true}); setConsentState(c); setShowConsentBanner(false); };
    const handleConsentRefuse = () => { const c = saveConsent({presence:false,notifications:false,analytics:false,ageConfirmed:true,accepted:false}); setConsentState(c); setShowConsentBanner(false); };
    const handleConsentSave = (prefs) => { const c = saveConsent({...prefs,ageConfirmed:true,accepted:true}); setConsentState(c); setShowConsentBanner(false); setShowCustomizer(false); };
    const openConsentManager = () => setShowConsentBanner(true);
    const handleDeleteAccount = async () => {
        try { await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('profiles').doc(user.uid).delete(); await user.delete(); } catch { auth.signOut(); }
        revokeConsent(); window.location.reload();
    };

    useEffect(() => { if (!ageConfirmed) setShowAgeGate(true); else if (!consentState) setShowConsentBanner(true); }, []);

    // ── AUTH ──
    useEffect(() => {
        const unsub = auth.onAuthStateChanged(async (u) => {
            if (u) {
                setUser(u);
                const ref = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('profiles').doc(u.uid);
                ref.onSnapshot(doc => {
                    if (doc.exists) setProfile(doc.data());
                    else { const np = { uid:u.uid, displayName:u.email.split('@')[0], photoURL:getAvatar(u.email.split('@')[0]), createdAt:firebase.firestore.FieldValue.serverTimestamp() }; ref.set(np); setProfile(np); }
                });
            } else {
                setUser(null);
                setOnlineStatus({});
                setTotalOnline(0);
            }
            setLoading(false);
        });
        return unsub;
    }, []);

    useEffect(() => { activeChatRef.current = activeChat; }, [activeChat]);

    useEffect(() => {
        if (!user) return;
        const asked = localStorage.getItem('onyx_notif_asked');
        if (!asked && 'Notification' in window && consentState?.notifications !== false) setTimeout(() => setShowNotifModal(true), 2000);
    }, [user, consentState]);

    // ── PRÉSENCE ──
    useEffect(() => {
        if (!user) return;

        const presRef = rtdb.ref(`presence/${user.uid}`);
        presRtdbRef.current = presRef;

        const connRef = rtdb.ref('.info/connected');

        const connHandler = (snap) => {
            if (!snap.val()) return;
            presRef.onDisconnect().set({
                online: false,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                if (consentState?.presence) {
                    presRef.set({ online: true, lastSeen: firebase.database.ServerValue.TIMESTAMP });
                }
            });
        };
        connRef.on('value', connHandler);
        connListenerRef.current = { ref: connRef, handler: connHandler };

        if (!consentState?.presence) {
            presRef.set({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
        }

        const onVisibilityChange = () => {
            if (!consentState?.presence) return;
            presRef.set({
                online: document.visibilityState !== 'hidden',
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });
        };
        document.addEventListener('visibilitychange', onVisibilityChange);

        const allPresRef = rtdb.ref('presence');
        const allPresHandler = (snap) => {
            const map = {};
            let cnt = 0;
            snap.forEach(child => {
                const v = child.val();
                const isOnline = v != null && v.online === true;
                map[child.key] = isOnline;
                if (isOnline) cnt++;
            });
            setOnlineStatus(map);
            setTotalOnline(cnt);
        };
        allPresRef.on('value', allPresHandler);
        allPresListenerRef.current = { ref: allPresRef, handler: allPresHandler };

        return () => {
            connRef.off('value', connHandler);
            allPresRef.off('value', allPresHandler);
            document.removeEventListener('visibilitychange', onVisibilityChange);
            presRef.set({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
        };
    }, [user, consentState?.presence]);

    // ── CONTACTS ──
    useEffect(() => {
        if (!user) return;
        const unsubF = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('contacts').doc('list')
            .onSnapshot(doc => { if (doc.exists) setFriends(doc.data().friends||[]); else setFriends([]); });
        const unsubR = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('friendRequests')
            .where('toId','==',user.uid).where('status','==','pending')
            .onSnapshot(snap => setIncomingRequests(snap.docs.map(d => ({id:d.id,...d.data()}))));
        return () => { unsubF(); unsubR(); };
    }, [user]);

    useEffect(() => {
        if (!user || friends.length===0) return;
        const unsubs = friends.map(f =>
            db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('profiles').doc(f.uid)
                .onSnapshot(doc => { if (doc.exists) setFriendProfiles(prev => ({...prev,[f.uid]:doc.data()})); })
        );
        return () => unsubs.forEach(u => u());
    }, [friends, user]);

    // ── MESSAGES ──
    useEffect(() => {
        if (!user || !activeChat) return;
        const chatId = [user.uid, activeChat.uid].sort().join('_');

        const unsub = db.collection('artifacts').doc(APP_ID)
            .collection('public').doc('data')
            .collection('chats').doc(chatId)
            .collection('messages')
            .orderBy('timestamp', 'asc')
            .onSnapshot(
                (snap) => {
                    const raw = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMessages(raw);
                    setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                },
                (err) => {
                    console.warn('orderBy indisponible, tri côté client :', err.message);
                    db.collection('artifacts').doc(APP_ID)
                        .collection('public').doc('data')
                        .collection('chats').doc(chatId)
                        .collection('messages')
                        .onSnapshot((snap2) => {
                            const raw = snap2.docs
                                .map(d => ({ id: d.id, ...d.data() }))
                                .sort((a, b) => {
                                    const ta = a.timestamp?.toMillis?.() ?? (a.timestamp?.seconds ?? 0) * 1000;
                                    const tb = b.timestamp?.toMillis?.() ?? (b.timestamp?.seconds ?? 0) * 1000;
                                    return ta - tb;
                                });
                            setMessages(raw);
                            setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                        });
                }
            );
        return () => unsub();
    }, [user, activeChat]);

    // ── ENVOI MESSAGE ──
    const sendMessage = async () => {
        if (!inputText.trim() || !activeChat) return;
        const chatId = [user.uid, activeChat.uid].sort().join('_');
        const text = inputText.trim();
        setInputText('');
        if (textareaRef.current) textareaRef.current.style.height = 'auto';

        await db.collection('artifacts').doc(APP_ID)
            .collection('public').doc('data')
            .collection('chats').doc(chatId)
            .collection('messages')
            .add({
                text,
                senderId: user.uid,
                senderName: profile.displayName,
                reactions: {},
                readBy: [],
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
    };

    const respondToRequest = async (req, accept) => {
        const batch = db.batch();
        const reqRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('friendRequests').doc(req.id);
        if (accept) {
            batch.set(db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('contacts').doc('list'), { friends: firebase.firestore.FieldValue.arrayUnion({uid:req.fromId}) }, {merge:true});
            batch.set(db.collection('artifacts').doc(APP_ID).collection('users').doc(req.fromId).collection('contacts').doc('list'), { friends: firebase.firestore.FieldValue.arrayUnion({uid:user.uid}) }, {merge:true});
            batch.update(reqRef, {status:'accepted'});
        } else batch.update(reqRef, {status:'rejected'});
        await batch.commit();
    };

    const deleteMessage = async (msgId) => {
        const chatId = [user.uid, activeChat.uid].sort().join('_');
        await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').doc(msgId).delete();
    };

    const deleteFriend = async (friendUid) => {
        const myRef = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('contacts').doc('list');
        const fRef = db.collection('artifacts').doc(APP_ID).collection('users').doc(friendUid).collection('contacts').doc('list');
        const batch = db.batch();
        batch.update(myRef, { friends: firebase.firestore.FieldValue.arrayRemove({uid: friendUid}) });
        batch.update(fRef, { friends: firebase.firestore.FieldValue.arrayRemove({uid: user.uid}) });
        await batch.commit();
        if (activeChat?.uid === friendUid) { setActiveChat(null); setView('list'); }
    };

    const deleteConversation = async (friendUid) => {
        const chatId = [user.uid, friendUid].sort().join('_');
        const snap = await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').get();
        const batch = db.batch(); snap.docs.forEach(d => batch.delete(d.ref)); await batch.commit();
    };

    const toggleNotifications = async () => {
        if (!notifEnabled) {
            if (Notification.permission === 'granted') { setNotifEnabled(true); localStorage.setItem('onyx_notif_enabled','true'); }
            else { const r = await Notification.requestPermission().catch(()=>'denied'); localStorage.setItem('onyx_notif_enabled',r==='granted'?'true':'false'); setNotifEnabled(r==='granted'); }
        } else { setNotifEnabled(false); localStorage.setItem('onyx_notif_enabled','false'); }
    };

    const autoResize = () => {
        const ta = textareaRef.current; if (!ta) return;
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    };

    const formatTime = (timestamp) => {
        if (!timestamp) return '...';
        try {
            const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp.seconds * 1000);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } catch { return '...'; }
    };

    const isOnline = (uid) => consentState?.presence === true && onlineStatus[uid] === true;

    if (showPrivacyPage) return <PrivacyPage onClose={() => setShowPrivacyPage(false)}/>;
    if (showTermsPage) return <TermsPage onClose={() => setShowTermsPage(false)}/>;
    if (showAgeGate) return <AgeGate onConfirm={handleAgeConfirm} onDeny={handleAgeDeny}/>;

    if (!ageConfirmed && !showAgeGate) return (
        <div style={{height:'100dvh',background:'#020617',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px',textAlign:'center'}}>
            <div className="fade-in">
                <div style={{fontSize:'48px',marginBottom:'16px'}}>🔒</div>
                <h2 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'18px',color:'white',marginBottom:'8px'}}>Accès non autorisé</h2>
                <p style={{color:'#64748b',fontSize:'12px',lineHeight:1.7,maxWidth:'280px',margin:'0 auto 20px'}}>ONYX CHAT est réservé aux personnes de 15 ans ou plus (RGPD art. 8 · DSA art. 28).</p>
                <button onClick={()=>setShowAgeGate(true)} style={{padding:'12px 24px',background:'rgba(30,41,59,.8)',border:'1px solid #1e293b',borderRadius:'12px',color:'#94a3b8',fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:'10px',letterSpacing:'.1em',textTransform:'uppercase',cursor:'pointer'}}>J'ai en réalité 15 ans ou plus</button>
            </div>
        </div>
    );

    if (loading) return null;

    return (
        <div style={{height:'100dvh',overflow:'hidden'}}>
            {/* ── Couches RGPD ── */}
            {showAgeGate && <AgeGate onConfirm={handleAgeConfirm} onDeny={handleAgeDeny}/>}
            {!showAgeGate && showConsentBanner && !showCustomizer && (
                <ConsentBanner onAccept={handleConsentAccept} onRefuse={handleConsentRefuse}
                    onCustomize={() => { setShowConsentBanner(false); setShowCustomizer(true); }}
                    onPrivacy={() => setShowPrivacyPage(true)} onTerms={() => setShowTermsPage(true)}/>
            )}
            {showCustomizer && <ConsentCustomizer onSave={handleConsentSave} onClose={() => { setShowCustomizer(false); if (!consentState) setShowConsentBanner(true); }}/>}
            {showRightsModal && user && <RightsModal user={user} onClose={() => setShowRightsModal(false)} onDeleteAccount={handleDeleteAccount}/>}

            {consentState && !user && <AuthScreen onShowPrivacy={() => setShowPrivacyPage(true)} onShowTerms={() => setShowTermsPage(true)}/>}

            {consentState && user && (
                <div className="app-shell">
                    {/* ══════════════ SIDEBAR ══════════════ */}
                    <aside className="sidebar" style={{display: view==='chat'?'none':'flex'}}
                        ref={el => { if (el && window.innerWidth>=768) el.style.display='flex'; }}>
                        <style>{`@media(min-width:768px){.sidebar{display:flex!important}}`}</style>

                        <div style={{padding:'16px',paddingTop:'calc(1rem + env(safe-area-inset-top))',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid #1e293b',background:'rgba(15,23,42,.3)',flexShrink:0}}>
                            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                                <OnyxMonogram size={32}/>
                                <h2 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'15px',letterSpacing:'.15em',textTransform:'uppercase',fontStyle:'italic',color:'white'}}>ONYX</h2>
                            </div>
                            <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
                                {consentState?.presence && totalOnline > 0 && (
                                    <div style={{display:'flex',alignItems:'center',gap:'5px',background:'rgba(74,222,128,.08)',border:'1px solid rgba(74,222,128,.2)',padding:'3px 8px',borderRadius:'8px',marginRight:'4px'}}>
                                        <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'#4ade80',animation:'onlinePulse 2.5s ease-in-out infinite'}}/>
                                        <span style={{fontSize:'9px',fontWeight:800,color:'#4ade80',textTransform:'uppercase',letterSpacing:'.1em'}}>{totalOnline} en ligne</span>
                                    </div>
                                )}
                                <button onClick={()=>setShowSettings(true)} style={{padding:'8px',color:'#94a3b8',borderRadius:'8px',background:'transparent',border:'none',cursor:'pointer'}}><Icon name="settings"/></button>
                            </div>
                        </div>

                        <div style={{flex:1,overflowY:'auto',padding:'16px'}} className="custom-scrollbar">
                            {incomingRequests.length > 0 && (
                                <div style={{marginBottom:'16px'}}>
                                    <p style={{fontSize:'9px',color:'#eab308',textTransform:'uppercase',fontWeight:800,letterSpacing:'.1em',marginBottom:'8px'}}>Demandes en attente</p>
                                    {incomingRequests.map(req => (
                                        <div key={req.id} style={{background:'rgba(15,23,42,.8)',border:'1px solid #1e293b',padding:'12px',borderRadius:'16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px',marginBottom:'8px'}}>
                                            <div style={{display:'flex',alignItems:'center',gap:'8px',overflow:'hidden'}}>
                                                <img src={req.fromPhoto||getAvatar(req.fromName)} style={{width:'32px',height:'32px',borderRadius:'8px',objectFit:'cover',flexShrink:0}}/>
                                                <p style={{fontSize:'10px',fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'white'}}>{req.fromName}</p>
                                            </div>
                                            <div style={{display:'flex',gap:'6px',flexShrink:0}}>
                                                <button onClick={()=>respondToRequest(req,true)} style={{padding:'6px',background:'rgba(74,222,128,.15)',border:'1px solid rgba(74,222,128,.3)',borderRadius:'8px',color:'#4ade80',cursor:'pointer',display:'flex'}}><Icon name="check" size={12}/></button>
                                                <button onClick={()=>respondToRequest(req,false)} style={{padding:'6px',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:'8px',color:'#f87171',cursor:'pointer',display:'flex'}}><Icon name="x" size={12}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div style={{marginBottom:'16px'}}>
                                <p style={{fontSize:'9px',color:'#475569',textTransform:'uppercase',fontWeight:700,letterSpacing:'.1em',marginBottom:'8px'}}>Ajouter via ID</p>
                                <div style={{display:'flex',gap:'8px'}}>
                                    <input placeholder="ID du contact..." style={{flex:1,background:'rgba(15,23,42,.8)',border:'1px solid #1e293b',borderRadius:'10px',padding:'8px 12px',fontSize:'10px',color:'white',outline:'none'}} value={friendIdInput} onChange={e=>setFriendIdInput(e.target.value)}/>
                                    <button onClick={async()=>{
                                        if (!friendIdInput||friendIdInput===user.uid) return;
                                        const snap = await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('profiles').doc(friendIdInput).get();
                                        if (!snap.exists) { alert("ID introuvable"); return; }
                                        await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('friendRequests').add({fromId:user.uid,fromName:profile.displayName,fromPhoto:profile.photoURL,toId:friendIdInput,status:'pending',timestamp:firebase.firestore.FieldValue.serverTimestamp()});
                                        alert("Demande envoyée !"); setFriendIdInput('');
                                    }} style={{background:'#2563eb',padding:'8px 12px',borderRadius:'10px',border:'none',cursor:'pointer',color:'white',display:'flex'}}><Icon name="userplus" size={14}/></button>
                                </div>
                            </div>

                            <div>
                                <p style={{fontSize:'9px',color:'#475569',textTransform:'uppercase',fontWeight:700,letterSpacing:'.1em',marginBottom:'8px'}}>Conversations</p>
                                {friends.length === 0 && <p style={{fontSize:'10px',color:'#334155',fontStyle:'italic',textAlign:'center',marginTop:'20px'}}>Aucun contact pour l'instant.</p>}
                                {friends.map(f => {
                                    const fd = friendProfiles[f.uid]||{};
                                    const friendOnline = isOnline(f.uid);
                                    return (
                                        <div key={f.uid}
                                            style={{padding:'12px',borderRadius:'16px',display:'flex',alignItems:'center',gap:'12px',cursor:'pointer',marginBottom:'4px',background:activeChat?.uid===f.uid?'#2563eb':'transparent',transition:'background .2s'}}
                                            onClick={()=>{setActiveChat({uid:f.uid,...fd});setView('chat');}}>
                                            <div style={{position:'relative',flexShrink:0}}>
                                                <img src={fd.photoURL||getAvatar(fd.displayName)} style={{width:'44px',height:'44px',borderRadius:'12px',objectFit:'cover',background:'#1e293b'}}/>
                                                {consentState?.presence && (
                                                    <div style={{position:'absolute',bottom:'-2px',right:'-2px'}}>
                                                        <PresenceDot isOnline={friendOnline} size={11} borderColor={activeChat?.uid===f.uid ? '#2563eb' : '#020617'}/>
                                                    </div>
                                                )}
                                            </div>
                                            <div style={{flex:1,minWidth:0}}>
                                                <p style={{fontWeight:700,fontSize:'13px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'white'}}>{fd.displayName||'Contact'}</p>
                                                {consentState?.presence && (
                                                    <p style={{
                                                        fontSize:'9px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',
                                                        color: friendOnline
                                                            ? '#4ade80'
                                                            : (activeChat?.uid===f.uid ? 'rgba(255,255,255,.45)' : '#475569'),
                                                        marginTop:'2px',
                                                        display:'flex',alignItems:'center',gap:'4px'
                                                    }}>
                                                        {friendOnline ? '● En ligne' : '○ Hors ligne'}
                                                    </p>
                                                )}
                                            </div>
                                            <div style={{display:'flex',gap:'4px'}} onClick={e=>e.stopPropagation()}>
                                                <button onClick={()=>setDeleteModal({open:true,type:'conversation',target:f.uid})} style={{padding:'6px',background:'transparent',border:'none',cursor:'pointer',color:'#475569',borderRadius:'6px'}}><Icon name="messageoff" size={13}/></button>
                                                <button onClick={()=>setDeleteModal({open:true,type:'friend',target:f.uid})} style={{padding:'6px',background:'transparent',border:'none',cursor:'pointer',color:'#475569',borderRadius:'6px'}}><Icon name="userminus" size={13}/></button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Footer sidebar */}
                        <div style={{borderTop:'1px solid #1e293b',background:'rgba(15,23,42,.3)',flexShrink:0}}>
                            <div style={{padding:'12px 16px',display:'flex',alignItems:'center',gap:'10px'}}>
                                <div style={{position:'relative'}}>
                                    <img src={profile.photoURL||getAvatar(profile.displayName)} style={{width:'36px',height:'36px',borderRadius:'10px',objectFit:'cover',background:'#2563eb'}}/>
                                    <div style={{position:'absolute',bottom:'-2px',right:'-2px'}}>
                                        <PresenceDot isOnline={true} size={10} borderColor="#020617"/>
                                    </div>
                                </div>
                                <div style={{flex:1,minWidth:0}}>
                                    <p style={{fontSize:'11px',fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'Syne,sans-serif',color:'white'}}>{profile.displayName}</p>
                                    <p style={{fontSize:'8px',color:'#4ade80',fontWeight:700}}>● En ligne</p>
                                </div>
                                <button onClick={()=>auth.signOut()} style={{padding:'8px',color:'#94a3b8',background:'transparent',border:'none',cursor:'pointer',borderRadius:'8px'}}><Icon name="logout" size={15}/></button>
                            </div>
                            <div style={{padding:'0 16px',paddingBottom:'calc(10px + env(safe-area-inset-bottom))',display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',flexWrap:'wrap'}}>
                                <button onClick={()=>setShowPrivacyPage(true)} style={{fontSize:'8px',color:'#475569',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',background:'none',border:'none',cursor:'pointer'}}><Icon name="shield" size={9}/> Confidentialité</button>
                                <span style={{color:'#1e293b'}}>·</span>
                                <button onClick={()=>setShowTermsPage(true)} style={{fontSize:'8px',color:'#475569',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',background:'none',border:'none',cursor:'pointer'}}>CGU</button>
                                <span style={{color:'#1e293b'}}>·</span>
                                <button onClick={openConsentManager} style={{fontSize:'8px',color:'#475569',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',background:'none',border:'none',cursor:'pointer'}}>Cookies</button>
                                <span style={{color:'#1e293b'}}>·</span>
                                <button onClick={()=>setShowRightsModal(true)} style={{fontSize:'8px',color:'#475569',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',background:'none',border:'none',cursor:'pointer'}}>Mes droits</button>
                            </div>
                        </div>
                    </aside>

                    {/* ══════════════ CHAT MAIN ══════════════ */}
                    <main className="chat-main" style={{display:view==='list'?'none':'flex'}}
                        ref={el=>{if(el&&window.innerWidth>=768)el.style.display='flex';}}>
                        <style>{`@media(min-width:768px){main.chat-main{display:flex!important}}`}</style>

                        {activeChat ? (
                            <>
                                <header style={{flexShrink:0,padding:'12px 16px',paddingTop:'calc(12px + env(safe-area-inset-top))',borderBottom:'1px solid #1e293b',display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(15,23,42,.5)',backdropFilter:'blur(16px)'}}>
                                    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                                        <button onClick={()=>setView('list')} style={{display:'flex',padding:'8px',color:'#94a3b8',background:'transparent',border:'none',cursor:'pointer',marginLeft:'-8px'}}><Icon name="arrowleft"/></button>
                                        <div style={{position:'relative'}}>
                                            <img src={activeChat.photoURL||getAvatar(activeChat.displayName)} style={{width:'40px',height:'40px',borderRadius:'12px',objectFit:'cover',background:'#1e293b'}}/>
                                            {consentState?.presence && (
                                                <div style={{position:'absolute',bottom:'-2px',right:'-2px'}}>
                                                    <PresenceDot isOnline={isOnline(activeChat.uid)} size={11} borderColor="#0f172a"/>
                                                </div>
                                            )}
                                        </div>
                                        <div>
                                            <h3 style={{fontWeight:700,fontSize:'14px',lineHeight:1.2,fontFamily:'Syne,sans-serif',color:'white'}}>{activeChat.displayName}</h3>
                                            {consentState?.presence && (
                                                <p style={{fontSize:'10px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',
                                                    color: isTypingMap[activeChat.uid] ? '#3b82f6' : isOnline(activeChat.uid) ? '#4ade80' : '#64748b',
                                                    marginTop:'1px'}}>
                                                    {isTypingMap[activeChat.uid]
                                                        ? "En train d'écrire..."
                                                        : isOnline(activeChat.uid) ? 'En ligne' : 'Hors ligne'}
                                                </p>
                                            )}
                                        </div>
                                    </div>
                                </header>

                                <div className="messages-scroll custom-scrollbar" style={{padding:'16px',paddingBottom:'8px'}} onClick={()=>setOpenMenuId(null)}>
                                    {messages.length === 0 && (
                                        <div style={{textAlign:'center',marginTop:'40px',color:'#334155',fontSize:'11px'}}>
                                            <div style={{fontSize:'32px',marginBottom:'8px'}}>💬</div>
                                            <p style={{fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em'}}>Aucun message</p>
                                            <p style={{marginTop:'4px',fontSize:'10px'}}>Envoyez le premier message !</p>
                                        </div>
                                    )}
                                    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
                                        {messages.map(msg => {
                                            const isMe = msg.senderId === user.uid;
                                            return (
                                                <div key={msg.id} style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start'}} className="fade-in">
                                                    <div style={{maxWidth:'80%',padding:'12px 16px',borderRadius:'18px',background:isMe?'#2563eb':'rgba(15,23,42,.8)',border:isMe?'none':'1px solid #1e293b',borderTopRightRadius:isMe?'4px':'18px',borderTopLeftRadius:isMe?'18px':'4px',cursor:'pointer'}}
                                                        onClick={e=>{e.stopPropagation();setOpenMenuId(openMenuId===msg.id?null:msg.id);}}>
                                                        <p style={{fontSize:'14px',lineHeight:1.6,whiteSpace:'pre-wrap',wordBreak:'break-word',color:'white'}}>
                                                            {msg.text || <span style={{color:'rgba(255,255,255,.3)',fontStyle:'italic',fontSize:'12px'}}>[message vide]</span>}
                                                        </p>
                                                    </div>
                                                    {openMenuId===msg.id && (
                                                        <div className="ctx-menu" style={{display:'flex',gap:'4px',marginTop:'4px',background:'rgba(15,23,42,.9)',border:'1px solid #1e293b',padding:'6px',borderRadius:'14px',alignItems:'center'}} onClick={e=>e.stopPropagation()}>
                                                            {EMOJIS.map(e=>(
                                                                <button key={e} style={{padding:'6px',borderRadius:'8px',background:'transparent',border:'none',cursor:'pointer',fontSize:'18px'}} className="emoji-native">{e}</button>
                                                            ))}
                                                            {isMe && <button onClick={()=>{deleteMessage(msg.id);setOpenMenuId(null);}} style={{padding:'6px',background:'transparent',border:'none',cursor:'pointer',color:'#f87171',borderRadius:'8px',display:'flex'}}><Icon name="trash" size={14}/></button>}
                                                        </div>
                                                    )}
                                                    <span style={{fontSize:'8px',color:'#475569',fontWeight:700,marginTop:'3px'}}>{formatTime(msg.timestamp)}</span>
                                                </div>
                                            );
                                        })}
                                        <div ref={messagesEndRef}/>
                                    </div>
                                </div>

                                <div className="chat-footer">
                                    <div style={{display:'flex',alignItems:'flex-end',gap:'12px',maxWidth:'900px',margin:'0 auto'}}>
                                        <button onClick={()=>chatFileRef.current.click()} style={{padding:'12px',background:'rgba(15,23,42,.8)',border:'1px solid #1e293b',borderRadius:'14px',color:'#94a3b8',cursor:'pointer',display:'flex',flexShrink:0}}><Icon name="plus" size={18}/></button>
                                        <div style={{flex:1,position:'relative'}}>
                                            <textarea ref={textareaRef} rows="1" placeholder="Tapez votre message..."
                                                style={{width:'100%',background:'rgba(15,23,42,.8)',border:'1px solid #1e293b',borderRadius:'18px',padding:'12px 48px 12px 18px',color:'white',fontSize:'14px',outline:'none',fontFamily:'DM Sans,sans-serif',resize:'none'}}
                                                value={inputText}
                                                onChange={e=>{setInputText(e.target.value);autoResize();}}
                                                onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}}
                                            />
                                            <button onClick={sendMessage} style={{position:'absolute',right:'10px',bottom:'10px',padding:'6px',color: inputText.trim() ? '#3b82f6' : '#334155',background:'transparent',border:'none',cursor:'pointer',display:'flex',transition:'color .2s'}}><Icon name="send" size={18}/></button>
                                        </div>
                                    </div>
                                    <input type="file" ref={chatFileRef} style={{display:'none'}} accept="image/*,audio/*,video/*" onChange={()=>{}}/>
                                </div>
                            </>
                        ) : (
                            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px',textAlign:'center',background:'#020617'}}>
                                <div className="auth-logo auth-logo-glow" style={{marginBottom:'24px'}}>
                                    <svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
                                        <defs><linearGradient id="homeGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#1e3a8a"/><stop offset="100%" stopColor="#3b82f6"/></linearGradient></defs>
                                        <rect width="96" height="96" rx="26" fill="url(#homeGrad)" stroke="rgba(96,165,250,.2)" strokeWidth="1"/>
                                        <text x="48" y="68" textAnchor="middle" fontFamily="Georgia,'Times New Roman',serif" fontWeight="900" fontSize="62" fill="white" letterSpacing="-2">O</text>
                                    </svg>
                                </div>
                                <h2 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'20px',letterSpacing:'.15em',textTransform:'uppercase',fontStyle:'italic',color:'white',marginBottom:'6px'}}>ONYX CHAT</h2>
                                <p style={{color:'#b8924a',fontSize:'10px',fontWeight:700,letterSpacing:'.2em',textTransform:'uppercase',marginBottom:'8px'}}>By Rijoul</p>
                                <p style={{color:'#475569',fontSize:'11px',fontWeight:500,maxWidth:'240px',lineHeight:1.7,textTransform:'uppercase',letterSpacing:'.06em'}}>Sélectionnez un contact pour démarrer une conversation.</p>
                            </div>
                        )}
                    </main>

                    {/* ══════════════ SETTINGS ══════════════ */}
                    {showSettings && (
                        <div className="settings-overlay">
                            <div style={{background:'rgba(15,23,42,.95)',border:'1px solid #1e293b',borderRadius:'2.5rem',width:'100%',maxWidth:'420px',overflowY:'auto',maxHeight:'90vh'}} className="fade-in custom-scrollbar">
                                <div style={{padding:'28px',borderBottom:'1px solid #1e293b',textAlign:'center',position:'relative',background:'rgba(15,23,42,.5)'}}>
                                    <button onClick={()=>setShowSettings(false)} style={{position:'absolute',top:'20px',right:'20px',padding:'8px',color:'#94a3b8',background:'rgba(30,41,59,.8)',border:'1px solid #1e293b',borderRadius:'10px',cursor:'pointer',display:'flex'}}><Icon name="x"/></button>
                                    <div style={{display:'flex',justifyContent:'center',marginBottom:'12px'}}><OnyxMonogram size={36} className="auth-logo-glow"/></div>
                                    <div style={{position:'relative',display:'inline-block',marginBottom:'12px'}}>
                                        <img src={profile.photoURL||getAvatar(profile.displayName)} style={{width:'72px',height:'72px',borderRadius:'18px',objectFit:'cover',border:'2px solid rgba(37,99,235,.3)'}}/>
                                        <button onClick={()=>fileInputRef.current.click()} style={{position:'absolute',bottom:'-6px',right:'-6px',background:'#2563eb',padding:'6px',borderRadius:'10px',border:'3px solid #0f172a',cursor:'pointer',display:'flex'}}><Icon name="plus" size={12}/></button>
                                    </div>
                                    <h3 style={{fontFamily:'Syne,sans-serif',fontSize:'16px',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',fontStyle:'italic',color:'white'}}>{profile.displayName}</h3>
                                </div>

                                <div style={{padding:'24px',display:'flex',flexDirection:'column',gap:'20px'}}>
                                    <div>
                                        <label style={{fontSize:'9px',color:'#475569',textTransform:'uppercase',letterSpacing:'.1em',fontWeight:800,display:'block',marginBottom:'8px'}}>Nom d'affichage</label>
                                        <div style={{display:'flex',gap:'8px'}}>
                                            <input style={{flex:1,background:'rgba(2,6,23,.7)',border:'1px solid #1e293b',borderRadius:'12px',padding:'10px 14px',fontSize:'13px',color:'white',outline:'none'}} value={profile.displayName} onChange={e=>setProfile({...profile,displayName:e.target.value})}/>
                                            <button onClick={async()=>{ await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('profiles').doc(user.uid).update({displayName:profile.displayName}); }} style={{background:'#2563eb',padding:'10px 16px',borderRadius:'12px',fontWeight:700,fontSize:'10px',color:'white',border:'none',cursor:'pointer',textTransform:'uppercase',letterSpacing:'.08em'}}>Sauv.</button>
                                        </div>
                                    </div>

                                    <div>
                                        <label style={{fontSize:'9px',color:'#475569',textTransform:'uppercase',letterSpacing:'.1em',fontWeight:800,display:'block',marginBottom:'8px'}}>Mon identifiant (à partager)</label>
                                        <div style={{display:'flex',gap:'8px'}}>
                                            <div style={{flex:1,background:'rgba(2,6,23,.5)',border:'1px solid #1e293b',borderRadius:'12px',padding:'10px 14px',fontSize:'10px',fontFamily:'monospace',color:'#64748b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.uid}</div>
                                            <button onClick={()=>navigator.clipboard.writeText(user.uid)} style={{background:'rgba(30,41,59,.8)',border:'1px solid #1e293b',borderRadius:'12px',padding:'10px 14px',fontSize:'10px',fontWeight:700,color:'#94a3b8',cursor:'pointer',flexShrink:0}}>Copier</button>
                                        </div>
                                    </div>

                                    {/* Notifications */}
                                    <div style={{background:'rgba(2,6,23,.5)',border:'1px solid #1e293b',borderRadius:'16px',padding:'14px'}}>
                                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px'}}>
                                            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                                                <div style={{width:'36px',height:'36px',borderRadius:'10px',background:notifEnabled?'rgba(37,99,235,.15)':'rgba(30,41,59,.6)',border:`1px solid ${notifEnabled?'rgba(37,99,235,.25)':'rgba(30,41,59,.8)'}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                                                    <Icon name={notifEnabled?'bell':'belloff'} size={16} className={notifEnabled?'text-blue-400':'text-slate-600'}/>
                                                </div>
                                                <div>
                                                    <p style={{fontSize:'10px',fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',color:'white'}}>Notifications</p>
                                                    <p style={{fontSize:'8px',color:'#64748b',textTransform:'uppercase',letterSpacing:'.06em',marginTop:'2px'}}>{notifEnabled?'Activées':'Désactivées'}</p>
                                                </div>
                                            </div>
                                            <button onClick={toggleNotifications} className="toggle-track" style={{background:notifEnabled?'#2563eb':'#1e293b',border:'none',cursor:'pointer'}}>
                                                <div className="toggle-thumb" style={{left:notifEnabled?'23px':'3px'}}/>
                                            </button>
                                        </div>
                                    </div>

                                    {/* RGPD */}
                                    <div style={{borderTop:'1px solid #1e293b',paddingTop:'20px'}}>
                                        <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'}}>
                                            <Icon name="shield" size={14} className="text-blue-400"/>
                                            <p style={{fontSize:'9px',color:'#3b82f6',fontWeight:800,letterSpacing:'.15em',textTransform:'uppercase'}}>Confidentialité & RGPD</p>
                                        </div>
                                        {[
                                            {label:'Gérer mes préférences de consentement', onClick: openConsentManager },
                                            {label:'Mes droits RGPD (accès, export, effacement)', onClick: () => { setShowSettings(false); setShowRightsModal(true); } },
                                            {label:'Politique de confidentialité', onClick: () => { setShowSettings(false); setShowPrivacyPage(true); } },
                                            {label:'CGU', onClick: () => { setShowSettings(false); setShowTermsPage(true); } },
                                        ].map((item,i) => (
                                            <button key={i} onClick={item.onClick} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px',background:'rgba(2,6,23,.5)',border:'1px solid rgba(30,41,59,.8)',borderRadius:'12px',cursor:'pointer',width:'100%',marginBottom:'6px',textAlign:'left'}}>
                                                <span style={{fontSize:'10px',fontWeight:700,color:'white'}}>{item.label}</span>
                                                <Icon name="arrowright" size={12} className="text-slate-600"/>
                                            </button>
                                        ))}
                                    </div>

                                    <button onClick={()=>auth.signOut()} style={{width:'100%',background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',color:'#f87171',padding:'14px',borderRadius:'16px',fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:'10px',textTransform:'uppercase',letterSpacing:'.15em',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
                                        <Icon name="logout" size={14}/>Déconnexion
                                    </button>
                                </div>
                                <input type="file" ref={fileInputRef} style={{display:'none'}} accept="image/*" onChange={async e=>{
                                    const file = e.target.files[0]; if (!file) return;
                                    const reader = new FileReader(); reader.onload = async ev => {
                                        setProfile({...profile,photoURL:ev.target.result});
                                        await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('profiles').doc(user.uid).update({photoURL:ev.target.result});
                                    }; reader.readAsDataURL(file);
                                }}/>
                            </div>
                        </div>
                    )}

                    {/* ── Delete confirm ── */}
                    {deleteModal.open && (
                        <div className="delete-modal">
                            <div style={{background:'rgba(15,23,42,.95)',border:'1px solid rgba(239,68,68,.2)',borderRadius:'2rem',padding:'24px',width:'100%',maxWidth:'360px'}} className="fade-in">
                                <div style={{textAlign:'center',marginBottom:'20px'}}>
                                    <div style={{width:'48px',height:'48px',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:'14px',margin:'0 auto 12px',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                        <Icon name="trash" size={20} className="text-red-400"/>
                                    </div>
                                    <h3 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'13px',color:'white',marginBottom:'6px'}}>{deleteModal.type==='friend'?'Supprimer cet ami ?':'Effacer la conversation ?'}</h3>
                                    <p style={{fontSize:'10px',color:'#64748b',lineHeight:1.6}}>{deleteModal.type==='friend'?'Cet ami et tous vos messages seront supprimés.':'Tous les messages seront supprimés. Vous resterez amis.'}</p>
                                </div>
                                <div style={{display:'flex',gap:'8px'}}>
                                    <button onClick={()=>setDeleteModal({open:false,type:null,target:null})} style={{flex:1,padding:'12px',borderRadius:'14px',background:'rgba(30,41,59,.8)',border:'1px solid #1e293b',color:'#94a3b8',fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:'10px',cursor:'pointer',textTransform:'uppercase'}}>Annuler</button>
                                    <button onClick={async()=>{
                                        const {target,type}=deleteModal; setDeleteModal({open:false,type:null,target:null});
                                        if (type==='friend') await deleteFriend(target); else await deleteConversation(target);
                                    }} style={{flex:1,padding:'12px',borderRadius:'14px',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.25)',color:'#f87171',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'10px',cursor:'pointer',textTransform:'uppercase'}}>Supprimer</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── Notif modal ── */}
                    {showNotifModal && (
                        <div className="notif-overlay">
                            <div style={{background:'rgba(15,23,42,.95)',border:'1px solid #1e293b',borderRadius:'2rem',padding:'28px',width:'100%',maxWidth:'360px',textAlign:'center'}} className="fade-in">
                                <div style={{width:'60px',height:'60px',background:'rgba(37,99,235,.15)',border:'1px solid rgba(37,99,235,.25)',borderRadius:'18px',margin:'0 auto 16px',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                    <Icon name="bell" size={26} className="text-blue-400"/>
                                </div>
                                <h3 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'14px',textTransform:'uppercase',letterSpacing:'.1em',color:'white',marginBottom:'8px'}}>Notifications</h3>
                                <p style={{fontSize:'11px',color:'#64748b',lineHeight:1.65,marginBottom:'20px'}}>Recevoir une alerte pour chaque nouveau message, même en arrière-plan.</p>
                                <button onClick={async()=>{setShowNotifModal(false);const r=await Notification.requestPermission().catch(()=>'denied');localStorage.setItem('onyx_notif_asked',r);localStorage.setItem('onyx_notif_enabled',r==='granted'?'true':'false');setNotifEnabled(r==='granted');}} style={{width:'100%',padding:'13px',background:'linear-gradient(135deg,#2563eb,#1d4ed8)',border:'none',borderRadius:'16px',color:'white',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'11px',textTransform:'uppercase',letterSpacing:'.1em',cursor:'pointer',marginBottom:'8px'}}>🔔 Activer</button>
                                <button onClick={()=>{setShowNotifModal(false);localStorage.setItem('onyx_notif_asked','dismissed');}} style={{width:'100%',padding:'11px',background:'rgba(30,41,59,.8)',border:'1px solid #1e293b',borderRadius:'16px',color:'#94a3b8',fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:'10px',textTransform:'uppercase',cursor:'pointer'}}>Non merci</button>
                            </div>
                        </div>
                    )}
                </div>
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
