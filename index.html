<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX CHAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing-dot { animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-4px); opacity: 1; } }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCkiMirg--YtJMCENWm6Ba4qBn7XY55qrQ",
            authDomain: "onyx-chat-by-rijoul.firebaseapp.com",
            projectId: "onyx-chat-by-rijoul",
            storageBucket: "onyx-chat-by-rijoul.firebasestorage.app",
            messagingSenderId: "699855199393",
            appId: "1:699855199393:web:0b454be9733e3853ada4e0"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'onyx-pro-chat';

        const getAvatar = (name) => `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=2563eb&color=fff&bold=true&rounded=true`;

        // Utilitaire pour compresser les images avant stockage (Firestore a une limite de 1Mo par document)
        const compressImage = (file, maxWidth = 800, maxHeight = 800) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Compression JPEG à 0.7 de qualité pour réduire drastiquement le poids
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        resolve(dataUrl);
                    };
                };
                reader.onerror = (error) => reject(error);
            });
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z" />,
                logout: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />,
                userplus: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8M19 8v6M22 11h-6" />,
                copy: <React.Fragment><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></React.Fragment>,
                arrowleft: <path d="M19 12H5M12 19l-7-7 7-7" />,
                send: <React.Fragment><path d="m22 2-7 20-4-9-9-4Z" /><path d="M22 2 11 13" /></React.Fragment>,
                plus: <path d="M12 5v14M5 12h14" />,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
                file: <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6" />,
                x: <path d="M18 6 6 18M6 6l12 12" />
            };
            const key = name.toLowerCase();
            return (
                <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[key] || icons['x']}
                </svg>
            );
        };

        const LogoPlaceholder = ({ className = "w-12 h-12" }) => (
            <div className={`${className} bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/20`}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-2/3 h-2/3 text-white">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
            </div>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ displayName: '', photoURL: '' });
            const [loading, setLoading] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');
            
            const [friends, setFriends] = useState([]);
            const [incomingRequests, setIncomingRequests] = useState([]);
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [view, setView] = useState('list');
            const [showSettings, setShowSettings] = useState(false);
            const [friendIdInput, setFriendIdInput] = useState('');
            
            const [lastMessages, setLastMessages] = useState({});
            const [isTypingMap, setIsTypingMap] = useState({});
            const [notifications, setNotifications] = useState({}); 

            const fileInputRef = useRef(null);
            const chatFileRef = useRef(null);
            const messagesEndRef = useRef(null);
            const activeChatRef = useRef(null);
            const typingTimeoutRef = useRef(null);

            useEffect(() => {
                activeChatRef.current = activeChat;
                if (activeChat) {
                    setNotifications(prev => {
                        const next = { ...prev };
                        delete next[activeChat.uid];
                        return next;
                    });
                }
            }, [activeChat]);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const userRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(u.uid);
                        userRef.onSnapshot(doc => {
                            if (doc.exists) setProfile(doc.data());
                            else {
                                const newProfile = { uid: u.uid, displayName: u.email.split('@')[0], photoURL: getAvatar(u.email.split('@')[0]), createdAt: firebase.firestore.FieldValue.serverTimestamp() };
                                userRef.set(newProfile);
                                setProfile(newProfile);
                            }
                        });
                    } else setUser(null);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubFriends = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').doc('list')
                    .onSnapshot(doc => { if (doc.exists) setFriends(doc.data().friends || []); else setFriends([]); });
                
                const unsubRequests = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('friendRequests')
                    .where('toId', '==', user.uid)
                    .where('status', '==', 'pending')
                    .onSnapshot(snap => setIncomingRequests(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));

                return () => { unsubFriends(); unsubRequests(); };
            }, [user]);

            useEffect(() => {
                if (!user || friends.length === 0) return;
                const unsubs = friends.map(friend => {
                    const chatId = [user.uid, friend.uid].sort().join('_');
                    const unsubMsg = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
                        .orderBy('timestamp', 'desc').limit(1)
                        .onSnapshot(snap => {
                            if (!snap.empty) {
                                const lastMsg = snap.docs[0].data();
                                setLastMessages(prev => ({ ...prev, [friend.uid]: lastMsg.fileUrl ? "📷 Pièce jointe" : lastMsg.text }));
                                if (lastMsg.senderId === friend.uid && activeChatRef.current?.uid !== friend.uid) {
                                    setNotifications(prev => ({ ...prev, [friend.uid]: (prev[friend.uid] || 0) + 1 }));
                                }
                            }
                        });
                    const unsubTyping = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId)
                        .onSnapshot(doc => {
                            if (doc.exists) {
                                const data = doc.data();
                                setIsTypingMap(prev => ({ ...prev, [friend.uid]: data.isTyping?.[friend.uid] || false }));
                            }
                        });
                    return () => { unsubMsg(); unsubTyping(); };
                });
                return () => unsubs.forEach(unsub => unsub());
            }, [user, friends]);

            useEffect(() => {
                if (!user || !activeChat) return;
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
                    .orderBy('timestamp', 'asc')
                    .onSnapshot(snap => {
                        setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    });
                return () => unsubscribe();
            }, [user, activeChat]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (isRegistering) await auth.createUserWithEmailAndPassword(email, password);
                    else await auth.signInWithEmailAndPassword(email, password);
                } catch (err) { setAuthError(err.message); }
            };

            const updateTypingStatus = (isTyping) => {
                if (!activeChat) return;
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).set({
                    isTyping: { [user.uid]: isTyping }
                }, { merge: true });
            };

            const sendMessage = async (text = null, fileData = null) => {
                if (!text && !fileData) return;
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                updateTypingStatus(false);
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').add({
                        text: text || '',
                        fileUrl: fileData?.url || null,
                        fileType: fileData?.type || null,
                        fileName: fileData?.name || null,
                        senderId: user.uid,
                        senderName: profile.displayName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setInputText('');
                } catch (err) {
                    console.error(err);
                    alert("Erreur lors de l'envoi. Le fichier est peut-être trop volumineux.");
                }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const type = file.type.split('/')[0];
                
                try {
                    if (type === 'image') {
                        const compressedUrl = await compressImage(file);
                        // Vérification finale de la taille (800KB max pour sécurité Firestore)
                        if (compressedUrl.length > 900000) {
                            alert("L'image est encore trop lourde après compression. Essayez-en une autre.");
                            return;
                        }
                        sendMessage(null, { url: compressedUrl, type: type, name: file.name });
                    } else {
                        // Pour les autres fichiers, on ne peut que limiter la taille
                        if (file.size > 800000) {
                            alert("Ce type de fichier est limité à 800 Ko (limite technique du cloud Onyx).");
                            return;
                        }
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            sendMessage(null, { url: ev.target.result, type: type, name: file.name });
                        };
                        reader.readAsDataURL(file);
                    }
                } catch (err) {
                    alert("Erreur lors du traitement du fichier.");
                }
            };

            const downloadFile = (url, name) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = name || 'onyx-file';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const respondToRequest = async (request, accept) => {
                const batch = db.batch();
                const requestRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('friendRequests').doc(request.id);
                if (accept) {
                    const myContactsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').doc('list');
                    const friendContactsRef = db.collection('artifacts').doc(appId).collection('users').doc(request.fromId).collection('contacts').doc('list');
                    batch.set(myContactsRef, { friends: firebase.firestore.FieldValue.arrayUnion({ uid: request.fromId, name: request.fromName, photoURL: request.fromPhoto }) }, { merge: true });
                    batch.set(friendContactsRef, { friends: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid, name: profile.displayName, photoURL: profile.photoURL }) }, { merge: true });
                    batch.update(requestRef, { status: 'accepted' });
                } else batch.update(requestRef, { status: 'rejected' });
                await batch.commit();
            };

            if (loading) return null;

            if (!user) return (
                <div className="h-screen bg-slate-950 flex items-center justify-center p-4">
                    <div className="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md text-center fade-in">
                        <div className="flex justify-center mb-6"><LogoPlaceholder className="w-20 h-20" /></div>
                        <h1 className="text-3xl font-extrabold text-white mb-8 italic uppercase tracking-widest">ONYX CHAT</h1>
                        <form onSubmit={handleAuth} className="space-y-5 text-left">
                            {authError && <div className="bg-red-500/10 border border-red-500/50 p-3 rounded-xl text-red-500 text-xs font-bold">{authError}</div>}
                            <input type="email" required placeholder="Email" className="w-full bg-slate-800 border border-slate-700 p-3.5 rounded-xl text-white outline-none focus:border-blue-500" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" required placeholder="Mot de passe" className="w-full bg-slate-800 border border-slate-700 p-3.5 rounded-xl text-white outline-none focus:border-blue-500" value={password} onChange={e => setPassword(e.target.value)} />
                            <button type="submit" className="w-full bg-blue-600 p-4 rounded-xl font-bold text-white shadow-lg hover:bg-blue-500 transition-all uppercase tracking-widest">
                                {isRegistering ? "S'inscrire" : "Se connecter"}
                            </button>
                            <button type="button" onClick={() => setIsRegistering(!isRegistering)} className="w-full text-slate-500 text-xs font-bold uppercase tracking-tighter">
                                {isRegistering ? "Déjà un compte ? Connexion" : "Pas de compte ? S'inscrire"}
                            </button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex bg-slate-950 text-white overflow-hidden">
                    <aside className={`w-full md:w-80 border-r border-slate-800 flex flex-col ${view === 'chat' ? 'hidden md:flex' : 'flex'}`}>
                        <div className="p-5 flex justify-between items-center border-b border-slate-800 bg-slate-900/30">
                            <div className="flex items-center gap-3">
                                <LogoPlaceholder className="w-8 h-8" />
                                <h2 className="font-extrabold text-lg italic uppercase tracking-widest">ONYX CHAT</h2>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="text-slate-500 hover:text-white p-2 hover:bg-slate-800 rounded-lg transition-all"><Icon name="settings" /></button>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar p-4">
                            {incomingRequests.length > 0 && (
                                <div className="mb-6 space-y-2">
                                    <p className="text-[10px] text-yellow-500 uppercase font-black px-1 tracking-widest">Demandes</p>
                                    {incomingRequests.map(req => (
                                        <div key={req.id} className="bg-slate-900 border border-slate-800 p-3 rounded-2xl flex items-center justify-between gap-2">
                                            <div className="flex items-center gap-2 overflow-hidden">
                                                <img src={req.fromPhoto || getAvatar(req.fromName)} className="w-8 h-8 rounded-lg bg-slate-800 shrink-0 object-cover" />
                                                <p className="text-[10px] font-bold truncate">{req.fromName}</p>
                                            </div>
                                            <div className="flex gap-1">
                                                <button onClick={() => respondToRequest(req, true)} className="p-2 bg-green-500/20 text-green-500 rounded-lg"><Icon name="plus" size={12}/></button>
                                                <button onClick={() => respondToRequest(req, false)} className="p-2 bg-red-500/20 text-red-500 rounded-lg"><Icon name="x" size={12}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div className="mb-6">
                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-2 px-1 tracking-widest">Nouveau contact</p>
                                <div className="flex gap-2">
                                    <input placeholder="Coller ID..." className="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-[10px] outline-none" value={friendIdInput} onChange={e => setFriendIdInput(e.target.value)} />
                                    <button onClick={async () => {
                                        if (!friendIdInput || friendIdInput === user.uid) return;
                                        const profSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(friendIdInput).get();
                                        if (!profSnap.exists) { alert("ID introuvable"); return; }
                                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('friendRequests').add({
                                            fromId: user.uid, fromName: profile.displayName, fromPhoto: profile.photoURL,
                                            toId: friendIdInput, status: 'pending', timestamp: firebase.firestore.FieldValue.serverTimestamp()
                                        });
                                        alert("Demande envoyée !");
                                        setFriendIdInput('');
                                    }} className="bg-blue-600 px-3 rounded-xl"><Icon name="userplus" size={14}/></button>
                                </div>
                            </div>

                            <div className="space-y-1">
                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-2 px-1 tracking-widest">Discussions</p>
                                {friends.map(f => (
                                    <div key={f.uid} onClick={() => { setActiveChat(f); setView('chat'); }} className={`p-3 rounded-2xl flex items-center gap-3 cursor-pointer transition-all ${activeChat?.uid === f.uid ? 'bg-blue-600' : 'hover:bg-slate-900/60'}`}>
                                        <div className="relative shrink-0">
                                            <img src={f.photoURL || getAvatar(f.name)} className="w-12 h-12 rounded-xl object-cover bg-slate-800 shadow-xl" />
                                            {notifications[f.uid] && <div className="absolute -top-1 -right-1 w-5 h-5 bg-white text-blue-600 rounded-full flex items-center justify-center text-[10px] font-black shadow-lg">{notifications[f.uid]}</div>}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex justify-between items-start">
                                                <p className="font-bold text-sm truncate">{f.name}</p>
                                                {isTypingMap[f.uid] && <span className="text-[8px] text-white/80 font-black animate-pulse">ECRIT...</span>}
                                            </div>
                                            <p className={`text-[10px] truncate ${activeChat?.uid === f.uid ? 'text-blue-100' : 'text-slate-500'}`}>
                                                {lastMessages[f.uid] || "Aucun message"}
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="p-4 border-t border-slate-800 bg-slate-900/20 text-center">
                             <p className="text-[10px] text-slate-500 font-black uppercase mb-1 tracking-tighter italic opacity-50">ONYX CHAT SECURE CLOUD</p>
                             <button onClick={() => {navigator.clipboard.writeText(user.uid); alert("ID Copié !");}} className="w-full flex items-center gap-2 bg-slate-950 p-2 rounded-lg border border-slate-800 text-left">
                                <p className="text-[9px] font-mono text-blue-400 truncate flex-1">{user.uid}</p>
                                <Icon name="copy" size={10} className="text-slate-600"/>
                            </button>
                        </div>
                    </aside>

                    <main className={`flex-1 flex flex-col ${view === 'list' ? 'hidden md:flex' : 'flex'}`}>
                        {activeChat ? (
                            <div className="flex flex-col h-full fade-in bg-[#01030d]">
                                <header className="p-4 border-b border-slate-800 flex items-center gap-3 bg-slate-950/80 backdrop-blur-md z-10">
                                    <button onClick={() => setView('list')} className="md:hidden p-2"><Icon name="arrowleft"/></button>
                                    <img src={activeChat.photoURL || getAvatar(activeChat.name)} className="w-10 h-10 rounded-xl object-cover shadow-lg" />
                                    <div className="flex-1">
                                        <p className="font-bold text-slate-100">{activeChat.name}</p>
                                        {isTypingMap[activeChat.uid] ? (
                                            <div className="flex items-center gap-1">
                                                <span className="text-[10px] text-blue-400 font-bold italic">En train d'écrire</span>
                                                <div className="flex gap-0.5">
                                                    <div className="w-1 h-1 bg-blue-400 rounded-full typing-dot"></div>
                                                    <div className="w-1 h-1 bg-blue-400 rounded-full typing-dot"></div>
                                                    <div className="w-1 h-1 bg-blue-400 rounded-full typing-dot"></div>
                                                </div>
                                            </div>
                                        ) : (
                                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Membre Onyx Chat</p>
                                        )}
                                    </div>
                                </header>

                                <div className="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar">
                                    {messages.map(m => (
                                        <div key={m.id} className={`flex ${m.senderId === user.uid ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] sm:max-w-[70%] flex flex-col gap-1 ${m.senderId === user.uid ? 'items-end' : 'items-start'}`}>
                                                <div className={`p-4 rounded-3xl text-sm shadow-xl ${m.senderId === user.uid ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-900 border border-slate-800 text-slate-200 rounded-tl-none'}`}>
                                                    {m.fileUrl && (
                                                        <div className="mb-3 relative group overflow-hidden rounded-2xl">
                                                            {m.fileType === 'image' ? (
                                                                <img src={m.fileUrl} className="max-w-full rounded-2xl border border-white/10" alt="Envoyé" />
                                                            ) : m.fileType === 'video' ? (
                                                                <video src={m.fileUrl} controls className="max-w-full rounded-2xl" />
                                                            ) : (
                                                                <div className="flex items-center gap-3 p-4 bg-black/20 rounded-2xl border border-white/5">
                                                                    <Icon name="file" />
                                                                    <span className="text-xs font-bold truncate max-w-[150px]">{m.fileName}</span>
                                                                </div>
                                                            )}
                                                            <button 
                                                                onClick={() => downloadFile(m.fileUrl, m.fileName)}
                                                                className="absolute bottom-2 right-2 p-2.5 bg-black/70 backdrop-blur text-white rounded-xl opacity-0 group-hover:opacity-100 transition-opacity shadow-lg"
                                                                title="Télécharger"
                                                            >
                                                                <Icon name="download" size={16} />
                                                            </button>
                                                        </div>
                                                    )}
                                                    {m.text && <p className="leading-relaxed break-words">{m.text}</p>}
                                                </div>
                                                <span className="text-[8px] text-slate-600 font-bold px-2 uppercase">{m.senderName}</span>
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={messagesEndRef} />
                                </div>

                                <div className="p-4 bg-slate-950/50 backdrop-blur-xl border-t border-slate-800">
                                    <form onSubmit={(e) => { e.preventDefault(); sendMessage(inputText); }} className="flex gap-3">
                                        <input type="file" ref={chatFileRef} className="hidden" onChange={handleFileUpload} />
                                        <button 
                                            type="button" 
                                            onClick={() => chatFileRef.current.click()}
                                            className="bg-slate-900 w-14 flex items-center justify-center rounded-2xl border border-slate-800 hover:bg-slate-800 transition-all text-slate-400 hover:text-white"
                                        >
                                            <Icon name="plus" size={20}/>
                                        </button>
                                        <input 
                                            value={inputText} 
                                            onChange={(e) => {
                                                setInputText(e.target.value);
                                                updateTypingStatus(true);
                                                if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
                                                typingTimeoutRef.current = setTimeout(() => updateTypingStatus(false), 3000);
                                            }} 
                                            placeholder="Ecrivez votre message..." 
                                            className="flex-1 bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none focus:border-blue-600 transition-all shadow-inner" 
                                        />
                                        <button 
                                            type="submit" 
                                            disabled={!inputText.trim() && !loading}
                                            className={`w-14 flex items-center justify-center rounded-2xl transition-all shadow-xl shadow-blue-900/20 ${inputText.trim() ? 'bg-blue-600 text-white hover:bg-blue-500' : 'bg-slate-800 text-slate-600'}`}
                                        >
                                            <Icon name="send" size={22}/>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center bg-slate-950">
                                <LogoPlaceholder className="w-24 h-24 opacity-10 mb-8 grayscale blur-[1px]" />
                                <h3 className="font-black italic uppercase tracking-[0.5em] text-[10px] text-slate-800">ONYX CHAT SECURE CLOUD</h3>
                                <p className="text-[8px] text-slate-700 mt-4 uppercase font-bold tracking-widest">Selectionnez une discussion pour commencer</p>
                            </div>
                        )}
                    </main>

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-3xl flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-[2.5rem] p-10 fade-in shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-blue-600/10 blur-3xl -z-10"></div>
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-xl font-black uppercase italic tracking-widest text-blue-500">MON COMPTE</h2>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-500 p-2 bg-slate-800 rounded-full hover:bg-slate-700 transition-all"><Icon name="x" size={16}/></button>
                                </div>
                                <div className="space-y-8">
                                    <div className="flex flex-col items-center">
                                        <div className="relative group cursor-pointer" onClick={() => fileInputRef.current.click()}>
                                            <div className="w-32 h-32 rounded-[2.5rem] overflow-hidden ring-4 ring-blue-600/20 ring-offset-4 ring-offset-slate-900 shadow-2xl transition-transform group-hover:scale-95">
                                                <img src={profile.photoURL || getAvatar(profile.displayName)} className="w-full h-full object-cover" />
                                            </div>
                                            <div className="absolute inset-0 flex items-center justify-center bg-black/60 rounded-[2.5rem] opacity-0 group-hover:opacity-100 transition-all text-[10px] font-black uppercase tracking-widest text-white">Changer photo</div>
                                            <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={async (e) => {
                                                const file = e.target.files[0];
                                                if (file) {
                                                    try {
                                                        const compressedUrl = await compressImage(file, 400, 400); // Compression plus forte pour le profil
                                                        const userRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(user.uid);
                                                        await userRef.update({ photoURL: compressedUrl });
                                                    } catch (err) {
                                                        alert("Erreur lors de la mise à jour de la photo.");
                                                    }
                                                }
                                            }} />
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] text-slate-500 font-black uppercase tracking-widest ml-2">Pseudo Public</label>
                                        <input 
                                            className="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white outline-none font-bold focus:border-blue-600 shadow-inner" 
                                            value={profile.displayName} 
                                            onChange={e => {
                                                const userRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(user.uid);
                                                userRef.update({ displayName: e.target.value });
                                            }} 
                                        />
                                    </div>
                                    <button onClick={() => auth.signOut()} className="w-full py-5 bg-red-600/10 text-red-500 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-red-600 hover:text-white transition-all shadow-lg border border-red-500/20">Déconnexion</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
