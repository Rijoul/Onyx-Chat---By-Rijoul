// On génère un SVG de fallback qui ressemble au logo (bulle or sur fond noir)

// remplacer LOGO_DATA_URL par une vraie data URL.

(function() {

    const svgLogo = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

                <stop offset="100%" stop-color="#b8894e"/>
            </linearGradient>
            <filter id="softGlow">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
        </defs>
        <!-- Background circle -->
        <circle cx="256" cy="256" r="248" fill="url(#bgGrad)"/>

        <circle cx="256" cy="256" r="238" fill="none" stroke="url(#goldRing)" stroke-width="14"/>

        <circle cx="256" cy="256" r="210" fill="none" stroke="url(#goldBubble)" stroke-width="1.5" opacity="0.5"/>

        <path d="M 160 175 Q 160 145 190 145 L 340 145 Q 370 145 370 175 L 370 285 Q 370 315 340 315 L 280 315 L 248 355 L 248 315 L 190 315 Q 160 315 160 285 Z"
              fill="#0d0d0d" stroke="url(#goldBubble)" stroke-width="4" filter="url(#softGlow)"/>

    </svg>`;

    const encoded = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgLogo)));
    window.LOGO_DATA_URL = encoded;

    // Build PWA manifest with this icon
    if (window._buildManifest) window._buildManifest(encoded);

    favicon.href = encoded;

})();

   CHIFFREMENT E2E — AES-GCM via Web Crypto
══════════════════════════════════════════ */
const E2E = {
    _keys: {},
    async _deriveKey(chatId) {
        if (this._keys[chatId]) return this._keys[chatId];
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            'raw', enc.encode(chatId), { name: 'PBKDF2' }, false, ['deriveKey']
        );
        const key = await crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: enc.encode('onyx-salt-v1'), iterations: 100000, hash: 'SHA-256' },
            keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
        );
        this._keys[chatId] = key;
        return key;
    },
    async encrypt(text, chatId) {
        if (!text) return { cipher: '', iv: '' };
        try {
            const key = await this._deriveKey(chatId);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const enc = new TextEncoder();
            const cipherBuffer = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(text));
            const toB64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
            return { cipher: toB64(cipherBuffer), iv: toB64(iv.buffer) };
        } catch(e) { return { cipher: text, iv: '' }; }
    },
    async decrypt(cipher, iv, chatId) {
        if (!cipher || !iv) return cipher || '';
        try {
            const key = await this._deriveKey(chatId);
            const fromB64 = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
            const decBuffer = await crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: fromB64(iv) }, key, fromB64(cipher)
            );
            return new TextDecoder().decode(decBuffer);
        } catch(e) { return '[message chiffré]'; }
    },
    async encryptMedia(dataUrl, chatId) {
        if (!dataUrl) return { cipher: '', iv: '' };
        try {
            const key = await this._deriveKey(chatId);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const enc = new TextEncoder();
            const cipherBuffer = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(dataUrl));
            const toB64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
            return { cipher: toB64(cipherBuffer), iv: toB64(iv.buffer), encrypted: true };
        } catch(e) { return { cipher: dataUrl, iv: '', encrypted: false }; }
    },
    async decryptMedia(cipher, iv, chatId) {
        if (!cipher || !iv) return cipher || '';
        try {
            const key = await this._deriveKey(chatId);
            const fromB64 = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
            const decBuffer = await crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: fromB64(iv) }, key, fromB64(cipher)
            );
            return new TextDecoder().decode(decBuffer);
        } catch(e) { return cipher; }
    }
};

const sendNotificationViaSW = (title, body, icon, notifEnabled) => {
    if (!notifEnabled) return;
    if (Notification.permission !== 'granted') return;
    if (document.visibilityState === 'visible') return;
    if (window._swReg && window._swReg.active) {
        window._swReg.active.postMessage({ type: 'NOTIFY', title, body, icon });
    } else {
        try { new Notification(title, { body, icon, tag: 'onyx-msg' }); } catch(e) {}
    }
};

const compressImage = (file, maxWidth=800, maxHeight=800) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > h) { if (w > maxWidth) { h *= maxWidth/w; w = maxWidth; } }
            else { if (h > maxHeight) { w *= maxHeight/h; h = maxHeight; } }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
    };
    reader.onerror = reject;
});

function App() {
    const [user, setUser] = useState(null);
    const [profile, setProfile] = useState({ displayName:'', photoURL:'' });
    const [loading, setLoading] = useState(true);

    const [friends, setFriends] = useState([]);
    const [friendProfiles, setFriendProfiles] = useState({});
    const [incomingRequests, setIncomingRequests] = useState([]);
    const [activeChat, setActiveChat] = useState(null);
    const [messages, setMessages] = useState([]);
    const [inputText, setInputText] = useState('');
    const [view, setView] = useState('list');
    const [showSettings, setShowSettings] = useState(false);
    const [friendIdInput, setFriendIdInput] = useState('');

    const [lastMessages, setLastMessages] = useState({});
    const [isTypingMap, setIsTypingMap] = useState({});
    const [openMenuId, setOpenMenuId] = useState(null);

    const [deleteModal, setDeleteModal] = useState({ open: false, type: null, target: null });
    const [copiedId, setCopiedId] = useState(false);

    useEffect(() => {
        if (!('serviceWorker' in navigator)) return;
        const swCode = `self.addEventListener('install', e => self.skipWaiting());self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));self.addEventListener('message', e => { if (e.data && e.data.type === 'NOTIFY') { const { title, body, icon } = e.data; self.registration.showNotification(title, { body, icon: icon || '/favicon.ico', badge: icon || '/favicon.ico', tag: 'onyx-msg-' + Date.now(), vibrate: [200, 100, 200], requireInteraction: false }); } });self.addEventListener('notificationclick', e => { e.notification.close(); e.waitUntil(self.clients.matchAll({type:'window'}).then(clients => { if (clients.length) clients[0].focus(); else self.clients.openWindow(self.registration.scope); })); });`;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl, { scope: '/' }).then(reg => { window._swReg = reg; }).catch(() => {});
    }, []);

    const [deferredPrompt, setDeferredPrompt] = useState(null);
    const [isInstallable, setIsInstallable] = useState(false);
    const [isInstalled, setIsInstalled] = useState(() => window.matchMedia('(display-mode: standalone)').matches);
    const [showUninstallSheet, setShowUninstallSheet] = useState(false);
    const [onlineStatus, setOnlineStatus] = useState({});
    const [totalOnline, setTotalOnline] = useState(0);
    const [notifPermission, setNotifPermission] = useState(() => localStorage.getItem('onyx_notif_asked') || null);
    const [notifEnabled, setNotifEnabled] = useState(() => localStorage.getItem('onyx_notif_enabled') !== 'false');
    const [showNotifModal, setShowNotifModal] = useState(false);
    const [notifications, setNotifications] = useState({});

    const [voiceState, setVoiceState] = useState('idle');
    const [voiceBlob, setVoiceBlob] = useState(null);
    const [voiceDuration, setVoiceDuration] = useState(0);
    const [voiceAudioUrl, setVoiceAudioUrl] = useState(null);
    const mediaRecorderRef = useRef(null);
    const chunksRef = useRef([]);
    const voiceTimerRef = useRef(null);
    const voiceDurRef = useRef(0);

    const fileInputRef = useRef(null);
    const chatFileRef = useRef(null);
    const messagesEndRef = useRef(null);
    const activeChatRef = useRef(null);
    const typingTimeoutRef = useRef(null);
    const textareaRef = useRef(null);

    const autoResize = () => {
        const ta = textareaRef.current;
        if (!ta) return;
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
        ta.style.overflowY = ta.scrollHeight > 120 ? 'auto' : 'hidden';
    };

    const formatDur = (s) => `${String(Math.floor(s/60)).padStart(1,'0')}:${String(s%60).padStart(2,'0')}`;
    const startVoiceTimer = () => { voiceTimerRef.current = setInterval(() => { voiceDurRef.current += 1; setVoiceDuration(voiceDurRef.current); }, 1000); };
    const stopVoiceTimer = () => clearInterval(voiceTimerRef.current);

    const startRecording = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg;codecs=opus';
            const mr = new MediaRecorder(stream, { mimeType });
            mediaRecorderRef.current = mr;
            chunksRef.current = [];
            mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
            mr.start(100);
            startVoiceTimer();
            setVoiceState('recording');
        } catch(e) { alert("Microphone inaccessible."); }
    };

    const pauseRecording = () => { if (mediaRecorderRef.current?.state === 'recording') { mediaRecorderRef.current.pause(); stopVoiceTimer(); setVoiceState('paused'); } };
    const resumeRecording = () => { if (mediaRecorderRef.current?.state === 'paused') { mediaRecorderRef.current.resume(); startVoiceTimer(); setVoiceState('recording'); } };
    const stopRecording = () => new Promise(resolve => {
        const mr = mediaRecorderRef.current;
        if (!mr || mr.state === 'inactive') { resolve(null); return; }
        mr.onstop = () => { const blob = new Blob(chunksRef.current, { type: mr.mimeType }); mr.stream.getTracks().forEach(t => t.stop()); resolve(blob); };
        mr.stop(); stopVoiceTimer();
    });

    const handleVoiceMicPress = async () => {
        if (voiceState === 'idle') { voiceDurRef.current = 0; setVoiceDuration(0); await startRecording(); }
        else if (voiceState === 'recording') pauseRecording();
        else if (voiceState === 'paused') resumeRecording();
    };
    const handleVoiceStop = async () => {
        const blob = await stopRecording();
        if (!blob || blob.size < 500) { cancelVoice(); return; }
        const url = URL.createObjectURL(blob);
        setVoiceBlob(blob); setVoiceAudioUrl(url); setVoiceState('preview');
    };
    const cancelVoice = async () => {
        if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') { mediaRecorderRef.current.stream.getTracks().forEach(t => t.stop()); mediaRecorderRef.current.stop(); }
        stopVoiceTimer();
        if (voiceAudioUrl) URL.revokeObjectURL(voiceAudioUrl);
        setVoiceState('idle'); setVoiceBlob(null); setVoiceAudioUrl(null); voiceDurRef.current = 0; setVoiceDuration(0);
    };
    const sendVoiceMessage = () => {
        if (!voiceBlob) return;
        const reader = new FileReader();
        reader.onload = ev => sendMessage(null, { url: ev.target.result, type: 'audio', name: 'vocal.webm' });
        reader.readAsDataURL(voiceBlob);
        cancelVoice();
    };

    useEffect(() => {
        if (!user) return;
        const asked = localStorage.getItem('onyx_notif_asked');
        if (!asked && 'Notification' in window) setTimeout(() => setShowNotifModal(true), 1500);
    }, [user]);

    const handleNotifAccept = async () => {
        setShowNotifModal(false);
        try {
            const result = await Notification.requestPermission();
            localStorage.setItem('onyx_notif_asked', result);
            localStorage.setItem('onyx_notif_enabled', result === 'granted' ? 'true' : 'false');
            setNotifPermission(result); setNotifEnabled(result === 'granted');
        } catch(e) { localStorage.setItem('onyx_notif_asked', 'denied'); setNotifPermission('denied'); }
    };
    const handleNotifDecline = () => {
        setShowNotifModal(false);
        localStorage.setItem('onyx_notif_asked', 'dismissed');
        localStorage.setItem('onyx_notif_enabled', 'false');
        setNotifPermission('dismissed'); setNotifEnabled(false);
    };
    const toggleNotifications = async () => {
        if (!notifEnabled) {
            if (Notification.permission === 'granted') { setNotifEnabled(true); localStorage.setItem('onyx_notif_enabled', 'true'); }
            else { const result = await Notification.requestPermission().catch(() => 'denied'); localStorage.setItem('onyx_notif_asked', result); localStorage.setItem('onyx_notif_enabled', result === 'granted' ? 'true' : 'false'); setNotifPermission(result); setNotifEnabled(result === 'granted'); }
        } else { setNotifEnabled(false); localStorage.setItem('onyx_notif_enabled', 'false'); }
    };

    useEffect(() => {
        const handleBeforeInstallPrompt = (e) => {
            e.preventDefault();
            setDeferredPrompt(e);
            setIsInstallable(true);
        };
        window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
        const handleAppInstalled = () => {
            setIsInstallable(false);
            setDeferredPrompt(null);
            setIsInstalled(true);
        };
        window.addEventListener('appinstalled', handleAppInstalled);
        const mq = window.matchMedia('(display-mode: standalone)');
        if (mq.matches) setIsInstalled(true);
        const handleStandalone = (e) => { if (e.matches) { setIsInstalled(true); setIsInstallable(false); } };
        mq.addEventListener('change', handleStandalone);
        return () => {
            window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            window.removeEventListener('appinstalled', handleAppInstalled);
            mq.removeEventListener('change', handleStandalone);
        };
    }, []);

    useEffect(() => {
        activeChatRef.current = activeChat;
        if (activeChat) setNotifications(prev => { const next={...prev}; delete next[activeChat.uid]; return next; });
    }, [activeChat]);

    useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (u) => {
            if (u) {
                setUser(u);
                const userRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('profiles').doc(u.uid);
                userRef.onSnapshot(doc => {
                    if (doc.exists) setProfile(doc.data());
                    else {
                        const np = { uid: u.uid, displayName: u.email.split('@')[0], photoURL: getAvatar(u.email.split('@')[0]), createdAt: firebase.firestore.FieldValue.serverTimestamp() };
                        userRef.set(np); setProfile(np);
                    }
                });
            } else setUser(null);
            setLoading(false);
        });
        return () => unsubscribe();
    }, []);

    useEffect(() => {
        if (!user) return;
        const presRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('presence').doc(user.uid);
        presRef.set({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
        const handleVisibility = () => presRef.set({ online: document.visibilityState !== 'hidden', lastSeen: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
        document.addEventListener('visibilitychange', handleVisibility);
        window.addEventListener('beforeunload', () => presRef.set({ online: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }));
        const unsubPres = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('presence').onSnapshot(snap => {
            const map = {}; let count = 0;
            snap.docs.forEach(doc => { const d = doc.data(); map[doc.id] = d.online===true; if (d.online===true) count++; });
            setOnlineStatus(map); setTotalOnline(count);
        });
        return () => { document.removeEventListener('visibilitychange', handleVisibility); unsubPres(); };
    }, [user]);

    useEffect(() => {
        if (!user || friends.length===0) return;
        const unsubs = friends.map(f =>
            db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('profiles').doc(f.uid)
                .onSnapshot(doc => { if (doc.exists) setFriendProfiles(prev => ({...prev,[f.uid]:doc.data()})); })
        );
        return () => unsubs.forEach(u => u());
    }, [friends, user]);

    useEffect(() => {
        if (!user) return;
        const unsubF = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('contacts').doc('list')
            .onSnapshot(doc => { if (doc.exists) setFriends(doc.data().friends||[]); else setFriends([]); });
        const unsubR = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('friendRequests')
            .where('toId','==',user.uid).where('status','==','pending')
            .onSnapshot(snap => setIncomingRequests(snap.docs.map(d => ({id:d.id,...d.data()}))));
        return () => { unsubF(); unsubR(); };
    }, [user]);

    useEffect(() => {
        if (!user || friends.length===0) return;
        const unsubs = friends.map(friend => {
            const chatId = [user.uid, friend.uid].sort().join('_');
            const unsubMsg = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
                .orderBy('timestamp','desc').limit(1)
                .onSnapshot(async snap => {
                    if (!snap.empty) {
                        const lastMsg = snap.docs[0].data();
                        let displayText = lastMsg.fileUrl ? "📷 Pièce jointe" : lastMsg.fileEncrypted ? "📷 Média chiffré" : "";
                        if (!lastMsg.fileUrl && !lastMsg.fileEncrypted && lastMsg.cipher && lastMsg.iv) {
                            displayText = await E2E.decrypt(lastMsg.cipher, lastMsg.iv, chatId);
                        } else if (!lastMsg.fileUrl && !lastMsg.fileEncrypted && lastMsg.text) {
                            displayText = lastMsg.text;
                        }
                        const isFromFriend = lastMsg.senderId === friend.uid;
                        const isUnread = isFromFriend && !(lastMsg.readBy||[]).includes(user.uid);
                        setLastMessages(prev => ({...prev, [friend.uid]: { text: displayText, isUnread }}));
                        if (isFromFriend && isUnread && activeChatRef.current?.uid !== friend.uid) {
                            setNotifications(prev => ({...prev, [friend.uid]: (prev[friend.uid]||0)+1}));
                            const fp = friendProfiles[friend.uid] || {};
                            sendNotificationViaSW(fp.displayName || "Nouveau message", displayText, fp.photoURL, notifEnabled);
                        }
                    } else {
                        setLastMessages(prev => ({...prev, [friend.uid]: { text: "Aucun message", isUnread: false }}));
                    }
                });
            const unsubTyping = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('chats').doc(chatId)
                .onSnapshot(doc => { if (doc.exists) setIsTypingMap(prev => ({...prev, [friend.uid]: doc.data().isTyping?.[friend.uid]||false})); });
            return () => { unsubMsg(); unsubTyping(); };
        });
        return () => unsubs.forEach(u => u());
    }, [user, friends, notifEnabled, friendProfiles]);

    useEffect(() => {
        if (!user || !activeChat) return;
        const chatId = [user.uid, activeChat.uid].sort().join('_');
        markMessagesAsRead(chatId, activeChat.uid).catch(()=>{});
        const unsub = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
            .orderBy('timestamp','asc')
            .onSnapshot(async snap => {
                const raw = snap.docs.map(d => ({id:d.id,...d.data()}));
                const decrypted = await Promise.all(raw.map(async msg => {
                    let text = msg.text || '';
                    if (msg.cipher && msg.iv) text = await E2E.decrypt(msg.cipher, msg.iv, chatId);
                    let fileUrl = msg.fileUrl || null;
                    if (msg.fileEncrypted && msg.fileCipher && msg.fileIv) {
                        fileUrl = await E2E.decryptMedia(msg.fileCipher, msg.fileIv, chatId);
                    }
                    return {...msg, text, fileUrl};
                }));
                setMessages(decrypted);
                markMessagesAsRead(chatId, activeChat.uid).catch(()=>{});
                setTimeout(() => messagesEndRef.current?.scrollIntoView({behavior:'smooth'}), 100);
            });
        return () => unsub();
    }, [user, activeChat]);

    const updateTypingStatus = (isTyping) => {
        if (!activeChat) return;
        const chatId = [user.uid, activeChat.uid].sort().join('_');
        db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('chats').doc(chatId)
            .set({ isTyping: { [user.uid]: isTyping } }, { merge: true });
    };

    const sendMessage = async (text=null, fileData=null) => {
        if (!text && !fileData) return;
        const chatId = [user.uid, activeChat.uid].sort().join('_');
        updateTypingStatus(false);
        try {
            let encryptedFields = {};
            if (text) {
                const { cipher, iv } = await E2E.encrypt(text, chatId);
                encryptedFields = { cipher, iv, text: '' };
            }
            let fileFields = {};
            if (fileData?.url) {
                const { cipher: fileCipher, iv: fileIv } = await E2E.encryptMedia(fileData.url, chatId);
                fileFields = {
                    fileUrl: null,
                    fileCipher,
                    fileIv,
                    fileEncrypted: true,
                    fileType: fileData.type || null,
                    fileName: fileData.name || null,
                };
            }
            await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').add({
                text: '',
                ...encryptedFields,
                ...fileFields,
                senderId: user.uid,
                senderName: profile.displayName,
                reactions: {},
                readBy: [],
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            setInputText('');
            if (textareaRef.current) { textareaRef.current.style.height = 'auto'; textareaRef.current.style.overflowY = 'hidden'; }
        } catch(err) { console.error(err); }
    };

    const markMessagesAsRead = async (chatId, friendUid) => {
        const snap = await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
            .where('senderId','==',friendUid).get();
        const batch = db.batch();
        snap.docs.forEach(doc => { if (!(doc.data().readBy||[]).includes(user.uid)) batch.update(doc.ref, { readBy: firebase.firestore.FieldValue.arrayUnion(user.uid) }); });
        await batch.commit();
    };

    const deleteMessage = async (msgId) => {
        const chatId = [user.uid, activeChat.uid].sort().join('_');
        await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').doc(msgId).delete();
    };

    const deleteConversation = async (friendUid) => {
        const chatId = [user.uid, friendUid].sort().join('_');
        try {
            const snap = await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').get();
            const batch = db.batch();
            snap.docs.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        } catch(e) { console.error(e); }
    };

    const deleteFriend = async (friendUid) => {
        try {
            const myListRef = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('contacts').doc('list');
            const friendListRef = db.collection('artifacts').doc(APP_ID).collection('users').doc(friendUid).collection('contacts').doc('list');
            const batch = db.batch();
            batch.update(myListRef, { friends: firebase.firestore.FieldValue.arrayRemove({uid: friendUid}) });
            batch.update(friendListRef, { friends: firebase.firestore.FieldValue.arrayRemove({uid: user.uid}) });
            await batch.commit();
            await deleteConversation(friendUid);
            if (activeChat?.uid === friendUid) { setActiveChat(null); setView('list'); }
        } catch(e) { console.error(e); }
    };

    const reactToMessage = async (msgId, emoji) => {
        const chatId = [user.uid, activeChat.uid].sort().join('_');
        const msgRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').doc(msgId);
        const msgDoc = await msgRef.get();
        const current = msgDoc.data().reactions||{};
        if (current[user.uid]===emoji) delete current[user.uid]; else current[user.uid]=emoji;
        await msgRef.update({ reactions: current });
    };

    const handleFileUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        const type = file.type.startsWith('image/') ? 'image' : file.type.startsWith('audio/') ? 'audio' : file.type.startsWith('video/') ? 'video' : 'file';
        try {
            if (type === 'image') { const url = await compressImage(file); sendMessage(null, {url, type, name: file.name}); }
            else { const reader = new FileReader(); reader.onload = ev => sendMessage(null, {url: ev.target.result, type, name: file.name}); reader.readAsDataURL(file); }
        } catch(err) { console.error(err); }
        e.target.value = '';
    };

    const downloadFile = (url, name) => { const a = document.createElement('a'); a.href=url; a.download=name||'onyx-file'; document.body.appendChild(a); a.click(); document.body.removeChild(a); };

    const respondToRequest = async (req, accept) => {
        const batch = db.batch();
        const reqRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('friendRequests').doc(req.id);
        if (accept) {
            batch.set(db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('contacts').doc('list'), { friends: firebase.firestore.FieldValue.arrayUnion({uid:req.fromId}) }, {merge:true});
            batch.set(db.collection('artifacts').doc(APP_ID).collection('users').doc(req.fromId).collection('contacts').doc('list'), { friends: firebase.firestore.FieldValue.arrayUnion({uid:user.uid}) }, {merge:true});
            batch.update(reqRef, {status:'accepted'});
        } else batch.update(reqRef, {status:'rejected'});
        await batch.commit();
    };

    const shareApp = async () => {
        try { if (navigator.share) await navigator.share({title:'ONYX CHAT - By Rijoul',text:'Rejoins-moi sur ONYX CHAT !',url:window.location.href}); else { await navigator.clipboard.writeText(window.location.href); alert("Lien copié !"); } } catch(e) {}
    };

    /* ── INSTALL APP : prompt natif ou instructions ── */
    const installApp = async () => {
        if (deferredPrompt) {
            // Prompt natif Chrome / Android / Edge / Samsung Internet
            try {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    setIsInstallable(false);
                    setDeferredPrompt(null);
                    setIsInstalled(true);
                }
            } catch(e) { console.error(e); }
            return;
        }

        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

        if (isIOS && isSafari) {
            // iOS Safari : pas d'API dispo, afficher instructions
            alert("Pour installer sur iPhone/iPad :\n\n1. Appuyez sur le bouton Partager ↑ en bas de Safari\n2. Faites défiler et appuyez sur « Sur l'écran d'accueil »\n3. Confirmez en appuyant sur « Ajouter »\n\nL'app apparaîtra avec le bon nom et l'icône.");
        } else if (isIOS) {
            alert("Ouvrez ce lien dans Safari pour pouvoir installer ONYX CHAT sur votre écran d'accueil.");
        } else {
            // Desktop / Android sans prompt : instruction via menu navigateur
            alert("Pour installer :\n\n• Chrome / Edge : cliquez sur l'icône ⊕ dans la barre d'adresse, ou ouvrez le menu (⋮) → « Installer ONYX CHAT »\n• Samsung Internet : Menu → Ajouter page à → Écran d'accueil\n• Firefox : Non supporté, utilisez Chrome ou Edge");
        }
    };

    const shareUserId = async (uid) => {
        const text = `Mon ID ONYX CHAT : ${uid}\nAjoute-moi sur ONYX CHAT - By Rijoul !`;
        try {
            if (navigator.share) {
                await navigator.share({ title: 'ONYX CHAT - Mon ID', text, url: window.location.href });
            } else {
                await navigator.clipboard.writeText(text);
                alert("ID copié avec le lien !");
            }
        } catch(e) {}
    };

    if (loading) return null;
    if (!user) return <AuthScreen/>;

    return (
        <div className="app-shell">
            {/* ── SIDEBAR ── */}
            <aside className="sidebar" style={{display: view==='chat'?'none':'flex'}}
                ref={el => { if (el && window.innerWidth>=768) el.style.display='flex'; }}>
                <style>{`@media(min-width:768px){.sidebar{display:flex!important}}`}</style>

                <div className="p-4 flex justify-between items-center border-b border-slate-800 bg-slate-900/30 flex-shrink-0" style={{paddingTop:'calc(1rem + env(safe-area-inset-top))'}}>
                    <div className="flex items-center gap-2.5">
                        <LogoBox size={32}/>
                        <h2 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'15px',letterSpacing:'0.15em',textTransform:'uppercase',fontStyle:'italic'}}>ONYX</h2>
                    </div>
                    <div className="flex items-center gap-1">
                        <div className="flex items-center gap-1 bg-green-500/10 border border-green-500/30 px-2 py-1 rounded-lg mr-1">
                            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#4ade80" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <span className="text-[8px] font-black text-green-400 uppercase tracking-widest">E2E</span>
                        </div>
                        <button onClick={()=>setShowSettings(true)} className="text-slate-500 hover:text-white p-2 hover:bg-slate-800 rounded-lg transition-all">
                            <Icon name="settings"/>
                        </button>
                    </div>
                </div>

                <div className="px-5 py-2.5 flex items-center gap-2 bg-slate-900/20 border-b border-slate-800/50 flex-shrink-0">
                    <div className="w-2 h-2 rounded-full bg-green-400 shadow-sm shadow-green-400/50 animate-pulse"></div>
                    <span className="emoji-native text-base leading-none">👥</span>
                    <span className="text-[10px] font-black uppercase tracking-widest text-green-400">{totalOnline}</span>
                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-500">en ligne</span>
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar p-4" style={{WebkitOverflowScrolling:'touch'}}>
                    {/* Share / Install */}
                    <div className="mb-5 grid grid-cols-2 gap-2">
                        <button onClick={shareApp} className="flex flex-col items-center justify-center p-3 bg-slate-900 border border-slate-800 rounded-2xl hover:bg-slate-800 transition-all gap-2 group">
                            <Icon name="share" className="text-blue-500 group-hover:scale-110 transition-transform"/>
                            <span className="text-[9px] font-black uppercase tracking-widest">Partager</span>
                        </button>
                        <button onClick={installApp} className="flex flex-col items-center justify-center p-3 bg-blue-600/10 border border-blue-600/30 rounded-2xl hover:bg-blue-600/20 transition-all gap-2 glow-button group">
                            <Icon name="smartphone" className="text-blue-400 group-hover:scale-110 transition-transform"/>
                            <span className="text-[9px] font-black uppercase tracking-widest">Installer</span>
                        </button>
                    </div>

                    {/* Demandes */}
                    {incomingRequests.length>0 && (
                        <div className="mb-5 space-y-2">
                            <p className="text-[9px] text-yellow-500 uppercase font-black px-1 tracking-widest">Demandes</p>
                            {incomingRequests.map(req => (
                                <div key={req.id} className="bg-slate-900 border border-slate-800 p-3 rounded-2xl flex items-center justify-between gap-2">
                                    <div className="flex items-center gap-2 overflow-hidden">
                                        <img src={req.fromPhoto||getAvatar(req.fromName)} className="w-8 h-8 rounded-lg bg-slate-800 shrink-0 object-cover"/>
                                        <p className="text-[10px] font-bold truncate">{req.fromName}</p>
                                    </div>
                                    <div className="flex gap-1">
                                        <button onClick={()=>respondToRequest(req,true)} className="p-2 bg-green-500/20 text-green-500 rounded-lg"><Icon name="plus" size={12}/></button>
                                        <button onClick={()=>respondToRequest(req,false)} className="p-2 bg-red-500/20 text-red-500 rounded-lg"><Icon name="x" size={12}/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Ajouter ami */}
                    <div className="mb-5">
                        <p className="text-[9px] text-slate-500 uppercase font-bold mb-2 px-1 tracking-widest">Ajouter via ID</p>
                        <div className="flex gap-2">
                            <input placeholder="ID du contact..." className="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-[10px] outline-none focus:border-blue-600 transition-all" value={friendIdInput} onChange={e=>setFriendIdInput(e.target.value)}/>
                            <button onClick={async()=>{
                                if (!friendIdInput||friendIdInput===user.uid) return;
                                const snap = await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('profiles').doc(friendIdInput).get();
                                if (!snap.exists) { alert("ID introuvable"); return; }
                                await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('friendRequests').add({fromId:user.uid,fromName:profile.displayName,fromPhoto:profile.photoURL,toId:friendIdInput,status:'pending',timestamp:firebase.firestore.FieldValue.serverTimestamp()});
                                alert("Demande envoyée !"); setFriendIdInput('');
                            }} className="bg-blue-600 px-3 rounded-xl hover:bg-blue-500 transition-colors"><Icon name="userplus" size={14}/></button>
                        </div>
                    </div>

                    {/* Conversations */}
                    <div className="space-y-1">
                        <p className="text-[9px] text-slate-500 uppercase font-bold mb-2 px-1 tracking-widest">Conversations</p>
                        {friends.map(f => {
                            const fd = friendProfiles[f.uid]||{};
                            const isOnline = onlineStatus[f.uid]===true;
                            const lastMsg = lastMessages[f.uid] || { text: '...', isUnread: false };
                            const hasUnread = lastMsg.isUnread && activeChatRef.current?.uid !== f.uid;
                            return (
                                <div key={f.uid} className={`p-3 rounded-2xl flex items-center gap-3 cursor-pointer transition-all group relative ${activeChat?.uid===f.uid?'bg-blue-600':'hover:bg-slate-900/60'} ${hasUnread&&activeChat?.uid!==f.uid?'bg-slate-900/80':''}`}
                                    onClick={()=>{setActiveChat({uid:f.uid,...fd});setView('chat');}}>
                                    <div className="relative shrink-0">
                                        <img src={fd.photoURL||getAvatar(fd.displayName)} className="w-11 h-11 rounded-xl object-cover bg-slate-800 shadow-xl"/>
                                        {notifications[f.uid] && <div className="absolute -top-1 -right-1 w-5 h-5 bg-white text-blue-600 rounded-full flex items-center justify-center text-[10px] font-black shadow-lg">{notifications[f.uid]}</div>}
                                        <div className={`absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-slate-950 ${isOnline?'bg-green-400':'bg-slate-600'}`}></div>
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className="flex justify-between items-start">
                                            <p className={`font-bold text-sm truncate ${hasUnread?'text-white':'text-slate-200'}`}>{fd.displayName||"Contact"}</p>
                                            {isTypingMap[f.uid] && <span className="text-[8px] text-white/80 font-black animate-pulse tracking-tighter">ÉCRIT...</span>}
                                        </div>
                                        <p className={`text-[9px] font-bold uppercase tracking-wider ${isOnline?'text-green-400':activeChat?.uid===f.uid?'text-blue-100':'text-slate-500'}`}>{isOnline?'● En ligne':'○ Hors ligne'}</p>
                                        <p className={`text-[10px] truncate font-medium ${hasUnread?'text-white font-bold':'text-slate-500'} ${activeChat?.uid===f.uid?'text-blue-100':''}`}>{lastMsg.text||'...'}</p>
                                    </div>
                                    <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity" onClick={e=>e.stopPropagation()}>
                                        <button title="Supprimer la conversation" onClick={(e)=>{ e.stopPropagation(); setDeleteModal({open:true, type:'conversation', target:f.uid}); }}
                                            className="p-1.5 hover:bg-slate-700 rounded-lg text-slate-500 hover:text-orange-400 transition-colors">
                                            <Icon name="messageoff" size={13}/>
                                        </button>
                                        <button title="Supprimer l'ami" onClick={(e)=>{ e.stopPropagation(); setDeleteModal({open:true, type:'friend', target:f.uid}); }}
                                            className="p-1.5 hover:bg-slate-700 rounded-lg text-slate-500 hover:text-red-400 transition-colors">
                                            <Icon name="userminus" size={13}/>
                                        </button>
                                    </div>
                                    {hasUnread && <div className="w-2.5 h-2.5 rounded-full bg-blue-500 shrink-0 shadow-sm shadow-blue-500/50"></div>}
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* Profil bas */}
                <div className="p-4 border-t border-slate-800 flex items-center gap-3 bg-slate-900/30 flex-shrink-0" style={{paddingBottom:'calc(1rem + env(safe-area-inset-bottom))'}}>
                    <div className="relative">
                        <img src={profile.photoURL||getAvatar(profile.displayName)} className="w-9 h-9 rounded-xl bg-blue-600 object-cover"/>
                        <div className="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full bg-green-400 border-2 border-slate-900"></div>
                    </div>
                    <div className="flex-1 min-w-0">
                        <p className="text-xs font-black truncate uppercase tracking-widest" style={{fontFamily:'Syne,sans-serif'}}>{profile.displayName}</p>
                        <p className="text-[8px] text-green-400 truncate font-bold">● En ligne</p>
                    </div>
                    <button onClick={()=>auth.signOut()} className="p-2 text-slate-500 hover:text-red-500 transition-colors"><Icon name="logout" size={16}/></button>
                </div>
            </aside>

            {/* ── CHAT MAIN ── */}
            <main className="chat-main" style={{display:view==='list'?'none':'flex'}}
                ref={el=>{ if(el&&window.innerWidth>=768)el.style.display='flex'; }}>
                <style>{`@media(min-width:768px){main.chat-main{display:flex!important}}`}</style>

                {activeChat ? (
                    <>
                        <header className="flex-shrink-0 px-4 py-3 border-b border-slate-800 flex items-center justify-between bg-slate-900/50 backdrop-blur-md" style={{paddingTop:'calc(0.75rem + env(safe-area-inset-top))'}}>
                            <div className="flex items-center gap-3">
                                <button onClick={()=>setView('list')} className="md:hidden p-2 -ml-2 text-slate-500 active:text-white"><Icon name="arrowleft"/></button>
                                <div className="relative">
                                    <img src={activeChat.photoURL||getAvatar(activeChat.displayName)} className="w-10 h-10 rounded-xl object-cover bg-slate-800"/>
                                    <div className={`absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-slate-950 ${onlineStatus[activeChat.uid]?'bg-green-400':'bg-slate-600'}`}></div>
                                </div>
                                <div>
                                    <h3 className="font-bold text-sm leading-tight" style={{fontFamily:'Syne,sans-serif'}}>{activeChat.displayName}</h3>
                                    <p className={`text-[10px] font-bold uppercase tracking-tighter ${onlineStatus[activeChat.uid]?'text-green-400':'text-slate-500'}`}>
                                        {isTypingMap[activeChat.uid]?"En train d'écrire...":onlineStatus[activeChat.uid]?"En ligne":"Hors ligne"}
                                    </p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button title="Supprimer ami" onClick={()=>setDeleteModal({open:true,type:'friend',target:activeChat.uid})}
                                    className="p-2 text-slate-600 hover:text-red-400 hover:bg-slate-800 rounded-lg transition-colors">
                                    <Icon name="userminus" size={15}/>
                                </button>
                                <div className="flex items-center gap-1 bg-green-500/10 border border-green-500/20 px-2 py-1 rounded-lg">
                                    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#4ade80" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                    <span className="text-[8px] font-black text-green-400 uppercase tracking-wider">Chiffré</span>
                                </div>
                            </div>
                        </header>

                        <div className="messages-scroll custom-scrollbar p-4" style={{paddingBottom:'8px'}} onClick={()=>setOpenMenuId(null)}>
                            <div className="space-y-4">
                                {messages.map(msg => {
                                    const isMe = msg.senderId===user.uid;
                                    const reactionGroups = {};
                                    if (msg.reactions) Object.values(msg.reactions).forEach(e => { reactionGroups[e]=(reactionGroups[e]||0)+1; });
                                    const menuOpen = openMenuId === msg.id;
                                    return (
                                        <div key={msg.id} className={`flex flex-col ${isMe?'items-end':'items-start'} fade-in`}>
                                            <div className="relative max-w-[85%] md:max-w-[70%]">
                                                <div className={`p-4 rounded-2xl shadow-sm cursor-pointer select-none transition-opacity ${isMe?'bg-blue-600 text-white rounded-tr-none':'bg-slate-900 border border-slate-800 text-slate-200 rounded-tl-none'} ${menuOpen?'opacity-90':''}`}
                                                    onClick={e=>{ e.stopPropagation(); setOpenMenuId(menuOpen?null:msg.id); }}>
                                                    {(msg.fileUrl || msg.fileType) ? (
                                                        <div className="space-y-3">
                                                            {msg.fileType==='image' && msg.fileUrl ? (
                                                                <img src={msg.fileUrl} className="max-w-full rounded-xl cursor-pointer hover:opacity-90 transition-opacity" onClick={e=>{e.stopPropagation();window.open(msg.fileUrl);}}/>
                                                            ) : msg.fileType==='video' && msg.fileUrl ? (
                                                                <video controls src={msg.fileUrl} className="max-w-full rounded-xl" onClick={e=>e.stopPropagation()} style={{maxHeight:'240px'}}/>
                                                            ) : msg.fileType==='audio' && msg.fileUrl ? (
                                                                <div className="flex items-center gap-2 min-w-[180px]">
                                                                    <span className="emoji-native text-lg leading-none">🎙️</span>
                                                                    <audio controls src={msg.fileUrl} className="h-8 flex-1" style={{filter:'invert(1) brightness(0.7)',minWidth:0}} onClick={e=>e.stopPropagation()}/>
                                                                    <span className="text-[8px] opacity-60 uppercase font-bold">Vocal</span>
                                                                </div>
                                                            ) : msg.fileUrl ? (
                                                                <div className="flex items-center gap-3 bg-black/20 p-3 rounded-xl border border-white/5">
                                                                    <div className="bg-white/10 p-2 rounded-lg"><Icon name="file" size={16}/></div>
                                                                    <div className="flex-1 min-w-0">
                                                                        <p className="text-[10px] font-black truncate">{msg.fileName||'Fichier'}</p>
                                                                        <p className="text-[8px] opacity-60 uppercase">Pièce jointe · Chiffré</p>
                                                                    </div>
                                                                    <button onClick={e=>{e.stopPropagation();downloadFile(msg.fileUrl,msg.fileName);}} className="p-2 hover:bg-white/10 rounded-lg transition-colors"><Icon name="download" size={14}/></button>
                                                                </div>
                                                            ) : (
                                                                <div className="flex items-center gap-2 text-slate-400">
                                                                    <Icon name="lock" size={14}/>
                                                                    <span className="text-[10px]">Déchiffrement en cours…</span>
                                                                </div>
                                                            )}
                                                            {msg.text&&<p className="text-sm leading-relaxed">{msg.text}</p>}
                                                        </div>
                                                    ) : (
                                                        <p className="text-sm leading-relaxed whitespace-pre-wrap break-words">{msg.text}</p>
                                                    )}
                                                </div>

                                                {menuOpen && (
                                                    <div className={`absolute z-30 mt-1 ${isMe?'right-0':'left-0'} ctx-menu`} onClick={e=>e.stopPropagation()}>
                                                        <div className="bg-slate-900 border border-slate-700 p-1.5 rounded-2xl shadow-2xl flex gap-1 items-center">
                                                            {EMOJIS.map(e=>(
                                                                <button key={e} onClick={()=>{ reactToMessage(msg.id,e); setOpenMenuId(null); }} className="hover:scale-125 transition-transform p-1.5 leading-none rounded-xl hover:bg-slate-800 active:scale-95">
                                                                    <span className="emoji-native text-xl">{e}</span>
                                                                </button>
                                                            ))}
                                                            <div className="w-px h-4 bg-slate-700 mx-0.5"></div>
                                                            <button onClick={()=>{ navigator.clipboard.writeText(msg.text); setOpenMenuId(null); }} className="p-1.5 hover:bg-slate-800 rounded-xl text-slate-400 hover:text-white transition-colors"><Icon name="copy" size={13}/></button>
                                                            {isMe&&<button onClick={()=>{ deleteMessage(msg.id); setOpenMenuId(null); }} className="p-1.5 hover:bg-red-500/10 rounded-xl text-slate-400 hover:text-red-500 transition-colors"><Icon name="trash" size={13}/></button>}
                                                        </div>
                                                    </div>
                                                )}

                                                <div className={`flex items-center gap-1 mt-1 ${isMe?'justify-end':'justify-start'}`}>
                                                    {Object.entries(reactionGroups).length>0 && (
                                                        <div className="flex gap-1">
                                                            {Object.entries(reactionGroups).map(([emoji,count])=>(
                                                                <button key={emoji} onClick={e=>{e.stopPropagation();reactToMessage(msg.id,emoji);}} className="flex items-center gap-0.5 bg-slate-800 border border-slate-700 rounded-full px-2 py-0.5 reaction-pop hover:bg-slate-700 transition-colors">
                                                                    <span className="emoji-native text-sm">{emoji}</span>
                                                                    {count>1&&<span className="text-[9px] font-black text-slate-300">{count}</span>}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    )}
                                                    <span className="text-[8px] text-slate-600 font-bold uppercase tracking-widest ml-1 flex items-center gap-0.5">
                                                        {msg.timestamp?.toDate?new Date(msg.timestamp.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'...'}
                                                        {isMe&&<MessageStatus msg={msg} friendUid={activeChat.uid}/>}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                                <div ref={messagesEndRef}/>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="chat-footer">
                            {voiceState === 'preview' ? (
                                <div className="flex items-center gap-2 max-w-4xl mx-auto bg-slate-900 border border-slate-700 rounded-2xl px-3 py-2">
                                    <button onClick={cancelVoice} className="p-2 text-red-400 hover:bg-red-500/10 rounded-xl transition-colors shrink-0">
                                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                    </button>
                                    <span className="emoji-native text-base leading-none shrink-0">🎙️</span>
                                    <audio controls src={voiceAudioUrl} className="flex-1 h-8" style={{minWidth:0}}/>
                                    <span className="text-[9px] text-slate-400 font-black shrink-0">{formatDur(voiceDuration)}</span>
                                    <button onClick={sendVoiceMessage} className="p-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-colors shrink-0 active:scale-95">
                                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                                    </button>
                                </div>
                            ) : voiceState === 'recording' || voiceState === 'paused' ? (
                                <div className="flex items-center gap-2 max-w-4xl mx-auto bg-slate-900 border border-slate-700 rounded-2xl px-3 py-2">
                                    <button onClick={cancelVoice} className="p-2 text-red-400 hover:bg-red-500/10 rounded-xl transition-colors shrink-0">
                                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                    </button>
                                    <div className="flex items-center gap-0.5 flex-1">
                                        {voiceState === 'recording' ? (
                                            [1,2,3,4,5,4,3,2,1,2,3,4,5].map((h,i)=>(
                                                <div key={i} className="bg-red-400 rounded-full w-1 flex-shrink-0" style={{height:`${h*4}px`,animationDelay:`${i*80}ms`,animation:'voiceBar 0.6s ease-in-out infinite alternate'}}></div>
                                            ))
                                        ) : (
                                            <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></div><span className="text-[10px] text-amber-400 font-black uppercase tracking-widest">En pause</span></div>
                                        )}
                                    </div>
                                    <span className="text-[11px] font-black tabular-nums text-slate-300 shrink-0">{formatDur(voiceDuration)}</span>
                                    <button onClick={handleVoiceMicPress} className={`p-2.5 rounded-xl transition-colors shrink-0 active:scale-95 ${voiceState==='recording'?'bg-amber-500/20 text-amber-400':'bg-green-500/20 text-green-400'}`}>
                                        {voiceState === 'recording' ? <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> : <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>}
                                    </button>
                                    <button onClick={handleVoiceStop} className="p-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-colors shrink-0 active:scale-95">
                                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                                    </button>
                                </div>
                            ) : (
                                <div className="flex items-end gap-3 max-w-4xl mx-auto">
                                    <div className="flex gap-1 bg-slate-900 rounded-2xl p-1 border border-slate-800 flex-shrink-0">
                                        <button type="button" onClick={()=>chatFileRef.current.click()} className="p-3 text-slate-500 hover:text-blue-500 transition-colors active:scale-95">
                                            <Icon name="plus" size={20}/>
                                        </button>
                                    </div>
                                    <div className="flex-1 relative">
                                        <textarea ref={textareaRef} rows="1" placeholder="Tapez votre message..." className="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-3.5 pr-12 outline-none focus:border-blue-600 transition-all text-sm custom-scrollbar"
                                            value={inputText}
                                            onChange={e=>{ setInputText(e.target.value); autoResize(); updateTypingStatus(true); clearTimeout(typingTimeoutRef.current); typingTimeoutRef.current=setTimeout(()=>updateTypingStatus(false),3000); }}
                                            onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(inputText); } }}
                                        />
                                        {inputText.trim() ? (
                                            <button type="button" onClick={()=>sendMessage(inputText)} className="absolute right-3 bottom-3 p-1.5 text-blue-500 hover:text-blue-400 active:scale-90 transition-transform">
                                                <Icon name="send"/>
                                            </button>
                                        ) : (
                                            <button type="button" onClick={handleVoiceMicPress} className="absolute right-3 bottom-3 p-1.5 text-slate-400 hover:text-red-400 active:scale-90 transition-all">
                                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )}
                            <input type="file" ref={chatFileRef} className="hidden" accept="image/*,audio/*,video/*,application/*" onChange={handleFileUpload}/>
                        </div>
                    </>
                ) : (
                    <div className="flex-1 flex flex-col items-center justify-center p-8 text-center bg-slate-950">
                        <div style={{position:'relative',marginBottom:'28px'}}>
                            <div style={{width:'96px',height:'96px',background:'linear-gradient(135deg,#0a0a0a,#1a1a1a)',borderRadius:'28px',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 20px 60px rgba(0,0,0,0.5)',border:'1px solid rgba(180,150,100,0.2)',overflow:'hidden',padding:'0'}}>
                                <img src={getLogo()} width="96" height="96" style={{objectFit:'cover',objectPosition:'center',width:'100%',height:'100%',display:'block'}} alt="Onyx Logo"/>
                            </div>
                        </div>
                        <h2 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'20px',letterSpacing:'0.15em',textTransform:'uppercase',fontStyle:'italic',marginBottom:'8px',color:'white'}}>ONYX CHAT</h2>
                        <p className="text-slate-500 text-xs font-medium max-w-xs leading-relaxed uppercase tracking-widest">Messagerie chiffrée bout-en-bout. Sélectionnez un contact pour démarrer.</p>
                        <div className="mt-10 grid grid-cols-2 gap-3">
                            <div className="bg-slate-900/50 p-4 rounded-3xl border border-slate-800 text-center">
                                <div className="text-blue-400 mb-1.5 font-black text-sm" style={{fontFamily:'Syne,sans-serif'}}>PWA</div>
                                <div className="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Installation native</div>
                            </div>
                            <div className="bg-slate-900/50 p-4 rounded-3xl border border-green-900/50 text-center">
                                <div className="text-green-400 mb-1.5 font-black text-sm" style={{fontFamily:'Syne,sans-serif'}}>E2E</div>
                                <div className="text-[9px] text-slate-500 uppercase font-bold tracking-widest">AES-256-GCM</div>
                            </div>
                            <div className="bg-slate-900/50 p-4 rounded-3xl border border-slate-800 text-center col-span-2">
                                <div className="text-slate-300 mb-1 font-black text-sm" style={{fontFamily:'Syne,sans-serif'}}>Médias chiffrés</div>
                                <div className="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Photos · Vidéos · Audio</div>
                            </div>
                        </div>
                        <div className="mt-5 flex items-center gap-2 bg-slate-900/50 border border-slate-800 px-4 py-2.5 rounded-2xl">
                            <div className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                            <span className="emoji-native text-base leading-none">👥</span>
                            <span className="text-[10px] font-black uppercase tracking-widest text-green-400">{totalOnline}</span>
                            <span className="text-[10px] font-black uppercase tracking-widest text-slate-500">en ligne</span>
                        </div>
                    </div>
                )}
            </main>

            {/* ── SETTINGS ── */}
            {showSettings && (
                <div className="settings-overlay">
                    <div className="bg-slate-900 border border-slate-800 rounded-[2.5rem] w-full max-w-md overflow-hidden fade-in shadow-2xl max-h-[90vh] overflow-y-auto">
                        <div className="p-8 text-center border-b border-slate-800 relative bg-slate-900/50">
                            <button onClick={()=>setShowSettings(false)} className="absolute top-6 right-6 text-slate-500 hover:text-white p-2"><Icon name="x"/></button>
                            <div className="flex justify-center mb-3">
                                <div style={{width:'40px',height:'40px',background:'#0a0a0a',borderRadius:'12px',overflow:'hidden',border:'1px solid rgba(180,150,100,0.25)'}}>
                                    <img src={getLogo()} width="40" height="40" style={{objectFit:'cover',objectPosition:'center',width:'100%',height:'100%',display:'block'}} alt="Onyx Logo"/>
                                </div>
                            </div>
                            <div className="relative inline-block group mb-4">
                                <img src={profile.photoURL||getAvatar(profile.displayName)} className="w-20 h-20 rounded-[1.75rem] object-cover bg-blue-600 border-4 border-slate-800"/>
                                <button onClick={()=>fileInputRef.current.click()} className="absolute -bottom-2 -right-2 bg-blue-600 p-2 rounded-xl shadow-xl hover:bg-blue-500 transition-all border-4 border-slate-900"><Icon name="plus" size={14}/></button>
                            </div>
                            <h3 className="text-lg font-extrabold uppercase italic tracking-widest" style={{fontFamily:'Syne,sans-serif'}}>{profile.displayName}</h3>
                            <p className="text-[9px] text-slate-500 mt-1 uppercase font-bold tracking-widest">Paramètres Profil</p>
                        </div>
                        <div className="p-7 space-y-5">
                            <div>
                                <label className="text-[9px] text-slate-500 uppercase font-black mb-2 block tracking-widest">Nom d'affichage</label>
                                <div className="flex gap-2">
                                    <input className="flex-1 bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-sm outline-none focus:border-blue-600 transition-all" value={profile.displayName} onChange={e=>setProfile({...profile,displayName:e.target.value})}/>
                                    <button onClick={async()=>{ await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('profiles').doc(user.uid).update({displayName:profile.displayName}); }} className="bg-blue-600 px-5 rounded-2xl font-bold text-[10px] uppercase tracking-widest hover:bg-blue-500 transition-colors">Save</button>
                                </div>
                            </div>

                            {/* ── ID UTILISATEUR avec Copier + Partager ── */}
                            <div>
                                <label className="text-[9px] text-slate-500 uppercase font-black mb-2 block tracking-widest">Identifiant Unique</label>
                                <div className="bg-slate-800/50 border border-slate-700/50 rounded-2xl px-4 py-3 text-[10px] font-mono text-slate-400 overflow-hidden truncate mb-2">
                                    {user.uid}
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={async ()=>{
                                        await navigator.clipboard.writeText(user.uid);
                                        setCopiedId(true);
                                        setTimeout(() => setCopiedId(false), 2000);
                                    }} className={`flex-1 flex items-center justify-center gap-2 rounded-2xl font-black text-[10px] uppercase tracking-widest py-3 border transition-all ${copiedId ? 'bg-green-500/20 border-green-500/30 text-green-400' : 'bg-slate-800 border-slate-700 text-slate-300 hover:bg-slate-700'}`}>
                                        <Icon name="copy" size={13}/>
                                        {copiedId ? 'Copié !' : 'Copier'}
                                    </button>
                                    <button onClick={()=>shareUserId(user.uid)} className="flex-1 flex items-center justify-center gap-2 bg-blue-600/15 border border-blue-600/30 rounded-2xl font-black text-[10px] uppercase tracking-widest py-3 text-blue-400 hover:bg-blue-600/25 transition-all">
                                        <Icon name="sharealt" size={13}/>
                                        Partager
                                    </button>
                                </div>
                                <p className="text-[8px] text-slate-500 mt-1.5 italic">* Partagez cet identifiant pour être ajouté.</p>
                            </div>

                            <div className="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-4">
                                <div className="flex items-center justify-between gap-3">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-9 h-9 rounded-xl flex items-center justify-center ${notifEnabled?'bg-blue-600/20':'bg-slate-700/50'}`}>
                                            <Icon name={notifEnabled?"bell":"belloff"} size={16} className={notifEnabled?"text-blue-400":"text-slate-500"}/>
                                        </div>
                                        <div>
                                            <p className="text-[10px] font-black uppercase tracking-widest text-white">Notifications</p>
                                            <p className="text-[8px] text-slate-500 font-bold uppercase tracking-wider mt-0.5">{notifEnabled ? "Activées" : "Désactivées"}{Notification.permission==='denied' && " (bloquées)"}</p>
                                        </div>
                                    </div>
                                    <NotifToggle enabled={notifEnabled} onToggle={toggleNotifications}/>
                                </div>
                            </div>
                            <div className="bg-green-500/5 border border-green-500/20 rounded-2xl p-4 flex items-center gap-3">
                                <div className="w-9 h-9 bg-green-500/10 rounded-xl flex items-center justify-center shrink-0">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4ade80" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                </div>
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-green-400">Chiffrement E2E actif</p>
                                    <p className="text-[8px] text-slate-500 font-bold mt-0.5">AES-256-GCM · Messages, photos, vidéos, audio chiffrés</p>
                                </div>
                            </div>
                            <button onClick={()=>auth.signOut()} className="w-full bg-red-500/10 border border-red-500/20 text-red-500 p-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-red-500 hover:text-white transition-all">Déconnexion</button>
                        </div>
                        <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={async(e)=>{
                            const file=e.target.files[0]; if(!file) return;
                            const url=await compressImage(file,400,400);
                            setProfile({...profile,photoURL:url});
                            await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('profiles').doc(user.uid).update({photoURL:url});
                        }}/>
                    </div>
                </div>
            )}

            <UninstallSheet open={showUninstallSheet} onClose={()=>setShowUninstallSheet(false)}/>
            {showUninstallSheet && <div className="fixed inset-0 z-40 bg-slate-950/60 backdrop-blur-sm" onClick={()=>setShowUninstallSheet(false)}/>}
            {showNotifModal && <NotifPermissionModal onAccept={handleNotifAccept} onDecline={handleNotifDecline}/>}

            <DeleteConfirmModal
                open={deleteModal.open}
                title={deleteModal.type==='friend' ? "Supprimer cet ami ?" : "Effacer la conversation ?"}
                description={deleteModal.type==='friend'
                    ? "Cet ami et tous vos messages seront supprimés définitivement. Cette action est irréversible."
                    : "Tous les messages de cette conversation seront supprimés définitivement. Vous resterez amis."}
                onCancel={()=>setDeleteModal({open:false,type:null,target:null})}
                onConfirm={async()=>{
                    const target = deleteModal.target;
                    const type = deleteModal.type;
                    setDeleteModal({open:false,type:null,target:null});
                    if (type==='friend') await deleteFriend(target);
                    else await deleteConversation(target);
                }}
            />
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
