<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX CHAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCkiMirg--YtJMCENWm6Ba4qBn7XY55qrQ",
            authDomain: "onyx-chat-by-rijoul.firebaseapp.com",
            projectId: "onyx-chat-by-rijoul",
            storageBucket: "onyx-chat-by-rijoul.firebasestorage.app",
            messagingSenderId: "699855199393",
            appId: "1:699855199393:web:0b454be9733e3853ada4e0"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'onyx-pro-chat';

        const AVATARS = [
            "https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Felix",
            "https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Aneka",
            "https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Milo",
            "https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Casper"
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z" />,
                logout: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />,
                userplus: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8M19 8v6M22 11h-6" />,
                copy: <React.Fragment><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></React.Fragment>,
                arrowleft: <path d="M19 12H5M12 19l-7-7 7-7" />,
                send: <React.Fragment><path d="m22 2-7 20-4-9-9-4Z" /><path d="M22 2 11 13" /></React.Fragment>,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                eye: <React.Fragment><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" /></React.Fragment>,
                eyoff: <React.Fragment><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" /><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" /><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" /><line x1="2" y1="2" x2="22" y2="22" /></React.Fragment>,
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
                mail: <React.Fragment><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></React.Fragment>
            };

            const key = name.toLowerCase().replace('-', '').replace('eyeoff', 'eyoff');
            return (
                <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[key]}
                </svg>
            );
        };

        const LogoPlaceholder = ({ className = "w-12 h-12" }) => (
            <div className={`${className} bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/20`}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-2/3 h-2/3 text-white">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
            </div>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ displayName: '', photoURL: AVATARS[0] });
            const [loading, setLoading] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [showPassword, setShowPassword] = useState(false);
            const [authError, setAuthError] = useState('');
            const [authMessage, setAuthMessage] = useState('');
            const [isResetLoading, setIsResetLoading] = useState(false);
            
            const [friends, setFriends] = useState([]);
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [view, setView] = useState('list');
            const [showSettings, setShowSettings] = useState(false);
            const [friendIdInput, setFriendIdInput] = useState('');
            const fileInputRef = useRef(null);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const userRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(u.uid);
                        userRef.onSnapshot(doc => {
                            if (doc.exists) setProfile(doc.data());
                            else {
                                const newProfile = { uid: u.uid, displayName: u.email.split('@')[0], photoURL: AVATARS[0], createdAt: firebase.firestore.FieldValue.serverTimestamp() };
                                userRef.set(newProfile);
                                setProfile(newProfile);
                            }
                        });
                    } else setUser(null);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribe = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').doc('list')
                    .onSnapshot(doc => { if (doc.exists) setFriends(doc.data().friends || []); });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (!user || !activeChat) return;
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
                    .orderBy('timestamp', 'asc')
                    .onSnapshot(snap => {
                        setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    });
                return () => unsubscribe();
            }, [user, activeChat]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                setAuthMessage('');
                try {
                    if (isRegistering) {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (err) {
                    if (err.code === 'auth/email-already-in-use') {
                        setAuthError("Cette adresse email est déjà utilisée par un autre compte.");
                    } else if (err.code === 'auth/invalid-email') {
                        setAuthError("L'adresse email n'est pas valide.");
                    } else if (err.code === 'auth/weak-password') {
                        setAuthError("Le mot de passe est trop court (6 caractères min).");
                    } else if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
                        setAuthError("Email ou mot de passe incorrect.");
                    } else {
                        setAuthError("Erreur : " + err.message);
                    }
                }
            };

            const handleForgotPassword = async () => {
                if (!email || !email.includes('@')) {
                    setAuthError("Veuillez saisir une adresse email valide avant de réinitialiser.");
                    return;
                }
                setAuthError('');
                setAuthMessage('');
                setIsResetLoading(true);
                try {
                    await auth.sendPasswordResetEmail(email);
                    setAuthMessage(`Un lien de réinitialisation a été envoyé à ${email}. Pense à vérifier tes spams !`);
                } catch (err) {
                    if (err.code === 'auth/user-not-found') {
                        setAuthError("Aucun compte Onyx n'est associé à cet email.");
                    } else {
                        setAuthError("Erreur lors de l'envoi : " + err.message);
                    }
                } finally {
                    setIsResetLoading(false);
                }
            };

            const updateProfile = async (updates) => {
                try {
                    const userRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(user.uid);
                    await userRef.update(updates);
                } catch (err) {
                    console.error("Erreur de mise à jour:", err);
                }
            };

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 300;
                            let width = img.width;
                            let height = img.height;
                            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
                            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                    };
                });
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const compressedBase64 = await compressImage(file);
                updateProfile({ photoURL: compressedBase64 });
            };

            const addFriend = async () => {
                if (!friendIdInput || friendIdInput === user.uid) return;
                const friendRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').doc('list');
                const profSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(friendIdInput).get();
                if (!profSnap.exists) { alert("ID Onyx introuvable"); return; }
                const friendData = profSnap.data();
                await friendRef.set({
                    friends: firebase.firestore.FieldValue.arrayUnion({ uid: friendIdInput, name: friendData.displayName, photoURL: friendData.photoURL || AVATARS[0] })
                }, { merge: true });
                setFriendIdInput('');
            };

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!inputText.trim()) return;
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').add({
                    text: inputText, senderId: user.uid, senderName: profile.displayName, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                setInputText('');
            };

            if (loading) return null;

            if (!user) return (
                <div className="h-screen bg-slate-950 flex items-center justify-center p-4">
                    <div className="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md text-center fade-in shadow-2xl">
                        <div className="flex justify-center mb-6">
                            <LogoPlaceholder className="w-20 h-20" />
                        </div>
                        <h1 className="text-3xl font-extrabold text-white mb-1 tracking-tight">ONYX CHAT</h1>
                        <p className="text-blue-500 text-xs font-bold mb-8 tracking-widest uppercase">By Rijoul</p>
                        
                        <form onSubmit={handleAuth} className="space-y-5 text-left">
                            <h2 className="text-xl font-bold text-white mb-2">
                                {isRegistering ? "Créer un compte" : "Bon retour parmi nous"}
                            </h2>
                            
                            {authError && (
                                <div className="bg-red-500/10 border border-red-500/50 p-3.5 rounded-xl text-red-500 text-xs font-bold mb-4 flex items-center gap-3 fade-in">
                                    <div className="bg-red-500 text-white rounded-full p-1"><Icon name="x" size={10} /></div>
                                    {authError}
                                </div>
                            )}

                            {authMessage && (
                                <div className="bg-green-500/10 border border-green-500/50 p-3.5 rounded-xl text-green-500 text-xs font-bold mb-4 flex items-center gap-3 fade-in">
                                    <div className="bg-green-500 text-white rounded-full p-1"><Icon name="mail" size={10} /></div>
                                    {authMessage}
                                </div>
                            )}

                            <div>
                                <label className="text-[10px] uppercase font-bold text-slate-500 ml-1 mb-1.5 block">Adresse Email</label>
                                <input type="email" required className="w-full bg-slate-800 border border-slate-700 p-3.5 rounded-xl text-white outline-none focus:border-blue-500 transition-all" value={email} onChange={e => setEmail(e.target.value)} placeholder="votre@email.com" />
                            </div>
                            <div className="relative">
                                <label className="text-[10px] uppercase font-bold text-slate-500 ml-1 mb-1.5 block">Mot de passe</label>
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} required={!isResetLoading} className="w-full bg-slate-800 border border-slate-700 p-3.5 rounded-xl text-white outline-none focus:border-blue-500 transition-all pr-12" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500">
                                        <Icon name={showPassword ? "eyoff" : "eye"} size={20} />
                                    </button>
                                </div>
                            </div>
                            
                            {!isRegistering && (
                                <button type="button" onClick={handleForgotPassword} disabled={isResetLoading} className="text-[10px] text-blue-500 font-bold uppercase tracking-wider hover:text-blue-400 transition-colors ml-1 disabled:opacity-50">
                                    {isResetLoading ? "Envoi en cours..." : "Mot de passe oublié ?"}
                                </button>
                            )}

                            <div className="flex flex-col gap-3 pt-4">
                                <button type="submit" className="w-full bg-blue-600 p-4 rounded-xl font-bold text-white shadow-lg shadow-blue-900/20 hover:bg-blue-500 transition-all">
                                    {isRegistering ? "S'inscrire" : "Se connecter"}
                                </button>
                                <button type="button" onClick={() => { setIsRegistering(!isRegistering); setAuthError(''); setAuthMessage(''); }} className="w-full bg-slate-800 p-4 rounded-xl font-bold text-slate-300 hover:bg-slate-700 transition-all">
                                    {isRegistering ? "J'ai déjà un compte" : "Créer un compte Onyx"}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex bg-slate-950 text-white overflow-hidden">
                    <div className={`w-full md:w-80 border-r border-slate-800 flex flex-col ${view === 'chat' ? 'hidden md:flex' : 'flex'}`}>
                        <div className="p-5 flex justify-between items-center border-b border-slate-800 bg-slate-900/30">
                            <div className="flex items-center gap-3">
                                <LogoPlaceholder className="w-8 h-8" />
                                <h2 className="font-extrabold text-lg tracking-tight">ONYX CHAT</h2>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="text-slate-500 hover:text-white p-2 hover:bg-slate-800 rounded-lg transition-all">
                                <Icon name="settings" />
                            </button>
                        </div>
                        <div className="p-4 flex-1 overflow-y-auto custom-scrollbar">
                            <div className="mb-8">
                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-3 px-1 tracking-wider">Ajouter par ID</p>
                                <div className="flex gap-2 h-11 items-stretch">
                                    <input placeholder="Coller l'ID Onyx..." className="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 text-xs outline-none focus:border-blue-600" value={friendIdInput} onChange={e => setFriendIdInput(e.target.value)} />
                                    <button onClick={addFriend} className="bg-blue-600 px-3 rounded-xl shadow-lg shadow-blue-900/20 hover:bg-blue-500 transition-all flex items-center justify-center">
                                        <Icon name="userplus" size={18}/>
                                    </button>
                                </div>
                            </div>
                            <div className="space-y-2">
                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-3 px-1 tracking-wider">Conversations</p>
                                {friends.length === 0 && <p className="text-[10px] text-slate-600 px-1 italic">Aucun ami pour le moment.</p>}
                                {friends.map(f => (
                                    <div key={f.uid} onClick={() => { setActiveChat(f); setView('chat'); }} className={`p-3 rounded-2xl cursor-pointer flex items-center gap-3 transition-all ${activeChat?.uid === f.uid ? 'bg-blue-600' : 'bg-slate-900/40 hover:bg-slate-900'}`}>
                                        <img src={f.photoURL} className="w-12 h-12 rounded-xl object-cover bg-slate-800" alt="" />
                                        <div className="flex-1 min-w-0">
                                            <p className="font-bold text-sm truncate">{f.name}</p>
                                            <p className="text-[10px] truncate font-mono text-slate-500">{f.uid}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="p-4 border-t border-slate-800 bg-slate-900/20">
                            <p className="text-[10px] text-slate-500 uppercase font-bold mb-2">Mon ID Onyx</p>
                            <div className="flex items-center gap-2 bg-slate-950 p-3 rounded-xl border border-slate-800 cursor-pointer group" onClick={() => {navigator.clipboard.writeText(user.uid); alert("ID Copié !");}}>
                                <p className="text-[10px] font-mono text-blue-400 truncate flex-1">{user.uid}</p>
                                <Icon name="copy" size={14} className="text-slate-600 group-hover:text-blue-500"/>
                            </div>
                        </div>
                    </div>
                    <div className={`flex-1 flex flex-col ${view === 'list' ? 'hidden md:flex' : 'flex'}`}>
                        {activeChat ? (
                            <div className="flex flex-col h-full fade-in">
                                <header className="p-4 border-b border-slate-800 flex items-center gap-3 bg-slate-950/50 backdrop-blur-md">
                                    <button onClick={() => setView('list')} className="md:hidden p-2 text-slate-400"><Icon name="arrowleft"/></button>
                                    <img src={activeChat.photoURL} className="w-10 h-10 rounded-xl object-cover" alt="" />
                                    <div className="flex-1">
                                        <p className="font-bold text-slate-100">{activeChat.name}</p>
                                        <p className="text-[10px] text-green-500 font-bold uppercase">En ligne</p>
                                    </div>
                                </header>
                                <div className="flex-1 overflow-y-auto p-5 space-y-4 custom-scrollbar">
                                    {messages.map(m => (
                                        <div key={m.id} className={`flex ${m.senderId === user.uid ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[75%] p-3.5 rounded-2xl text-sm ${m.senderId === user.uid ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-900 text-slate-200 rounded-tl-none'}`}>
                                                {m.text}
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={messagesEndRef} />
                                </div>
                                <form onSubmit={sendMessage} className="p-4 bg-slate-950 border-t border-slate-800 flex gap-3">
                                    <input value={inputText} onChange={e => setInputText(e.target.value)} placeholder="Écrire un message..." className="flex-1 bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none focus:border-blue-600" />
                                    <button type="submit" className="bg-blue-600 w-14 flex items-center justify-center rounded-2xl hover:bg-blue-500 transition-all shadow-lg shadow-blue-900/20">
                                        <Icon name="send" size={22}/>
                                    </button>
                                </form>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-800 bg-slate-950">
                                <LogoPlaceholder className="w-32 h-32 opacity-20 mb-6 grayscale" />
                                <h3 className="font-extrabold uppercase tracking-widest text-sm text-slate-700">ONYX CHAT</h3>
                                <p className="text-[10px] text-slate-800 mt-2">Sélectionne une conversation pour commencer</p>
                            </div>
                        )}
                    </div>
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-[2rem] p-8 shadow-2xl fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black">Mon Profil</h2>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-white"><Icon name="x"/></button>
                                </div>
                                <div className="space-y-8">
                                    <div className="flex flex-col items-center">
                                        <div className="relative group cursor-pointer" onClick={() => fileInputRef.current.click()}>
                                            <img src={profile.photoURL} className="w-28 h-28 rounded-3xl object-cover ring-4 ring-slate-800 transition-all group-hover:scale-105" alt="" />
                                            <div className="absolute inset-0 flex items-center justify-center bg-black/60 rounded-3xl opacity-0 group-hover:opacity-100 transition-all">
                                                <Icon name="upload" className="text-white" size={24}/>
                                            </div>
                                            <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleImageUpload} />
                                        </div>
                                        <p className="text-[10px] text-blue-500 mt-4 uppercase font-black">Changer la photo</p>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase font-bold text-slate-500 ml-1 block">Nom d'affichage</label>
                                        <input className="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-white outline-none font-bold focus:border-blue-500" value={profile.displayName} onChange={e => updateProfile({ displayName: e.target.value })} />
                                    </div>
                                    <button onClick={() => auth.signOut()} className="w-full py-4 bg-red-600/10 text-red-500 rounded-2xl font-black uppercase text-xs hover:bg-red-600 hover:text-white transition-all flex items-center justify-center gap-2">
                                        <Icon name="logout" size={16}/> Déconnexion
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
