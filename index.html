/* ─── E2E ────────────────────────────────────────────────────────────── */

const E2E = {
    _keys: {},
    async _deriveKey(chatId) {
        if (this._keys[chatId]) return this._keys[chatId];
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(chatId), { name: 'PBKDF2' }, false, ['deriveKey']);
        const key = await crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: enc.encode('onyx-salt-v1'), iterations: 100000, hash: 'SHA-256' },
            keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
        );
        this._keys[chatId] = key;
        return key;
    },
    async encrypt(text, chatId) {
        if (!text) return { cipher: '', iv: '' };
        try {
            const key = await this._deriveKey(chatId);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const enc = new TextEncoder();
            const cipherBuffer = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(text));
            const toB64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
            return { cipher: toB64(cipherBuffer), iv: toB64(iv.buffer) };
        } catch(e) { return { cipher: text, iv: '' }; }
    },
    async decrypt(cipher, iv, chatId) {
        if (!cipher || !iv) return cipher || '';
        try {
            const key = await this._deriveKey(chatId);
            const fromB64 = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
            const decBuffer = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: fromB64(iv) }, key, fromB64(cipher));
            return new TextDecoder().decode(decBuffer);
        } catch(e) { return '[message chiffré]'; }
    },
    async encryptMedia(dataUrl, chatId) {
        if (!dataUrl) return { cipher: '', iv: '' };
        try {
            const key = await this._deriveKey(chatId);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const enc = new TextEncoder();
            const cipherBuffer = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(dataUrl));
            const toB64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
            return { cipher: toB64(cipherBuffer), iv: toB64(iv.buffer), encrypted: true };
        } catch(e) { return { cipher: dataUrl, iv: '', encrypted: false }; }
    },
    async decryptMedia(cipher, iv, chatId) {
        if (!cipher || !iv) return cipher || '';
        try {
            const key = await this._deriveKey(chatId);
            const fromB64 = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
            const decBuffer = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: fromB64(iv) }, key, fromB64(cipher));
            return new TextDecoder().decode(decBuffer);
        } catch(e) { return cipher; }
    }

const sendNotificationViaSW = (title, body, icon, notifEnabled) => {
    if (!notifEnabled) return;
    if (Notification.permission !== 'granted') return;
    if (document.visibilityState === 'visible') return;
    if (window._swReg && window._swReg.active) {
        window._swReg.active.postMessage({ type: 'NOTIFY', title, body, icon });
    } else {
        try { new Notification(title, { body, icon, tag: 'onyx-msg' }); } catch(e) {}
    }
};

const compressImage = (file, maxWidth=800, maxHeight=800) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > h) { if (w > maxWidth) { h *= maxWidth/w; w = maxWidth; } }
            else { if (h > maxHeight) { w *= maxHeight/h; h = maxHeight; } }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
    };
    reader.onerror = reject;
});

    const [loading, setLoading] = useState(false);

    const handleAuth = async (e) => {
        e.preventDefault();
        setAuthError('');
        setLoading(true);
        try {
            if (isRegistering) { await auth.createUserWithEmailAndPassword(email, password); }
            else { await auth.signInWithEmailAndPassword(email, password); }

            const msgs = {
                'auth/invalid-email': 'Adresse email invalide.',

            setLoading(false);

    };

    return (

                <div className="auth-orb-2" style={{position:'absolute',bottom:'10%',right:'5%',width:'280px',height:'280px',borderRadius:'50%',background:'radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%)',filter:'blur(40px)'}}/>

                <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px)',backgroundSize:'48px 48px'}}/>

            <div className="auth-card" style={{width:'100%',maxWidth:'400px',position:'relative',zIndex:1}}>
                <div style={{textAlign:'center',marginBottom:'32px'}}>
                    <div className="auth-logo auth-logo-glow" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:'80px',height:'80px',background:'#000',borderRadius:'24px',marginBottom:'20px',border:'1px solid rgba(180,140,60,0.4)',overflow:'hidden'}}>
                        <img src={LOGO_SRC} width="80" height="80" style={{objectFit:'cover',width:'100%',height:'100%',display:'block'}} alt="Onyx"/>
                    </div>
                    <h1 className="auth-title shimmer-text" style={{fontSize:'28px',fontWeight:800,letterSpacing:'0.15em',marginBottom:'6px'}}>ONYX CHAT</h1>
                    <p style={{color:'#b8924a',fontSize:'10px',fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase'}}>By Rijoul</p>
                    <p style={{color:'#475569',fontSize:'10px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',marginTop:'4px'}}>
                        {isRegistering ? 'Créez votre compte sécurisé' : 'Messagerie chiffrée bout-en-bout'}
                    </p>
                </div>
                <div className="anim-border" style={{background:'rgba(15,23,42,0.8)',border:'1px solid rgba(37,99,235,0.2)',borderRadius:'28px',padding:'28px',backdropFilter:'blur(20px)',boxShadow:'0 25px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04)'}}>
                    <div style={{display:'flex',background:'rgba(2,6,23,0.6)',borderRadius:'14px',padding:'4px',marginBottom:'24px',border:'1px solid #1e293b'}}>
                        {['Connexion','Inscription'].map((label,i)=>(
                            <button key={i} onClick={()=>{ setIsRegistering(i===1); setAuthError(''); }}

                                {label}

                        {authError && (

                                <span>⚠</span>{authError}
