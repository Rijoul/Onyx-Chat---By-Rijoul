<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYX CHAT</title>

<link rel="manifest" href="data:application/manifest+json,{'name':'Onyx Chat','short_name':'Onyx','start_url':'.','display':'standalone','background_color':'#020617','theme_color':'#2563eb'}">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#020617;
}

.custom-scrollbar::-webkit-scrollbar{
width:4px;
}

.custom-scrollbar::-webkit-scrollbar-thumb{
background:#1e293b;
border-radius:10px;
}

.fade-in{
animation:fadeIn .3s ease-out;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.reaction-pop{
animation:pop .2s cubic-bezier(0.175,0.885,0.32,1.275);
}

@keyframes pop{
from{
transform:scale(0);
}
to{
transform:scale(1);
}
}
</style>
</head>

<body class="text-slate-200">
<div id="root"></div>

<script type="text/babel">

const {useState,useEffect,useRef}=React;

const firebaseConfig={
apiKey:"AIzaSyCkiMirg--YtJMCENWm6Ba4qBn7XY55qrQ",
authDomain:"onyx-chat-by-rijoul.firebaseapp.com",
projectId:"onyx-chat-by-rijoul",
storageBucket:"onyx-chat-by-rijoul.firebasestorage.app",
messagingSenderId:"699855199393",
appId:"1:699855199393:web:0b454be9733e3853ada4e0"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

const appId='onyx-pro-chat';

const EMOJIS=['❤️','😂','👍','🔥','😮'];

const getAvatar=(name)=>
`https://ui-avatars.com/api/?name=${encodeURIComponent(name||'User')}&background=2563eb&color=fff&bold=true&rounded=true`;

function App(){

const [user,setUser]=useState(null);
const [profile,setProfile]=useState({});
const [loading,setLoading]=useState(true);

const [email,setEmail]=useState('');
const [password,setPassword]=useState('');
const [isRegistering,setIsRegistering]=useState(false);

const [friends,setFriends]=useState([]);
const [friendProfiles,setFriendProfiles]=useState({});
const [activeChat,setActiveChat]=useState(null);

const [messages,setMessages]=useState([]);
const [inputText,setInputText]=useState('');

const [lastMessages,setLastMessages]=useState({});
const [isTypingMap,setIsTypingMap]=useState({});

const [onlineUsers,setOnlineUsers]=useState({});
const [onlineCount,setOnlineCount]=useState(0);

const messagesEndRef=useRef(null);

useEffect(()=>{

const unsubscribe=auth.onAuthStateChanged(async(u)=>{

if(u){

setUser(u);

const userRef=db
.collection('artifacts')
.doc(appId)
.collection('public')
.doc('data')
.collection('profiles')
.doc(u.uid);

userRef.onSnapshot(doc=>{

if(doc.exists){

setProfile(doc.data());

}else{

const p={
uid:u.uid,
displayName:u.email.split('@')[0],
photoURL:getAvatar(u.email.split('@')[0])
};

userRef.set(p);
setProfile(p);

}

});

}else{

setUser(null);

}

setLoading(false);

});

return ()=>unsubscribe();

},[]);



useEffect(()=>{

if(!user) return;

const userStatusRef=db
.collection('artifacts')
.doc(appId)
.collection('public')
.doc('data')
.collection('status')
.doc(user.uid);

userStatusRef.set({
online:true,
lastSeen:firebase.firestore.FieldValue.serverTimestamp(),
displayName:profile.displayName||''
},{merge:true});

const unsubscribe=db
.collection('artifacts')
.doc(appId)
.collection('public')
.doc('data')
.collection('status')
.onSnapshot((snap)=>{

const users={};
let total=0;

snap.forEach(doc=>{

const data=doc.data();

if(data.online) total++;

users[doc.id]=data;

});

setOnlineUsers(users);
setOnlineCount(total);

});

const setOffline=()=>{

userStatusRef.set({
online:false,
lastSeen:firebase.firestore.FieldValue.serverTimestamp()
},{merge:true});

};

window.addEventListener('beforeunload',setOffline);

return ()=>{

setOffline();

window.removeEventListener('beforeunload',setOffline);

unsubscribe();

};

},[user,profile.displayName]);



useEffect(()=>{

if(!user) return;

const unsub=db
.collection('artifacts')
.doc(appId)
.collection('users')
.doc(user.uid)
.collection('contacts')
.doc('list')
.onSnapshot(doc=>{

if(doc.exists){

setFriends(doc.data().friends||[]);

}else{

setFriends([]);

}

});

return ()=>unsub();

},[user]);



useEffect(()=>{

if(!user||friends.length===0) return;

const unsubs=friends.map(friend=>{

return db
.collection('artifacts')
.doc(appId)
.collection('public')
.doc('data')
.collection('profiles')
.doc(friend.uid)
.onSnapshot(doc=>{

if(doc.exists){

setFriendProfiles(prev=>({
...prev,
[friend.uid]:doc.data()
}));

}

});

});

return ()=>unsubs.forEach(u=>u());

},[friends,user]);



useEffect(()=>{

if(!user||!activeChat) return;

const chatId=[user.uid,activeChat.uid].sort().join('_');

const unsubscribe=db
.collection('artifacts')
.doc(appId)
.collection('public')
.doc('data')
.collection('chats')
.doc(chatId)
.collection('messages')
.orderBy('timestamp','asc')
.onSnapshot(snap=>{

setMessages(
snap.docs.map(doc=>({
id:doc.id,
...doc.data()
}))
);

setTimeout(()=>{
messagesEndRef.current?.scrollIntoView({
behavior:'smooth'
});
},100);

});

return ()=>unsubscribe();

},[user,activeChat]);



const handleAuth=async(e)=>{

e.preventDefault();

try{

if(isRegistering){

await auth.createUserWithEmailAndPassword(email,password);

}else{

await auth.signInWithEmailAndPassword(email,password);

}

}catch(err){

alert(err.message);

}

};



const sendMessage=async()=>{

if(!inputText.trim()) return;

const chatId=[user.uid,activeChat.uid].sort().join('_');

await db
.collection('artifacts')
.doc(appId)
.collection('public')
.doc('data')
.collection('chats')
.doc(chatId)
.collection('messages')
.add({

text:inputText,
senderId:user.uid,
senderName:profile.displayName,
reactions:{},
timestamp:firebase.firestore.FieldValue.serverTimestamp()

});

setInputText('');

};



const reactToMessage=async(msgId,emoji)=>{

const chatId=[user.uid,activeChat.uid].sort().join('_');

const msgRef=db
.collection('artifacts')
.doc(appId)
.collection('public')
.doc('data')
.collection('chats')
.doc(chatId)
.collection('messages')
.doc(msgId);

const msgDoc=await msgRef.get();

const currentReactions=msgDoc.data().reactions||{};

if(currentReactions[user.uid]===emoji){

delete currentReactions[user.uid];

}else{

currentReactions[user.uid]=emoji;

}

await msgRef.update({
reactions:currentReactions
});

};



if(loading) return null;

if(!user){

return(

<div className="h-screen flex items-center justify-center bg-slate-950 p-4">

<div className="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md fade-in">

<h1 className="text-3xl font-black text-center mb-8">
ONYX CHAT
</h1>

<form onSubmit={handleAuth} className="space-y-4">

<input
type="email"
placeholder="Email"
required
value={email}
onChange={e=>setEmail(e.target.value)}
className="w-full bg-slate-800 p-4 rounded-xl outline-none"
/>

<input
type="password"
placeholder="Mot de passe"
required
value={password}
onChange={e=>setPassword(e.target.value)}
className="w-full bg-slate-800 p-4 rounded-xl outline-none"
/>

<button
type="submit"
className="w-full bg-blue-600 p-4 rounded-xl font-bold"
>
{isRegistering?'Créer un compte':'Connexion'}
</button>

<button
type="button"
onClick={()=>setIsRegistering(!isRegistering)}
className="w-full text-xs text-slate-400"
>
{isRegistering?'Déjà un compte ?':'Créer un compte'}
</button>

</form>

</div>

</div>

);

}



return(

<div className="h-screen flex overflow-hidden">

<aside className="w-80 border-r border-slate-800 flex flex-col">

<div className="p-4 border-b border-slate-800">

<h1 className="font-black text-xl">
ONYX CHAT
</h1>

</div>

<div className="p-4">

<div className="mb-4 bg-slate-900 border border-slate-800 rounded-2xl p-3 flex items-center justify-between">

<div>

<p className="text-[10px] uppercase tracking-widest text-slate-500 font-bold">
Utilisateurs connectés
</p>

<p className="text-xl font-black text-green-400">
{onlineCount}
</p>

</div>

<div className="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>

</div>

</div>

<div className="flex-1 overflow-y-auto custom-scrollbar p-2">

{friends.map(f=>{

const friendData=friendProfiles[f.uid]||{};

return(

<div
key={f.uid}
onClick={()=>setActiveChat({
uid:f.uid,
...friendData
})}
className="p-3 rounded-2xl hover:bg-slate-900 cursor-pointer flex items-center gap-3"
>

<img
src={friendData.photoURL||getAvatar(friendData.displayName)}
className="w-12 h-12 rounded-xl"
/>

<div className="flex-1 min-w-0">

<p className="font-bold truncate">
{friendData.displayName||'Utilisateur'}
</p>

<p className="text-xs truncate opacity-70 flex items-center gap-1">

{onlineUsers[f.uid]?.online ? (
<>
<span className="w-2 h-2 rounded-full bg-green-500"></span>
<span className="text-green-400">En ligne</span>
</>
) : (
<>
<span className="w-2 h-2 rounded-full bg-slate-500"></span>
<span>
{isTypingMap[f.uid]
? "Écrit..."
: lastMessages[f.uid] || "Aucun message"}
</span>
</>
)}

</p>

</div>

</div>

);

})}

</div>

</aside>



<main className="flex-1 flex flex-col">

{activeChat ? (

<>

<div className="p-4 border-b border-slate-800 flex items-center gap-3 bg-slate-900">

<img
src={activeChat.photoURL||getAvatar(activeChat.displayName)}
className="w-10 h-10 rounded-xl"
/>

<div>

<h2 className="font-bold">
{activeChat.displayName}
</h2>

<p className="text-xs text-slate-400">
{onlineUsers[activeChat.uid]?.online
? 'En ligne'
: 'Hors ligne'}
</p>

</div>

</div>



<div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">

{messages.map(msg=>(

<div
key={msg.id}
className={`flex ${
msg.senderId===user.uid
?'justify-end'
:'justify-start'
}`}
>

<div className={`max-w-sm p-3 rounded-2xl ${
msg.senderId===user.uid
?'bg-blue-600'
:'bg-slate-800'
}`}>

<p className="text-sm whitespace-pre-wrap">
{msg.text}
</p>

<div className="flex gap-2 mt-2">

{EMOJIS.map(emoji=>(
<button
key={emoji}
onClick={()=>reactToMessage(msg.id,emoji)}
className="hover:scale-125 transition-transform text-lg"
type="button"
>
{emoji}
</button>
))}

</div>

<div className="flex flex-wrap gap-1 mt-2">

{Object.entries(
Object.values(msg.reactions||{}).reduce((acc,emoji)=>{

acc[emoji]=(acc[emoji]||0)+1;

return acc;

},{})
).map(([emoji,count])=>(

<button
key={emoji}
onClick={()=>reactToMessage(msg.id,emoji)}
className="px-2 py-1 rounded-full bg-slate-900 border border-slate-700 text-xs flex items-center gap-1 reaction-pop"
>

<span className="text-sm">
{emoji}
</span>

<span>
{count}
</span>

</button>

))}

</div>

</div>

</div>

))}

<div ref={messagesEndRef}></div>

</div>



<div className="p-4 border-t border-slate-800 flex gap-2">

<input
value={inputText}
onChange={e=>setInputText(e.target.value)}
placeholder="Message..."
className="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 outline-none"
/>

<button
onClick={sendMessage}
className="bg-blue-600 px-6 rounded-xl font-bold"
>
Envoyer
</button>

</div>

</>

):(

<div className="flex-1 flex items-center justify-center text-slate-500">
Sélectionne une conversation
</div>

)}

</main>

</div>

);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
