<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX CHAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCkiMirg--YtJMCENWm6Ba4qBn7XY55qrQ",
            authDomain: "onyx-chat-by-rijoul.firebaseapp.com",
            projectId: "onyx-chat-by-rijoul",
            storageBucket: "onyx-chat-by-rijoul.firebasestorage.app",
            messagingSenderId: "699855199393",
            appId: "1:699855199393:web:0b454be9733e3853ada4e0"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'onyx-pro-chat';

        const AVATARS = [
            "https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Felix",
            "https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Aneka",
            "https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Milo",
            "https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Casper"
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z" />,
                logout: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />,
                userplus: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8M19 8v6M22 11h-6" />,
                copy: <React.Fragment><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></React.Fragment>,
                arrowleft: <path d="M19 12H5M12 19l-7-7 7-7" />,
                send: <React.Fragment><path d="m22 2-7 20-4-9-9-4Z" /><path d="M22 2 11 13" /></React.Fragment>,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                eye: <React.Fragment><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" /></React.Fragment>,
                eyoff: <React.Fragment><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" /><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" /><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" /><line x1="2" y1="2" x2="22" y2="22" /></React.Fragment>,
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
                mail: <React.Fragment><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></React.Fragment>,
                check: <path d="M20 6L9 17l-5-5" />,
                clock: <React.Fragment><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></React.Fragment>
            };

            const key = name.toLowerCase().replace('-', '').replace('eyeoff', 'eyoff');
            return (
                <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[key]}
                </svg>
            );
        };

        const LogoPlaceholder = ({ className = "w-12 h-12" }) => (
            <div className={`${className} bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/20`}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-2/3 h-2/3 text-white">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
            </div>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ displayName: '', photoURL: AVATARS[0] });
            const [loading, setLoading] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [showPassword, setShowPassword] = useState(false);
            const [authError, setAuthError] = useState('');
            const [authMessage, setAuthMessage] = useState('');
            
            const [friends, setFriends] = useState([]);
            const [incomingRequests, setIncomingRequests] = useState([]);
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [view, setView] = useState('list');
            const [showSettings, setShowSettings] = useState(false);
            const [friendIdInput, setFriendIdInput] = useState('');
            const fileInputRef = useRef(null);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const userRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(u.uid);
                        userRef.onSnapshot(doc => {
                            if (doc.exists) setProfile(doc.data());
                            else {
                                const newProfile = { uid: u.uid, displayName: u.email.split('@')[0], photoURL: AVATARS[0], createdAt: firebase.firestore.FieldValue.serverTimestamp() };
                                userRef.set(newProfile);
                                setProfile(newProfile);
                            }
                        });
                    } else setUser(null);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                // Amis
                const unsubFriends = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').doc('list')
                    .onSnapshot(doc => { if (doc.exists) setFriends(doc.data().friends || []); });
                
                // Demandes reçues
                const unsubRequests = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('friendRequests')
                    .where('toId', '==', user.uid)
                    .where('status', '==', 'pending')
                    .onSnapshot(snap => {
                        setIncomingRequests(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                return () => { unsubFriends(); unsubRequests(); };
            }, [user]);

            useEffect(() => {
                if (!user || !activeChat) return;
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
                    .orderBy('timestamp', 'asc')
                    .onSnapshot(snap => {
                        setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    });
                return () => unsubscribe();
            }, [user, activeChat]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                setAuthMessage('');
                try {
                    if (isRegistering) await auth.createUserWithEmailAndPassword(email, password);
                    else await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    setAuthError(err.message);
                }
            };

            const sendFriendRequest = async () => {
                if (!friendIdInput || friendIdInput === user.uid) return;
                
                // Vérifier si déjà ami
                if (friends.some(f => f.uid === friendIdInput)) {
                    alert("Déjà dans vos contacts.");
                    return;
                }

                const profSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(friendIdInput).get();
                if (!profSnap.exists) { alert("ID Onyx introuvable"); return; }

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('friendRequests').add({
                    fromId: user.uid,
                    fromName: profile.displayName,
                    fromPhoto: profile.photoURL,
                    toId: friendIdInput,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Demande de conversation envoyée !");
                setFriendIdInput('');
            };

            const respondToRequest = async (request, accept) => {
                const batch = db.batch();
                const requestRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('friendRequests').doc(request.id);

                if (accept) {
                    // Ajouter aux deux listes de contacts
                    const myContactsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').doc('list');
                    const friendContactsRef = db.collection('artifacts').doc(appId).collection('users').doc(request.fromId).collection('contacts').doc('list');

                    batch.set(myContactsRef, {
                        friends: firebase.firestore.FieldValue.arrayUnion({ uid: request.fromId, name: request.fromName, photoURL: request.fromPhoto })
                    }, { merge: true });

                    batch.set(friendContactsRef, {
                        friends: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid, name: profile.displayName, photoURL: profile.photoURL })
                    }, { merge: true });

                    batch.update(requestRef, { status: 'accepted' });
                } else {
                    batch.update(requestRef, { status: 'rejected' });
                }

                await batch.commit();
            };

            const updateProfile = async (updates) => {
                const userRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(user.uid);
                await userRef.update(updates);
            };

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 300;
                            let width = img.width, height = img.height;
                            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
                            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                    };
                });
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const compressedBase64 = await compressImage(file);
                updateProfile({ photoURL: compressedBase64 });
            };

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!inputText.trim()) return;
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').add({
                    text: inputText, senderId: user.uid, senderName: profile.displayName, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                setInputText('');
            };

            if (loading) return null;

            if (!user) return (
                <div className="h-screen bg-slate-950 flex items-center justify-center p-4">
                    <div className="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md text-center fade-in shadow-2xl">
                        <div className="flex justify-center mb-6"><LogoPlaceholder className="w-20 h-20" /></div>
                        <h1 className="text-3xl font-extrabold text-white mb-1 tracking-tight uppercase italic">ONYX</h1>
                        <p className="text-blue-500 text-[10px] font-black mb-8 tracking-widest uppercase">By Rijoul</p>
                        <form onSubmit={handleAuth} className="space-y-5 text-left">
                            {authError && <div className="bg-red-500/10 border border-red-500/50 p-3 rounded-xl text-red-500 text-xs font-bold">{authError}</div>}
                            <div>
                                <label className="text-[10px] uppercase font-bold text-slate-500 ml-1 mb-1.5 block">Email</label>
                                <input type="email" required className="w-full bg-slate-800 border border-slate-700 p-3.5 rounded-xl text-white outline-none focus:border-blue-500 transition-all" value={email} onChange={e => setEmail(e.target.value)} />
                            </div>
                            <div>
                                <label className="text-[10px] uppercase font-bold text-slate-500 ml-1 mb-1.5 block">Mot de passe</label>
                                <input type={showPassword ? "text" : "password"} required className="w-full bg-slate-800 border border-slate-700 p-3.5 rounded-xl text-white outline-none focus:border-blue-500 transition-all" value={password} onChange={e => setPassword(e.target.value)} />
                            </div>
                            <button type="submit" className="w-full bg-blue-600 p-4 rounded-xl font-bold text-white shadow-lg shadow-blue-900/20 hover:bg-blue-500 transition-all">
                                {isRegistering ? "S'inscrire" : "Se connecter"}
                            </button>
                            <button type="button" onClick={() => setIsRegistering(!isRegistering)} className="w-full text-slate-500 text-xs font-bold uppercase py-2">
                                {isRegistering ? "Déjà un compte ? Connexion" : "Pas de compte ? S'inscrire"}
                            </button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex bg-slate-950 text-white overflow-hidden">
                    {/* Sidebar */}
                    <div className={`w-full md:w-80 border-r border-slate-800 flex flex-col ${view === 'chat' ? 'hidden md:flex' : 'flex'}`}>
                        <div className="p-5 flex justify-between items-center border-b border-slate-800 bg-slate-900/30">
                            <div className="flex items-center gap-3">
                                <LogoPlaceholder className="w-8 h-8" />
                                <h2 className="font-extrabold text-lg italic uppercase">ONYX</h2>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="text-slate-500 hover:text-white p-2 hover:bg-slate-800 rounded-lg transition-all">
                                <Icon name="settings" />
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar p-4">
                            {/* Invitation Pending */}
                            {incomingRequests.length > 0 && (
                                <div className="mb-8 space-y-3">
                                    <p className="text-[10px] text-yellow-500 uppercase font-black px-1 tracking-widest flex items-center gap-2">
                                        <Icon name="clock" size={12}/> Demandes reçues
                                    </p>
                                    {incomingRequests.map(req => (
                                        <div key={req.id} className="bg-slate-900 border border-slate-800 p-3 rounded-2xl fade-in">
                                            <div className="flex items-center gap-3 mb-3">
                                                <img src={req.fromPhoto} className="w-10 h-10 rounded-xl bg-slate-800" />
                                                <p className="text-xs font-bold flex-1 truncate">{req.fromName}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => respondToRequest(req, true)} className="flex-1 bg-green-600/20 text-green-500 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-green-600 hover:text-white transition-all">
                                                    Accepter
                                                </button>
                                                <button onClick={() => respondToRequest(req, false)} className="flex-1 bg-red-600/20 text-red-500 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-red-600 hover:text-white transition-all">
                                                    Refuser
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* Add Friend */}
                            <div className="mb-8">
                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-3 px-1 tracking-widest">Nouvelle discussion</p>
                                <div className="flex gap-2 h-11">
                                    <input placeholder="Coller l'ID Onyx..." className="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 text-xs outline-none focus:border-blue-600" value={friendIdInput} onChange={e => setFriendIdInput(e.target.value)} />
                                    <button onClick={sendFriendRequest} className="bg-blue-600 px-4 rounded-xl shadow-lg shadow-blue-900/20 hover:bg-blue-500 transition-all flex items-center justify-center">
                                        <Icon name="userplus" size={18}/>
                                    </button>
                                </div>
                            </div>

                            {/* Contact List */}
                            <div className="space-y-2">
                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-3 px-1 tracking-widest">Contacts</p>
                                {friends.length === 0 && <p className="text-[10px] text-slate-700 px-1 italic">Aucun contact actif.</p>}
                                {friends.map(f => (
                                    <div key={f.uid} onClick={() => { setActiveChat(f); setView('chat'); }} className={`p-3 rounded-2xl cursor-pointer flex items-center gap-3 transition-all ${activeChat?.uid === f.uid ? 'bg-blue-600 shadow-xl shadow-blue-900/20' : 'bg-slate-900/40 hover:bg-slate-900'}`}>
                                        <img src={f.photoURL} className="w-12 h-12 rounded-xl object-cover bg-slate-800" />
                                        <div className="flex-1 min-w-0">
                                            <p className="font-bold text-sm truncate">{f.name}</p>
                                            <div className="flex items-center gap-1.5">
                                                <span className="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                                                <p className="text-[9px] text-slate-500 font-bold uppercase">En ligne</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Current User ID footer */}
                        <div className="p-4 border-t border-slate-800 bg-slate-900/20">
                            <p className="text-[10px] text-slate-500 uppercase font-black mb-2 px-1">Mon ID Onyx</p>
                            <div className="flex items-center gap-2 bg-slate-950 p-3 rounded-xl border border-slate-800 cursor-pointer group" onClick={() => {navigator.clipboard.writeText(user.uid); alert("ID Copié !");}}>
                                <p className="text-[10px] font-mono text-blue-400 truncate flex-1">{user.uid}</p>
                                <Icon name="copy" size={14} className="text-slate-600 group-hover:text-blue-500"/>
                            </div>
                        </div>
                    </div>

                    {/* Chat Area */}
                    <div className={`flex-1 flex flex-col ${view === 'list' ? 'hidden md:flex' : 'flex'}`}>
                        {activeChat ? (
                            <div className="flex flex-col h-full fade-in">
                                <header className="p-4 border-b border-slate-800 flex items-center gap-3 bg-slate-950/50 backdrop-blur-md">
                                    <button onClick={() => setView('list')} className="md:hidden p-2 text-slate-400"><Icon name="arrowleft"/></button>
                                    <img src={activeChat.photoURL} className="w-10 h-10 rounded-xl object-cover" />
                                    <div className="flex-1">
                                        <p className="font-bold text-slate-100">{activeChat.name}</p>
                                        <p className="text-[10px] text-blue-500 font-black tracking-tighter uppercase italic">Onyx Verified</p>
                                    </div>
                                </header>
                                <div className="flex-1 overflow-y-auto p-5 space-y-4 custom-scrollbar bg-[radial-gradient(circle_at_center,_#0f172a_0%,_#020617_100%)]">
                                    {messages.map(m => (
                                        <div key={m.id} className={`flex ${m.senderId === user.uid ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[80%] p-4 rounded-2xl text-sm leading-relaxed shadow-lg ${m.senderId === user.uid ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-900 border border-slate-800 text-slate-200 rounded-tl-none'}`}>
                                                {m.text}
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={messagesEndRef} />
                                </div>
                                <form onSubmit={sendMessage} className="p-4 bg-slate-950 border-t border-slate-800 flex gap-3">
                                    <input value={inputText} onChange={e => setInputText(e.target.value)} placeholder="Écrire un message Onyx..." className="flex-1 bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none focus:border-blue-600 transition-all" />
                                    <button type="submit" className="bg-blue-600 w-14 flex items-center justify-center rounded-2xl hover:bg-blue-500 transition-all shadow-xl shadow-blue-900/30">
                                        <Icon name="send" size={22}/>
                                    </button>
                                </form>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-800 bg-slate-950 relative overflow-hidden">
                                <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{backgroundImage: 'radial-gradient(#ffffff 1px, transparent 1px)', backgroundSize: '30px 30px'}}></div>
                                <LogoPlaceholder className="w-24 h-24 opacity-10 mb-6 grayscale animate-pulse" />
                                <h3 className="font-black italic uppercase tracking-[0.3em] text-xs text-slate-800">ONYX CONNECT</h3>
                                <p className="text-[10px] text-slate-900 mt-4 font-bold">Sélectionnez ou invitez un ami pour chatter</p>
                            </div>
                        )}
                    </div>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl fade-in">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black italic uppercase tracking-tight">Paramètres</h2>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-500 hover:text-white p-2 bg-slate-800 rounded-full"><Icon name="x" size={16}/></button>
                                </div>
                                <div className="space-y-8">
                                    <div className="flex flex-col items-center">
                                        <div className="relative group cursor-pointer" onClick={() => fileInputRef.current.click()}>
                                            <img src={profile.photoURL} className="w-28 h-28 rounded-[2rem] object-cover ring-4 ring-slate-800 group-hover:ring-blue-600 transition-all shadow-2xl" />
                                            <div className="absolute inset-0 flex items-center justify-center bg-black/60 rounded-[2rem] opacity-0 group-hover:opacity-100 transition-all text-white font-black text-[10px] uppercase">Changer</div>
                                            <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleImageUpload} />
                                        </div>
                                        <p className="text-[10px] text-blue-500 mt-5 uppercase font-black tracking-widest">Avatar Onyx</p>
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-slate-600 ml-1 mb-2 block">Nom d'affichage</label>
                                        <input className="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-white outline-none font-bold focus:border-blue-500 transition-all" value={profile.displayName} onChange={e => updateProfile({ displayName: e.target.value })} />
                                    </div>
                                    <button onClick={() => auth.signOut()} className="w-full py-4 bg-red-600/10 text-red-500 rounded-2xl font-black uppercase text-xs hover:bg-red-600 hover:text-white transition-all flex items-center justify-center gap-3">
                                        <Icon name="logout" size={16}/> Déconnexion
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
