        /* FIX EMOJI — force le rendu natif du navigateur, évite que Tailwind/SVG écrase les glyphes couleur */

            right: 0;
            z-index: 9999;
            padding: 20px;
            background: #0f172a;
            border-top: 1px solid #1e293b;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .uninstall-tooltip.open {
            transform: translateY(0);
        }

</head>
<body class="text-slate-200">

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {

        const getAvatar = (name) => `https://ui-avatars.com/api/?name=${encodeURIComponent(name || 'User')}&background=2563eb&color=fff&bold=true&rounded=true`;

        const compressImage = (file, maxWidth = 800, maxHeight = 800) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        } else {
                            if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        resolve(dataUrl);
                    };
                };
                reader.onerror = (error) => reject(error);
            });
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z" />,
                logout: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />,
                userplus: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8M19 8v6M22 11h-6" />,
                copy: <React.Fragment><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></React.Fragment>,
                arrowleft: <path d="M19 12H5M12 19l-7-7 7-7" />,
                send: <React.Fragment><path d="m22 2-7 20-4-9-9-4Z" /><path d="M22 2 11 13" /></React.Fragment>,
                plus: <path d="M12 5v14M5 12h14" />,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
                file: <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6" />,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                share: <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13" />,
                smartphone: (
                    <React.Fragment>
                        <rect width="14" height="20" x="5" y="2" rx="2" ry="2" />
                        <path d="M12 18h.01" />
                    </React.Fragment>
                ),
                smile: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                        <line x1="9" y1="9" x2="9.01" y2="9" />
                        <line x1="15" y1="9" x2="15.01" y2="9" />
                    </React.Fragment>
                ),
                users: (
                    <React.Fragment>
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </React.Fragment>
                ),
                /* icône corbeille/désinstall */
                uninstall: (
                    <React.Fragment>
                        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        <line x1="10" y1="11" x2="10" y2="17" />
                        <line x1="14" y1="11" x2="14" y2="17" />

            const key = name.toLowerCase();
            return (
                <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[key] || icons['x']}
                </svg>

        };

        const LogoPlaceholder = ({ className = "w-12 h-12" }) => (
            <div className={`${className} bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/20`}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-2/3 h-2/3 text-white">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
            </div>
        );

        const MessageStatus = ({ msg, friendUid }) => {
            if (!msg.timestamp) {
                return (
                    <svg viewBox="0 0 16 11" width="14" height="10" fill="none" className="inline-block ml-1 opacity-50">
                        <path d="M1 5.5L5 9.5L15 1" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                );
            }
            const readBy = msg.readBy || [];
            const isRead = readBy.includes(friendUid);
            const color = isRead ? '#3b82f6' : '#64748b';
            return (
                <svg viewBox="0 0 20 11" width="16" height="10" fill="none" className="inline-block ml-1">
                    <path d="M1 5.5L5 9.5L13 1" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    <path d="M7 5.5L11 9.5L19 1" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
            );
        };

        /* ── Panneau de désinstallation (bottom sheet) ── */
        const UninstallSheet = ({ open, onClose }) => {
            // Détecte l'OS pour afficher les instructions adaptées
            const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            const isAndroid = /android/i.test(navigator.userAgent);

            const steps = isIOS
                ? ["Appuyez sur le bouton Partager ↑ de Safari", "Faites défiler vers le bas", "Appuyez sur « Supprimer du téléphone »"]
                : isAndroid
                ? ["Maintenez appuyé l'icône ONYX CHAT sur l'écran d'accueil", "Appuyez sur « Désinstaller » ou glissez vers la corbeille"]
                : ["Ouvrez les paramètres de votre navigateur", "Allez dans Applications ou Données du site", "Recherchez « Onyx Chat » et supprimez-le"];

            return (
                <div className={`uninstall-tooltip ${open ? 'open' : ''}`}>
                    <div className="max-w-md mx-auto">
                        <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-red-500/20 rounded-xl flex items-center justify-center">
                                    <Icon name="uninstall" size={15} className="text-red-400" />
                                </div>
                                <p className="text-xs font-black uppercase tracking-widest text-white">Désinstaller l'app</p>
                            </div>
                            <button onClick={onClose} className="p-2 text-slate-500 hover:text-white"><Icon name="x" size={16}/></button>
                        </div>
                        <p className="text-[10px] text-slate-500 uppercase font-bold mb-3 tracking-wider">Comment désinstaller :</p>
                        <div className="space-y-2">
                            {steps.map((step, i) => (
                                <div key={i} className="flex items-start gap-3 bg-slate-800/50 border border-slate-700/50 rounded-2xl px-4 py-3">
                                    <span className="text-[9px] font-black text-red-400 bg-red-500/10 rounded-full w-5 h-5 flex items-center justify-center shrink-0 mt-0.5">{i + 1}</span>
                                    <p className="text-[11px] text-slate-300 font-bold leading-relaxed">{step}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ displayName: '', photoURL: '' });
            const [loading, setLoading] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');
            
            const [friends, setFriends] = useState([]);
            const [friendProfiles, setFriendProfiles] = useState({});
            const [incomingRequests, setIncomingRequests] = useState([]);
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [view, setView] = useState('list');
            const [showSettings, setShowSettings] = useState(false);
            const [friendIdInput, setFriendIdInput] = useState('');
            
            const [lastMessages, setLastMessages] = useState({});
            const [isTypingMap, setIsTypingMap] = useState({});
            const [notifications, setNotifications] = useState({});

            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isInstallable, setIsInstallable] = useState(false);
            // NOUVEAU : état installé persisté dans localStorage
            const [isInstalled, setIsInstalled] = useState(() => {
                return localStorage.getItem('onyx_pwa_installed') === 'true'
                    || window.matchMedia('(display-mode: standalone)').matches;
            });
            const [showUninstallSheet, setShowUninstallSheet] = useState(false);

            const [onlineStatus, setOnlineStatus] = useState({});
            const [totalOnline, setTotalOnline] = useState(0);

            const fileInputRef = useRef(null);
            const chatFileRef = useRef(null);
            const messagesEndRef = useRef(null);
            const activeChatRef = useRef(null);
            const typingTimeoutRef = useRef(null);

            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    // N'affiche le bouton "Installer" que si pas déjà installé
                    if (!isInstalled) setIsInstallable(true);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);

                const handleAppInstalled = () => {
                    // L'app vient d'être installée
                    setIsInstallable(false);
                    setDeferredPrompt(null);
                    setIsInstalled(true);
                    localStorage.setItem('onyx_pwa_installed', 'true');
                };
                window.addEventListener('appinstalled', handleAppInstalled);

                // Si déjà en mode standalone, on considère l'app installée
                const mq = window.matchMedia('(display-mode: standalone)');
                const handleStandalone = (e) => {
                    if (e.matches) {
                        setIsInstalled(true);
                        setIsInstallable(false);
                        localStorage.setItem('onyx_pwa_installed', 'true');
                    }
                };
                mq.addEventListener('change', handleStandalone);

                return () => {
                    window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                    window.removeEventListener('appinstalled', handleAppInstalled);
                    mq.removeEventListener('change', handleStandalone);
                };
            }, [isInstalled]);

            useEffect(() => {
                activeChatRef.current = activeChat;
                if (activeChat) {
                    setNotifications(prev => {
                        const next = { ...prev };
                        delete next[activeChat.uid];
                        return next;
                    });
                }
            }, [activeChat]);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const userRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(u.uid);
                        userRef.onSnapshot(doc => {
                            if (doc.exists) setProfile(doc.data());
                            else {
                                const newProfile = { uid: u.uid, displayName: u.email.split('@')[0], photoURL: getAvatar(u.email.split('@')[0]), createdAt: firebase.firestore.FieldValue.serverTimestamp() };
                                userRef.set(newProfile);
                                setProfile(newProfile);
                            }
                        });
                    } else setUser(null);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const presenceRef = db.collection('artifacts').doc(appId)
                    .collection('public').doc('data')
                    .collection('presence').doc(user.uid);

                presenceRef.set({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });

                const handleVisibility = () => {
                    presenceRef.set({
                        online: document.visibilityState !== 'hidden',
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                };
                document.addEventListener('visibilitychange', handleVisibility);

                const handleUnload = () => {
                    presenceRef.set({ online: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                };
                window.addEventListener('beforeunload', handleUnload);

                const unsubPresence = db.collection('artifacts').doc(appId)
                    .collection('public').doc('data').collection('presence')
                    .onSnapshot(snap => {
                        const map = {};
                        let count = 0;
                        snap.docs.forEach(doc => {
                            const d = doc.data();
                            map[doc.id] = d.online === true;
                            if (d.online === true) count++;
                        });
                        setOnlineStatus(map);
                        setTotalOnline(count);
                    });

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibility);
                    window.removeEventListener('beforeunload', handleUnload);
                    presenceRef.set({ online: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                    unsubPresence();
                };
            }, [user]);

            useEffect(() => {
                if (!user || friends.length === 0) return;
                const unsubs = friends.map(friend => {
                    return db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(friend.uid)
                        .onSnapshot(doc => {
                            if (doc.exists) {
                                setFriendProfiles(prev => ({ ...prev, [friend.uid]: doc.data() }));
                            }
                        });
                });
                return () => unsubs.forEach(unsub => unsub());
            }, [friends, user]);

            useEffect(() => {
                if (!user) return;
                const unsubFriends = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').doc('list')
                    .onSnapshot(doc => { if (doc.exists) setFriends(doc.data().friends || []); else setFriends([]); });
                
                const unsubRequests = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('friendRequests')
                    .where('toId', '==', user.uid)
                    .where('status', '==', 'pending')
                    .onSnapshot(snap => setIncomingRequests(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));

                return () => { unsubFriends(); unsubRequests(); };
            }, [user]);

            useEffect(() => {
                if (!user || friends.length === 0) return;
                const unsubs = friends.map(friend => {
                    const chatId = [user.uid, friend.uid].sort().join('_');
                    const unsubMsg = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
                        .orderBy('timestamp', 'desc').limit(1)
                        .onSnapshot(snap => {
                            if (!snap.empty) {
                                const lastMsg = snap.docs[0].data();
                                setLastMessages(prev => ({ ...prev, [friend.uid]: lastMsg.fileUrl ? "📷 Pièce jointe" : lastMsg.text }));
                                if (lastMsg.senderId === friend.uid && activeChatRef.current?.uid !== friend.uid) {
                                    setNotifications(prev => ({ ...prev, [friend.uid]: (prev[friend.uid] || 0) + 1 }));
                                }
                            } else {
                                setLastMessages(prev => ({ ...prev, [friend.uid]: "Aucun message" }));
                            }
                        });
                    const unsubTyping = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId)
                        .onSnapshot(doc => {
                            if (doc.exists) {
                                const data = doc.data();
                                setIsTypingMap(prev => ({ ...prev, [friend.uid]: data.isTyping?.[friend.uid] || false }));
                            }
                        });
                    return () => { unsubMsg(); unsubTyping(); };
                });
                return () => unsubs.forEach(unsub => unsub());
            }, [user, friends]);

            useEffect(() => {
                if (!user || !activeChat) return;
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                markMessagesAsRead(chatId, activeChat.uid).catch(() => {});
                const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
                    .orderBy('timestamp', 'asc')
                    .onSnapshot(snap => {
                        setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        markMessagesAsRead(chatId, activeChat.uid).catch(() => {});
                        setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    });
                return () => unsubscribe();
            }, [user, activeChat]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (isRegistering) await auth.createUserWithEmailAndPassword(email, password);
                    else await auth.signInWithEmailAndPassword(email, password);
                } catch (err) { setAuthError(err.message); }
            };

            const updateTypingStatus = (isTyping) => {
                if (!activeChat) return;
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).set({
                    isTyping: { [user.uid]: isTyping }
                }, { merge: true });
            };

            const sendMessage = async (text = null, fileData = null) => {
                if (!text && !fileData) return;
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                updateTypingStatus(false);
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').add({
                        text: text || '',
                        fileUrl: fileData?.url || null,
                        fileType: fileData?.type || null,
                        fileName: fileData?.name || null,
                        senderId: user.uid,
                        senderName: profile.displayName,
                        reactions: {},
                        readBy: [],
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setInputText('');
                } catch (err) { console.error(err); }
            };

            const markMessagesAsRead = async (chatId, friendUid) => {
                const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data')
                    .collection('chats').doc(chatId).collection('messages')
                    .where('senderId', '==', friendUid)
                    .get();
                const batch = db.batch();
                snap.docs.forEach(doc => {
                    const data = doc.data();
                    if (!(data.readBy || []).includes(user.uid)) {
                        batch.update(doc.ref, { readBy: firebase.firestore.FieldValue.arrayUnion(user.uid) });
                    }
                });
                await batch.commit();
            };

            const deleteMessage = async (msgId) => {
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').doc(msgId).delete();
            };

            const reactToMessage = async (msgId, emoji) => {
                const chatId = [user.uid, activeChat.uid].sort().join('_');
                const msgRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').doc(msgId);
                const msgDoc = await msgRef.get();
                const currentReactions = msgDoc.data().reactions || {};
                
                if (currentReactions[user.uid] === emoji) delete currentReactions[user.uid];
                else currentReactions[user.uid] = emoji;

                await msgRef.update({ reactions: currentReactions });
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const type = file.type.split('/')[0];
                try {
                    if (type === 'image') {
                        const compressedUrl = await compressImage(file);
                        sendMessage(null, { url: compressedUrl, type: type, name: file.name });
                    } else {
                        const reader = new FileReader();
                        reader.onload = (ev) => sendMessage(null, { url: ev.target.result, type: type, name: file.name });
                        reader.readAsDataURL(file);
                    }
                } catch (err) { console.error(err); }
            };

            const downloadFile = (url, name) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = name || 'onyx-file';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const respondToRequest = async (request, accept) => {
                const batch = db.batch();
                const requestRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('friendRequests').doc(request.id);
                if (accept) {
                    const myContactsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').doc('list');
                    const friendContactsRef = db.collection('artifacts').doc(appId).collection('users').doc(request.fromId).collection('contacts').doc('list');
                    batch.set(myContactsRef, { friends: firebase.firestore.FieldValue.arrayUnion({ uid: request.fromId }) }, { merge: true });
                    batch.set(friendContactsRef, { friends: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid }) }, { merge: true });
                    batch.update(requestRef, { status: 'accepted' });
                } else batch.update(requestRef, { status: 'rejected' });
                await batch.commit();
            };

            const shareApp = async () => {
                const shareData = {
                    title: 'ONYX CHAT',
                    text: 'Rejoins-moi sur ONYX CHAT, la messagerie sécurisée nouvelle génération !',
                    url: window.location.href
                };
                try {
                    if (navigator.share) {
                        await navigator.share(shareData);
                    } else {
                        await navigator.clipboard.writeText(window.location.href);
                        alert("Lien copié dans le presse-papier !");
                    }
                } catch (err) { console.log("Erreur partage:", err); }
            };

            const installApp = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    setIsInstallable(false);
                    setDeferredPrompt(null);
                    setIsInstalled(true);
                    localStorage.setItem('onyx_pwa_installed', 'true');
                }
            };

            if (loading) return null;

            if (!user) return (
                <div className="h-screen bg-slate-950 flex items-center justify-center p-4">
                    <div className="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md text-center fade-in">
                        <div className="flex justify-center mb-6"><LogoPlaceholder className="w-20 h-20" /></div>
                        <h1 className="text-3xl font-extrabold text-white mb-8 italic uppercase tracking-widest">ONYX CHAT</h1>
                        <form onSubmit={handleAuth} className="space-y-5 text-left">
                            {authError && <div className="bg-red-500/10 border border-red-500/50 p-3 rounded-xl text-red-500 text-xs font-bold">{authError}</div>}
                            <input type="email" required placeholder="Email" className="w-full bg-slate-800 border border-slate-700 p-3.5 rounded-xl text-white outline-none focus:border-blue-500" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" required placeholder="Mot de passe" className="w-full bg-slate-800 border border-slate-700 p-3.5 rounded-xl text-white outline-none focus:border-blue-500" value={password} onChange={e => setPassword(e.target.value)} />
                            <button type="submit" className="w-full bg-blue-600 p-4 rounded-xl font-bold text-white shadow-lg hover:bg-blue-500 transition-all uppercase tracking-widest">
                                {isRegistering ? "S'inscrire" : "Se connecter"}
                            </button>
                            <button type="button" onClick={() => setIsRegistering(!isRegistering)} className="w-full text-slate-500 text-xs font-bold uppercase tracking-tighter">
                                {isRegistering ? "Nouveau ? Créer un compte" : "Déjà membre ? Connexion"}
                            </button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex bg-slate-950 text-white overflow-hidden">
                    <aside className={`w-full md:w-80 border-r border-slate-800 flex flex-col ${view === 'chat' ? 'hidden md:flex' : 'flex'}`}>
                        <div className="p-5 flex justify-between items-center border-b border-slate-800 bg-slate-900/30">
                            <div className="flex items-center gap-3">
                                <LogoPlaceholder className="w-8 h-8" />
                                <h2 className="font-extrabold text-lg italic uppercase tracking-widest">ONYX CHAT</h2>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="text-slate-500 hover:text-white p-2 hover:bg-slate-800 rounded-lg transition-all"><Icon name="settings" /></button>
                        </div>

                        <div className="px-5 py-2.5 flex items-center gap-2 bg-slate-900/20 border-b border-slate-800/50">
                            <div className="w-2 h-2 rounded-full bg-green-400 shadow-sm shadow-green-400/50 animate-pulse"></div>
                            <span className="emoji-native text-base leading-none">👥</span>
                            <span className="text-[10px] font-black uppercase tracking-widest text-green-400">{totalOnline}</span>
                            <span className="text-[10px] font-black uppercase tracking-widest text-slate-500">en ligne</span>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar p-4">
                            <div className="mb-6 grid grid-cols-2 gap-2">
                                <button onClick={shareApp} className="flex flex-col items-center justify-center p-4 bg-slate-900 border border-slate-800 rounded-2xl hover:bg-slate-800 transition-all gap-2 group">
                                    <Icon name="share" className="text-blue-500 group-hover:scale-110 transition-transform" />
                                    <span className="text-[10px] font-black uppercase tracking-widest">Partager</span>
                                </button>
                                
                                {/* ── BOUTON INSTALL / DÉSINSTALL ── */}
                                {isInstalled ? (
                                    /* App déjà installée → bouton Désinstaller */
                                    <button
                                        onClick={() => setShowUninstallSheet(true)}
                                        className="flex flex-col items-center justify-center p-4 bg-red-500/10 border border-red-500/30 rounded-2xl hover:bg-red-500/20 transition-all gap-2 glow-uninstall group"
                                    >
                                        <Icon name="uninstall" size={18} className="text-red-400 group-hover:scale-110 transition-transform" />
                                        <span className="text-[10px] font-black uppercase tracking-widest text-red-400">Désinstaller</span>
                                    </button>
                                ) : isInstallable ? (
                                    /* App non installée, prompt dispo → bouton Installer */
                                    <button
                                        onClick={installApp}
                                        className="flex flex-col items-center justify-center p-4 bg-blue-600/10 border border-blue-600/30 rounded-2xl hover:bg-blue-600/20 transition-all gap-2 glow-button group"
                                    >
                                        <Icon name="smartphone" className="text-blue-400 group-hover:scale-110 transition-transform" />
                                        <span className="text-[10px] font-black uppercase tracking-widest">Installer</span>
                                    </button>
                                ) : (
                                    /* Prompt pas encore disponible (navigateur n'a pas encore déclenché beforeinstallprompt) */
                                    <div className="flex flex-col items-center justify-center p-4 bg-slate-950/50 border border-slate-900 rounded-2xl opacity-40 gap-2">
                                        <Icon name="smartphone" />
                                        <span className="text-[10px] font-black uppercase tracking-widest">App</span>
                                    </div>
                                )}
                                {/* ── FIN BOUTON ── */}
                            </div>

                            {incomingRequests.length > 0 && (
                                <div className="mb-6 space-y-2">
                                    <p className="text-[10px] text-yellow-500 uppercase font-black px-1 tracking-widest">Demandes</p>
                                    {incomingRequests.map(req => (
                                        <div key={req.id} className="bg-slate-900 border border-slate-800 p-3 rounded-2xl flex items-center justify-between gap-2">
                                            <div className="flex items-center gap-2 overflow-hidden">
                                                <img src={req.fromPhoto || getAvatar(req.fromName)} className="w-8 h-8 rounded-lg bg-slate-800 shrink-0 object-cover" />
                                                <p className="text-[10px] font-bold truncate">{req.fromName}</p>
                                            </div>
                                            <div className="flex gap-1">
                                                <button onClick={() => respondToRequest(req, true)} className="p-2 bg-green-500/20 text-green-500 rounded-lg"><Icon name="plus" size={12}/></button>
                                                <button onClick={() => respondToRequest(req, false)} className="p-2 bg-red-500/20 text-red-500 rounded-lg"><Icon name="x" size={12}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div className="mb-6">
                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-2 px-1 tracking-widest">Ajouter via ID</p>
                                <div className="flex gap-2">
                                    <input placeholder="ID du contact..." className="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-[10px] outline-none" value={friendIdInput} onChange={e => setFriendIdInput(e.target.value)} />
                                    <button onClick={async () => {
                                        if (!friendIdInput || friendIdInput === user.uid) return;
                                        const profSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(friendIdInput).get();
                                        if (!profSnap.exists) { alert("ID introuvable"); return; }
                                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('friendRequests').add({
                                            fromId: user.uid, fromName: profile.displayName, fromPhoto: profile.photoURL,
                                            toId: friendIdInput, status: 'pending', timestamp: firebase.firestore.FieldValue.serverTimestamp()
                                        });
                                        alert("Demande envoyée !");
                                        setFriendIdInput('');
                                    }} className="bg-blue-600 px-3 rounded-xl hover:bg-blue-500"><Icon name="userplus" size={14}/></button>
                                </div>
                            </div>

                            <div className="space-y-1">
                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-2 px-1 tracking-widest">Conversations</p>
                                {friends.map(f => {
                                    const friendData = friendProfiles[f.uid] || {};
                                    const isOnline = onlineStatus[f.uid] === true;
                                    return (
                                        <div key={f.uid} onClick={() => { setActiveChat({uid: f.uid, ...friendData}); setView('chat'); }} className={`p-3 rounded-2xl flex items-center gap-3 cursor-pointer transition-all ${activeChat?.uid === f.uid ? 'bg-blue-600' : 'hover:bg-slate-900/60'}`}>
                                            <div className="relative shrink-0">
                                                <img src={friendData.photoURL || getAvatar(friendData.displayName)} className="w-12 h-12 rounded-xl object-cover bg-slate-800 shadow-xl" />
                                                {notifications[f.uid] && <div className="absolute -top-1 -right-1 w-5 h-5 bg-white text-blue-600 rounded-full flex items-center justify-center text-[10px] font-black shadow-lg">{notifications[f.uid]}</div>}
                                                <div className={`absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 rounded-full border-2 border-slate-950 ${isOnline ? 'bg-green-400' : 'bg-slate-600'}`}></div>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between items-start">
                                                    <p className="font-bold text-sm truncate">{friendData.displayName || "Contact"}</p>
                                                    {isTypingMap[f.uid] && <span className="text-[8px] text-white/80 font-black animate-pulse tracking-tighter">ÉCRIT...</span>}
                                                </div>
                                                <p className={`text-[9px] font-bold uppercase tracking-wider ${isOnline ? 'text-green-400' : activeChat?.uid === f.uid ? 'text-blue-100' : 'text-slate-500'}`}>
                                                    {isOnline ? '● En ligne' : '○ Hors ligne'}
                                                </p>
                                                <p className={`text-[10px] truncate ${activeChat?.uid === f.uid ? 'text-blue-100' : 'text-slate-500'}`}>
                                                    {lastMessages[f.uid] || "..."}
                                                </p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="p-4 border-t border-slate-800 flex items-center gap-3 bg-slate-900/30">
                            <img src={profile.photoURL || getAvatar(profile.displayName)} className="w-10 h-10 rounded-xl bg-blue-600" />
                            <div className="flex-1 min-w-0">
                                <p className="text-xs font-black truncate uppercase tracking-widest">{profile.displayName}</p>
                                <p className="text-[8px] text-green-400 truncate font-bold">● En ligne</p>
                            </div>
                            <button onClick={() => auth.signOut()} className="p-2 text-slate-500 hover:text-red-500 transition-colors"><Icon name="logout" size={16}/></button>
                        </div>
                    </aside>

                    <main className={`flex-1 flex flex-col relative ${view === 'list' ? 'hidden md:flex' : 'flex'}`}>
                        {activeChat ? (
                            <React.Fragment>
                                <header className="p-4 border-b border-slate-800 flex items-center justify-between bg-slate-900/50 backdrop-blur-md sticky top-0 z-10">
                                    <div className="flex items-center gap-3">
                                        <button onClick={() => setView('list')} className="md:hidden p-2 -ml-2 text-slate-500"><Icon name="arrowleft" /></button>
                                        <div className="relative">
                                            <img src={activeChat.photoURL || getAvatar(activeChat.displayName)} className="w-10 h-10 rounded-xl object-cover bg-slate-800" />
                                            <div className={`absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-slate-950 ${onlineStatus[activeChat.uid] ? 'bg-green-400' : 'bg-slate-600'}`}></div>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-sm leading-tight">{activeChat.displayName}</h3>
                                            <p className={`text-[10px] font-bold uppercase tracking-tighter ${onlineStatus[activeChat.uid] ? 'text-green-400' : 'text-slate-500'}`}>
                                                {isTypingMap[activeChat.uid] ? "En train d'écrire..." : onlineStatus[activeChat.uid] ? "En ligne" : "Hors ligne"}
                                            </p>
                                        </div>
                                    </div>
                                </header>

                                <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                    {messages.map((msg, i) => {
                                        const isMe = msg.senderId === user.uid;
                                        const reactionGroups = {};
                                        if (msg.reactions) {
                                            Object.values(msg.reactions).forEach(emoji => {
                                                reactionGroups[emoji] = (reactionGroups[emoji] || 0) + 1;
                                            });
                                        }
                                        return (
                                            <div key={msg.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} fade-in`}>
                                                <div className="group relative max-w-[85%] md:max-w-[70%]">
                                                    <div className={`p-4 rounded-2xl shadow-sm ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-900 border border-slate-800 text-slate-200 rounded-tl-none'}`}>
                                                        {msg.fileUrl ? (
                                                            <div className="space-y-3">
                                                                {msg.fileType === 'image' ? (
                                                                    <img src={msg.fileUrl} className="max-w-full rounded-xl cursor-pointer hover:opacity-90 transition-opacity" onClick={() => window.open(msg.fileUrl)} />
                                                                ) : (
                                                                    <div className="flex items-center gap-3 bg-black/20 p-3 rounded-xl border border-white/5">
                                                                        <div className="bg-white/10 p-2 rounded-lg"><Icon name="file" size={16}/></div>
                                                                        <div className="flex-1 min-w-0">
                                                                            <p className="text-[10px] font-black truncate">{msg.fileName || 'Fichier'}</p>
                                                                            <p className="text-[8px] opacity-60 uppercase">Pièce jointe</p>
                                                                        </div>
                                                                        <button onClick={() => downloadFile(msg.fileUrl, msg.fileName)} className="p-2 hover:bg-white/10 rounded-lg transition-colors"><Icon name="download" size={14}/></button>
                                                                    </div>
                                                                )}
                                                                {msg.text && <p className="text-sm leading-relaxed">{msg.text}</p>}
                                                            </div>
                                                        ) : (
                                                            <p className="text-sm leading-relaxed whitespace-pre-wrap break-words">{msg.text}</p>
                                                        )}
                                                    </div>

                                                    <div className={`flex items-center gap-1 mt-1 ${isMe ? 'justify-end' : 'justify-start'}`}>
                                                        {Object.entries(reactionGroups).length > 0 && (
                                                            <div className="flex gap-1">
                                                                {Object.entries(reactionGroups).map(([emoji, count]) => (
                                                                    <button
                                                                        key={emoji}
                                                                        onClick={() => reactToMessage(msg.id, emoji)}
                                                                        className="flex items-center gap-0.5 bg-slate-800 border border-slate-700 rounded-full px-2 py-0.5 reaction-pop hover:bg-slate-700 transition-colors"
                                                                    >
                                                                        <span className="emoji-native text-sm">{emoji}</span>
                                                                        {count > 1 && <span className="text-[9px] font-black text-slate-300">{count}</span>}
                                                                    </button>
                                                                ))}
                                                            </div>
                                                        )}
                                                        <span className="text-[8px] text-slate-600 font-bold uppercase tracking-widest ml-1 flex items-center gap-0.5">
                                                            {msg.timestamp?.toDate ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...'}
                                                            {isMe && <MessageStatus msg={msg} friendUid={activeChat.uid} />}
                                                        </span>
                                                    </div>

                                                    <div className={`absolute top-0 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-20 ${isMe ? 'right-full mr-2' : 'left-full ml-2'}`}>
                                                        <div className="bg-slate-900 border border-slate-800 p-1.5 rounded-xl shadow-2xl flex gap-1 items-center">
                                                            {EMOJIS.map(e => (
                                                                <button key={e} onClick={() => reactToMessage(msg.id, e)} className="hover:scale-125 transition-transform p-1 leading-none">
                                                                    <span className="emoji-native text-lg">{e}</span>
                                                                </button>
                                                            ))}
                                                            <div className="w-px h-3 bg-slate-800 mx-1"></div>
                                                            <button onClick={() => { navigator.clipboard.writeText(msg.text); }} className="p-1.5 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white" title="Copier"><Icon name="copy" size={12}/></button>
                                                            {isMe && <button onClick={() => deleteMessage(msg.id)} className="p-1.5 hover:bg-red-500/10 rounded-lg text-slate-400 hover:text-red-500" title="Supprimer"><Icon name="trash" size={12}/></button>}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div ref={messagesEndRef} />
                                </div>

                                <footer className="p-4 bg-slate-950 border-t border-slate-900">
                                    <form onSubmit={(e) => { e.preventDefault(); sendMessage(inputText); }} className="flex items-end gap-3 max-w-4xl mx-auto">
                                        <div className="flex gap-1 bg-slate-900 rounded-2xl p-1 border border-slate-800">
                                            <button type="button" onClick={() => chatFileRef.current.click()} className="p-3 text-slate-500 hover:text-blue-500 transition-colors"><Icon name="plus" size={20}/></button>
                                        </div>
                                        <div className="flex-1 relative">
                                            <textarea rows="1" placeholder="Tapez votre message..." className="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-3.5 pr-12 outline-none focus:border-blue-600 transition-all text-sm custom-scrollbar resize-none" value={inputText} 
                                                onChange={e => {
                                                    setInputText(e.target.value);
                                                    updateTypingStatus(true);
                                                    clearTimeout(typingTimeoutRef.current);
                                                    typingTimeoutRef.current = setTimeout(() => updateTypingStatus(false), 3000);
                                                }}
                                                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputText); }}} />
                                            <button type="submit" className="absolute right-3 bottom-3 p-1.5 text-blue-500 hover:text-blue-400 disabled:opacity-30" disabled={!inputText.trim()}>
                                                <Icon name="send" />
                                            </button>
                                        </div>
                                    </form>
                                    <input type="file" ref={chatFileRef} className="hidden" onChange={handleFileUpload} />
                                </footer>
                            </React.Fragment>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center p-8 text-center bg-slate-950">
                                <div className="w-24 h-24 bg-blue-600/10 rounded-[2.5rem] flex items-center justify-center mb-8 border border-blue-600/20">
                                    <LogoPlaceholder className="w-12 h-12" />
                                </div>
                                <h2 className="text-2xl font-extrabold text-white mb-3 italic uppercase tracking-widest">BIENVENUE SUR ONYX</h2>
                                <p className="text-slate-500 text-xs font-bold max-w-xs leading-relaxed uppercase tracking-widest">Messagerie sécurisée ultra-rapide. Sélectionnez un contact pour démarrer une conversation cryptée.</p>
                                <div className="mt-12 grid grid-cols-2 gap-4">
                                    <div className="bg-slate-900/50 p-4 rounded-3xl border border-slate-800">
                                        <div className="text-blue-500 mb-2 font-black">PWA</div>
                                        <div className="text-[10px] text-slate-500 uppercase font-bold">Installation native</div>
                                    </div>
                                    <div className="bg-slate-900/50 p-4 rounded-3xl border border-slate-800">
                                        <div className="text-purple-500 mb-2 font-black">MEDIA</div>
                                        <div className="text-[10px] text-slate-500 uppercase font-bold">Images & Fichiers</div>
                                    </div>
                                </div>
                                <div className="mt-6 flex items-center gap-2 bg-slate-900/50 border border-slate-800 px-4 py-2.5 rounded-2xl">
                                    <div className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                                    <span className="emoji-native text-base leading-none">👥</span>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-green-400">{totalOnline}</span>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-500">en ligne</span>
                                </div>
                            </div>
                        )}

                    {showSettings && (
                        <div className="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-xl flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-800 rounded-[2.5rem] w-full max-w-md overflow-hidden fade-in shadow-2xl">
                                <div className="p-8 text-center border-b border-slate-800 relative bg-slate-900/50">
                                    <button onClick={() => setShowSettings(false)} className="absolute top-6 right-6 text-slate-500 hover:text-white p-2"><Icon name="x"/></button>
                                    <div className="relative inline-block group mb-6">
                                        <img src={profile.photoURL} className="w-24 h-24 rounded-[2rem] object-cover bg-blue-600 border-4 border-slate-800" />
                                        <button onClick={() => fileInputRef.current.click()} className="absolute -bottom-2 -right-2 bg-blue-600 p-2.5 rounded-2xl shadow-xl hover:bg-blue-500 transition-all border-4 border-slate-900">
                                            <Icon name="plus" size={16}/>
                                        </button>
                                    </div>
                                    <h3 className="text-xl font-extrabold uppercase italic tracking-widest">{profile.displayName}</h3>
                                    <p className="text-[10px] text-slate-500 mt-1 uppercase font-bold tracking-widest">Paramètres Profil</p>
                                </div>
                                
                                <div className="p-8 space-y-6">
                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase font-black mb-2 block tracking-widest">Nom d'affichage</label>
                                        <div className="flex gap-2">
                                            <input className="flex-1 bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-sm outline-none focus:border-blue-600 transition-all" value={profile.displayName} onChange={e => setProfile({...profile, displayName: e.target.value})} />
                                            <button onClick={async () => {
                                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(user.uid).update({ displayName: profile.displayName });
                                                alert("Nom mis à jour !");
                                            }} className="bg-blue-600 px-6 rounded-2xl font-bold text-[10px] uppercase tracking-widest">Save</button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase font-black mb-2 block tracking-widest">Identifiant Unique</label>
                                        <div className="flex gap-2">
                                            <div className="flex-1 bg-slate-800/50 border border-slate-700/50 rounded-2xl px-4 py-3 text-[10px] font-mono text-slate-400 overflow-hidden truncate flex items-center">
                                                {user.uid}
                                            </div>
                                            <button onClick={() => { navigator.clipboard.writeText(user.uid); alert("ID copié !"); }} className="bg-slate-800 px-6 rounded-2xl font-bold text-[10px] uppercase tracking-widest border border-slate-700 hover:bg-slate-700 transition-colors">Copier</button>
                                        </div>
                                        <p className="text-[9px] text-slate-500 mt-2 italic">* Partagez cet identifiant pour que vos amis puissent vous ajouter.</p>
                                    </div>

                                    <button onClick={() => auth.signOut()} className="w-full bg-red-500/10 border border-red-500/20 text-red-500 p-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-red-500 hover:text-white transition-all">
                                        Déconnexion du compte
                                    </button>
                                </div>
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={async (e) => {
                                    const file = e.target.files[0];
                                    if (!file) return;
                                    const url = await compressImage(file, 400, 400);
                                    setProfile({...profile, photoURL: url});
                                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profiles').doc(user.uid).update({ photoURL: url });
                                }} />
                            </div>
                        </div>
                    )}

                    {/* ── BOTTOM SHEET DÉSINSTALLATION ── */}
                    <UninstallSheet open={showUninstallSheet} onClose={() => setShowUninstallSheet(false)} />
                    {showUninstallSheet && (
                        <div
                            className="fixed inset-0 z-40 bg-slate-950/60 backdrop-blur-sm"
                            onClick={() => setShowUninstallSheet(false)}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
